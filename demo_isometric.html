        ctx.strokeStyle = col; ctx.lineWidth = w;
        ctx.beginPath(); ctx.moveTo(ex, ey);
        ctx.lineTo(ex + sx * TS * swingLen, ey + sy * TS * swingLen); ctx.stroke();
      } else {
        // кулак — кружок на конце руки + при ударе ударная волна
        ctx.fillStyle = obj.look ? (SKINS[obj.look.skin] || SKINS[0]) : '#ddd';
        ctx.beginPath(); ctx.arc(ex, ey, 4 + meleeK * 4, 0, Math.PI*2); ctx.fill();
        if (meleeK > 0.2) {
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,' + (meleeK * 0.6) + ')';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(ex, ey, 8 + meleeK * 14, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }
      }
    } else {
      // стрелковое — детальная отрисовка по типу оружия
      const gunScale = (obj.isBoss ? 1.3 : 1.0) * (TS / 60);
      drawFirearm(wepKey, ex, ey, sx, sy, gunScale);

      // Вторая рука для двуручного оружия — берётся за цевьё
      if (wepCfg.twoHanded) {
        const fgT = FIREARM_FOREGRIP[wepKey] || 0.30;
        // Плечо на ПРОТИВОПОЛОЖНОЙ стороне корпуса
        const sh2X = p.x - perpX * shoulderD;
        const sh2Y = shY - perpY * shoulderD;
        // Точка хвата на цевье (вдоль направления ствола)
        const fgX = ex + sx * TS * fgT;
        const fgY = ey + sy * TS * fgT;
        // рисуем ПОВЕРХ оружия — вторая рука обхватывает ствол
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = obj.isBoss ? 5 : 3.5;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(sh2X, sh2Y); ctx.lineTo(fgX, fgY); ctx.stroke();
        // кисть на цевье
        ctx.fillStyle = obj.look ? (SKINS[obj.look.skin] || SKINS[0]) : '#ddd';
        ctx.beginPath(); ctx.arc(fgX, fgY, obj.isBoss ? 4.5 : 3.5, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  // HP-бар (только живой и не игрок 100%)
  if (!isDead && (isPlayer || obj.hp < hpMax)) {
    const barW = TS * (obj.isBoss ? 0.8 : 0.5), barH = obj.isBoss ? 6 : 4;
    const by = p.y - sh - (obj.isBoss ? 16 : 10);
    ctx.fillStyle = 'rgba(0,0,0,.7)';
    ctx.fillRect(p.x - barW/2 - 1, by - 1, barW + 2, barH + 2);
    const hpRatio = obj.hp / hpMax;
    ctx.fillStyle = hpRatio > 0.5 ? '#5dd55d' : (hpRatio > 0.25 ? '#dda53a' : '#dd3a3a');
    ctx.fillRect(p.x - barW/2, by, barW * hpRatio, barH);
    if (obj.isBoss) {
      ctx.fillStyle = '#c060ff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('★ ' + (obj.name || 'БОСС') + ' ★', p.x, by - 5);
    }
  }

  // "☠ МЕРТВ" над трупом
  if (isDead) {
    const ty = p.y - TS * 0.7;
    ctx.globalAlpha = 0.85;
    ctx.font = 'bold ' + Math.floor(TS * 0.22) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('☠ МЕРТВ', p.x + 1, ty + 1);
    ctx.fillStyle = '#ff4444';
    ctx.fillText('☠ МЕРТВ', p.x, ty);
    ctx.globalAlpha = 1;
  }

  // "🩸 РАНЕН" над раненым (кровотечение или потеря части тела)
  if (!isDead && (obj.bleedT > 0 || (obj.lostParts && (obj.lostParts.arm || obj.lostParts.leg || obj.lostParts.hand)))) {
    const ty = p.y - sh - (obj.isBoss ? 28 : 22);
    const pulse = 0.7 + Math.abs(Math.sin(performance.now() * 0.006)) * 0.3;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.font = 'bold ' + Math.floor(TS * 0.16) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('🩸 РАНЕН', p.x + 1, ty + 1);
    ctx.fillStyle = '#ff7070';
    ctx.fillText('🩸 РАНЕН', p.x, ty);
    ctx.restore();
  }
}

// Реплика-пузырь над персонажем
function drawChatBubble(b) {
  if (!b.owner || b.owner.hp <= 0) return;
  const p = w2s(b.owner.r, b.owner.c);
  const sh = TS * (b.owner.isBoss ? 2.5 : 1.95);
  const yOff = p.y - sh - (b.owner.bleedT > 0 || (b.owner.lostParts && Object.keys(b.owner.lostParts).length) ? 44 : 28);
  const text = b.text;
  ctx.save();
  ctx.font = 'bold 11px sans-serif';
  const padX = 6, padY = 4;
  const w = ctx.measureText(text).width + padX * 2;
  const h = 16;
  const t = Math.min(1, b.life / 350); // fade out at end
  ctx.globalAlpha = Math.min(1, t);
  // фон-плашка
  ctx.fillStyle = 'rgba(20,24,30,.92)';
  ctx.strokeStyle = '#ffd76b';
  ctx.lineWidth = 1.2;
  const x = p.x - w/2, y = yOff - h;
  // прямоугольник
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, 4);
  else ctx.rect(x, y, w, h);
  ctx.fill(); ctx.stroke();
  // хвостик
  ctx.beginPath();
  ctx.moveTo(p.x - 4, y + h);
  ctx.lineTo(p.x, y + h + 5);
  ctx.lineTo(p.x + 4, y + h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(20,24,30,.92)';
  ctx.fill();
  ctx.strokeStyle = '#ffd76b';
  ctx.stroke();
  // текст
  ctx.fillStyle = '#ffe6a0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, p.x, y + h/2);
  ctx.restore();
}

function drawBullet(b) {
  const p1 = w2s(b.r, b.c);
  const p2 = w2s(b.r - b.vr * 0.05, b.c - b.vc * 0.05);
  ctx.strokeStyle = b.color;
  ctx.lineWidth = b.thick ? 4 : 2.5;
  ctx.lineCap = 'round';
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(p2.x, p2.y - isoH(0.5));
  ctx.lineTo(p1.x, p1.y - isoH(0.5));
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawMuzzle(m) {
  const p = w2s(m.r, m.c);
  const t = m.life / m.max;
  const cx = p.x, cy = p.y - isoH(0.55);
  // 1. внешнее яркое свечение — мягкий оранжевый ореол
  ctx.save();
  ctx.shadowColor = '#ff9020';
  ctx.shadowBlur = 30 * t;
  ctx.fillStyle = 'rgba(255,150,40,' + (t * 0.55) + ')';
  ctx.beginPath();
  ctx.arc(cx, cy, TS * 0.55 * t, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // 2. лучи-звёздочка от дула (4 луча) — по направлению ствола
  const angle = m.angle != null ? m.angle : 0;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = 'rgba(255,230,140,' + (t * 0.85) + ')';
  // длинный луч вперёд
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(TS * 0.7 * t, -TS * 0.06 * t);
  ctx.lineTo(TS * 0.95 * t, 0);
  ctx.lineTo(TS * 0.7 * t, TS * 0.06 * t);
  ctx.closePath();
  ctx.fill();
  // боковые искры
  ctx.fillStyle = 'rgba(255,200,100,' + (t * 0.7) + ')';
  for (let i = 0; i < 3; i++) {
    const a = (i - 1) * 0.6;
    const len = TS * (0.25 + Math.random() * 0.15) * t;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len * 0.4);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // 3. ярко-белое ядро в центре дула
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 18 * t;
  ctx.fillStyle = 'rgba(255,255,240,' + (t * 0.95) + ')';
  ctx.beginPath();
  ctx.arc(cx, cy, TS * 0.18 * t, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawGrenade(g) {
  const p = w2s(g.r, g.c);
  const k = g.t / g.T;
  const liftPx = isoH(1.1) * 4 * k * (1 - k);
  const cx = p.x;
  const cy = p.y - isoH(0.2) - liftPx;
  // тень на земле
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - isoH(0.05), 5, 2.5, 0, 0, Math.PI*2);
  ctx.fill();
  if (g.kind === 'molotov') {
    // бутылка с горючим — продолговатая, с пламенем сверху
    ctx.fillStyle = '#3a2a14';
    ctx.beginPath(); ctx.ellipse(cx, cy, 3, 6, k * Math.PI * 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a07040';
    ctx.beginPath(); ctx.ellipse(cx, cy, 1.8, 4.5, k * Math.PI * 2, 0, Math.PI*2); ctx.fill();
    // пламя
    ctx.fillStyle = '#ff8030';
    ctx.beginPath(); ctx.arc(cx, cy - 7, 2.8 + Math.sin(g.t*40)*0.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd76b';
    ctx.beginPath(); ctx.arc(cx, cy - 7, 1.4, 0, Math.PI*2); ctx.fill();
  } else {
    // граната
    ctx.fillStyle = '#2a2e1a';
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#5a5a30'; ctx.lineWidth = 1; ctx.stroke();
    // искра-фитиль
    if ((g.t * 18) % 1 > 0.5) {
      ctx.fillStyle = '#ffd76b';
      ctx.beginPath(); ctx.arc(cx + 2, cy - 4, 1.6, 0, Math.PI*2); ctx.fill();
    }
  }
}

// Прицел-конус: показывает дальность и разброс выбранного оружия.
// Лучом упирается в первое препятствие на линии прицела.
function drawAimGuide() {
  if (player.hp <= 0) return;
  if (!joyR.active) return;
  if (Math.abs(joyR.dx) < 0.1 && Math.abs(joyR.dy) < 0.1) return;
  const cfg = WEAPON_FX_CFG[currentWeapon];
  if (!cfg || cfg.melee) return;

  const angle = player.angle;
  const range = cfg.range || 8;
  const spread = cfg.spread || 0;
  const color = cfg.color || '#ffea80';
  const isSniper = currentWeapon === 'sniper';

  // Найдём фактическую длину луча — упираемся в первое препятствие
  let hitDist = range;
  for (let d = 0.3; d < range; d += 0.15) {
    const rr = player.r + Math.sin(angle) * d;
    const cc = player.c + Math.cos(angle) * d;
    if (isBlocked(rr, cc)) { hitDist = d; break; }
  }

  // Центр луча — из плеча оружия (как у руки)
  const p = w2s(player.r, player.c);
  const sh = TS * 1.95;
  const dx = Math.cos(angle), dy = Math.sin(angle);
  const sx = (dx - dy) * 0.5;
  const sy = (dx + dy) * 0.5 * ISO_Y;
  const dirLen = Math.hypot(sx, sy) || 1;
  const perpX = -sy / dirLen, perpY = sx / dirLen;
  const shoulderD = TS * 0.10;
  const startX = p.x + perpX * shoulderD + sx * TS * 0.45;
  const startY = p.y - sh * 0.17 + perpY * shoulderD + sy * TS * 0.45;

  // Конечная точка луча по миру → экран
  const endR = player.r + Math.sin(angle) * hitDist;
  const endC = player.c + Math.cos(angle) * hitDist;
  const ep = w2s(endR, endC);
  const endX = ep.x;
  const endY = ep.y - isoH(0.3); // на высоте груди

  if (isSniper) {
    // ── СНАЙПЕРКА: лазерный луч ──
    // тонкая яркая красная линия с пунктиром
    ctx.save();
    ctx.strokeStyle = 'rgba(255,40,40,.85)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([6, 4]);
    ctx.lineDashOffset = -(performance.now() * 0.04) % 10;
    ctx.shadowColor = '#ff3030';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    // яркая точка прицела на конце
    ctx.setLineDash([]);
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff5050';
    ctx.beginPath(); ctx.arc(endX, endY, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(endX, endY, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    // ── ОБЫЧНОЕ ОРУЖИЕ: конус с углом = spread ──
    const halfAngle = Math.max(0.01, spread); // минимальная ширина чтобы было видно
    const fanA = angle - halfAngle;
    const fanB = angle + halfAngle;
    const fanR_A = player.r + Math.sin(fanA) * hitDist;
    const fanC_A = player.c + Math.cos(fanA) * hitDist;
    const fanR_B = player.r + Math.sin(fanB) * hitDist;
    const fanC_B = player.c + Math.cos(fanB) * hitDist;
    const pA = w2s(fanR_A, fanC_A);
    const pB = w2s(fanR_B, fanC_B);
    const aX = pA.x, aY = pA.y - isoH(0.3);
    const bX = pB.x, bY = pB.y - isoH(0.3);

    ctx.save();
    // заливка-градиент
    const grd = ctx.createRadialGradient(startX, startY, 0, startX, startY, hitDist * TS);
    grd.addColorStop(0, color + '55');
    grd.addColorStop(0.6, color + '22');
    grd.addColorStop(1, color + '08');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(aX, aY);
    ctx.lineTo(bX, bY);
    ctx.closePath();
    ctx.fill();
    // края конуса — лёгкие линии того же цвета
    ctx.strokeStyle = color + '99';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(startX, startY); ctx.lineTo(aX, aY);
    ctx.moveTo(startX, startY); ctx.lineTo(bX, bY);
    ctx.stroke();
    // дальняя дуга — обозначает максимальный radius
    ctx.strokeStyle = color + 'bb';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(aX, aY); ctx.lineTo(bX, bY);
    ctx.stroke();
    ctx.restore();
  }
}

function drawCoverBreak(b) {
  const lifeRatio = Math.max(0, b.life / b.max);
  b.particles.forEach(pt => {
    const p = w2s(pt.r, pt.c);
    const liftPx = isoH(pt.z);
    // тень частицы
    ctx.fillStyle = 'rgba(0,0,0,' + (0.35 * lifeRatio).toFixed(2) + ')';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, pt.size * 0.7, pt.size * 0.4, 0, 0, Math.PI*2);
    ctx.fill();
    // сама частица
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = lifeRatio;
    ctx.beginPath();
    ctx.rect(p.x - pt.size/2, p.y - liftPx - pt.size/2, pt.size, pt.size);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// === GORE: летящие капли крови, лужицы, оторванные части тела ===
function drawBloodDrop(d) {
  const p = w2s(d.r, d.c);
  const yOff = -isoH(d.z); // высота над землёй
  ctx.fillStyle = '#a01818';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + yOff, d.size, d.size * 0.7, 0, 0, Math.PI*2);
  ctx.fill();
  // более тёмная сердцевина
  ctx.fillStyle = '#600808';
  ctx.beginPath();
  ctx.arc(p.x, p.y + yOff, d.size * 0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawBloodSplat(d) {
  const p = w2s(d.r, d.c);
  const t = Math.min(1, d.life / d.max);
  ctx.save();
  ctx.globalAlpha = t * 0.85;
  ctx.fillStyle = '#7a0a0a';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + 1, d.size * 1.2, d.size * 0.55, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#a01818';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, d.size * 0.7, d.size * 0.32, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawGorePart(g) {
  const p = w2s(g.r, g.c);
  const yOff = -isoH(g.z);
  const t = g.landed ? Math.min(1, g.life / g.max) : 1;
  ctx.save();
  ctx.globalAlpha = t;
  // тень под летящим
  if (!g.landed && g.z > 0.05) {
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, 5, 2.5, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.translate(p.x, p.y + yOff);
  ctx.rotate(g.rot);
  // капля крови за частью (хвост)
  if (!g.landed) {
    ctx.fillStyle = 'rgba(180,30,30,.7)';
    ctx.beginPath();
    ctx.ellipse(-3, 1, 5, 2, 0, 0, Math.PI*2);
    ctx.fill();
  }
  // сама часть тела
  switch (g.kind) {
    case 'head': {
      // голова — кружок цвета кожи + красная "шейка"
      ctx.fillStyle = g.skinCol;
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI*2);
      ctx.fill();
      // волосы (тёмные)
      ctx.fillStyle = '#1a0a00';
      ctx.beginPath();
      ctx.arc(0, -2, 6.5, Math.PI, 2*Math.PI);
      ctx.fill();
      // обрубленная шея
      ctx.fillStyle = '#8a0a0a';
      ctx.fillRect(-3, 5, 6, 3);
      ctx.fillStyle = '#400';
      ctx.fillRect(-3, 7, 6, 1);
      // глаза
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-2, 0, 0.8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(2, 0, 0.8, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'arm': {
      // рука (рукав суиту/платья + кисть)
      ctx.fillStyle = g.bodyCol;
      ctx.fillRect(-10, -2.5, 16, 5);
      // кисть
      ctx.fillStyle = g.skinCol;
      ctx.beginPath(); ctx.arc(7, 0, 2.8, 0, Math.PI*2); ctx.fill();
      // обрубок
      ctx.fillStyle = '#8a0a0a';
      ctx.fillRect(-12, -2.5, 2, 5);
      break;
    }
    case 'leg': {
      // нога — длинная штанина с ботинком
      ctx.fillStyle = g.bodyCol;
      ctx.fillRect(-12, -2, 18, 4);
      // ботинок
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.ellipse(8, 0, 4, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
      // обрубок
      ctx.fillStyle = '#8a0a0a';
      ctx.fillRect(-14, -2, 2, 4);
      break;
    }
    case 'hand': {
      // кисть с обрубком
      ctx.fillStyle = g.skinCol;
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
      // пальцы (короткие палочки)
      ctx.strokeStyle = g.skinCol; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(2, 0); ctx.lineTo(5, -1);
      ctx.moveTo(2, 1); ctx.lineTo(5, 1);
      ctx.moveTo(1.5, 2); ctx.lineTo(4, 3);
      ctx.stroke();
      // обрубок
      ctx.fillStyle = '#8a0a0a';
      ctx.fillRect(-4, -2, 2, 4);
      break;
    }
  }
  ctx.restore();
}

function drawHitSpark(s) {
  const p = w2s(s.r, s.c);
  const t = s.life / s.max;
  // короткая яркая вспышка
  ctx.fillStyle = 'rgba(255,230,160,' + (t * 0.9).toFixed(2) + ')';
  const size = 4 + 4 * (1 - t);
  ctx.beginPath();
  ctx.arc(p.x, p.y - isoH(0.3), size * t, 0, Math.PI*2);
  ctx.fill();
  // пыль/осколки
  ctx.fillStyle = s.color;
  ctx.globalAlpha = t * 0.7;
  for (let i = 0; i < 3; i++) {
    const a = i * 2.0 + (1 - t) * 4;
    const d = (1 - t) * 8;
    ctx.beginPath();
    ctx.arc(p.x + Math.cos(a) * d, p.y - isoH(0.3) + Math.sin(a) * d * 0.5, 1.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFirePuddle(f) {
  const p = w2s(f.r, f.c);
  const t = Math.max(0, f.life / f.max);
  const radPx = f.radius * TS * 0.55;
  // тёмный обугленный круг под лужей
  ctx.fillStyle = 'rgba(20,10,5,' + (0.5 * t).toFixed(2) + ')';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - isoH(0.05), radPx, radPx * ISO_Y, 0, 0, Math.PI*2);
  ctx.fill();
  // языки пламени (несколько слоёв градиентов)
  const flickr = 0.85 + 0.15 * Math.sin(performance.now() * 0.02);
  for (let i = 0; i < 5; i++) {
    const ang = (performance.now() * 0.001 + i) * 1.7;
    const ox = Math.cos(ang) * radPx * 0.35;
    const oy = Math.sin(ang) * radPx * 0.18;
    const grd = ctx.createRadialGradient(p.x + ox, p.y - isoH(0.1) + oy, 0, p.x + ox, p.y - isoH(0.1) + oy, radPx * 0.7 * flickr);
    grd.addColorStop(0, 'rgba(255,230,120,' + (0.75 * t) + ')');
    grd.addColorStop(0.4, 'rgba(255,140,40,' + (0.55 * t) + ')');
    grd.addColorStop(1, 'rgba(160,40,10,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(p.x + ox, p.y - isoH(0.1) + oy, radPx * 0.7 * flickr, radPx * 0.6 * ISO_Y * flickr, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawExplosion(e) {
  const p = w2s(e.r, e.c);
  const t = e.life / e.max;
  const radius = e.radius * (1 - t * 0.3) * TS;
  const grd = ctx.createRadialGradient(p.x, p.y - isoH(0.3), 0, p.x, p.y - isoH(0.3), radius);
  grd.addColorStop(0, 'rgba(255,255,200,' + t + ')');
  grd.addColorStop(0.3, 'rgba(255,160,40,' + (t * 0.9) + ')');
  grd.addColorStop(0.7, 'rgba(200,50,20,' + (t * 0.6) + ')');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(p.x, p.y - isoH(0.3), radius, 0, Math.PI*2);
  ctx.fill();
}

function render() {
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 1) Пол — все тайлы 0
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (MAP[r][c] === 0) drawTile(r, c);
    }
  }

  // 1.5) Лужи огня — на полу, под персонажами/укрытиями
  firePuddles.forEach(drawFirePuddle);

  // 1.7) Лужицы крови (splat-фаза) — рисуем на полу до персонажей
  bloodDrops.forEach(d => { if (d.splat) drawBloodSplat(d); });
  goreParts.forEach(g => { if (g.landed) drawGorePart(g); });

  // 2) Объекты с глубиной (укрытия + персонажи + пули). Сортируем по r+c
  const items = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = MAP[r][c];
      if (t > 0) items.push({ depth: r + c, draw: () => drawCover(r, c, t) });
    }
  }
  // игрок
  items.push({ depth: player.r + player.c, draw: () => drawCharacter(player, true) });
  // враги (живые + трупы — трупы остаются на земле)
  enemies.forEach(e => {
    items.push({ depth: e.r + e.c, draw: () => drawCharacter(e, false) });
  });
  // пули (рисуются после всего)
  items.sort((a, b) => a.depth - b.depth);
  items.forEach(i => i.draw());

  // 2.5) Прицел-конус игрока (под пулями, поверх персонажей)
  drawAimGuide();

  // 3) Поверх — пули, вспышки, гранаты, взрывы, разрушение
  bullets.forEach(drawBullet);
  muzzles.forEach(drawMuzzle);
  grenades.forEach(drawGrenade);
  explosions.forEach(drawExplosion);
  coverBreaks.forEach(drawCoverBreak);
  hitSparks.forEach(drawHitSpark);
  // капли крови И части тела В ПОЛЁТЕ (поверх персонажей)
  bloodDrops.forEach(d => { if (!d.splat) drawBloodDrop(d); });
  goreParts.forEach(g => { if (!g.landed) drawGorePart(g); });
  // реплики-пузыри в самом верху
  chatBubbles.forEach(drawChatBubble);
}

// ── UPDATE ─────────────────────────────────────────────────────────
let gamePaused = true; // снимается при выборе тактики в катсцене
// ── Stats боя ──────────────────────────────────────────────────────
const fightStats = {
  startMs: 0,      // performance.now() в момент старта (после катсцены)
  endMs: 0,
  shots: 0,
  killsCounted: new Set(), // индексы убитых врагов
  result: null,    // 'won' | 'lost' | null
};
function fightStatsBegin() {
  fightStats.startMs = performance.now();
  fightStats.endMs = 0;
  fightStats.shots = 0;
  fightStats.killsCounted = new Set();
  fightStats.result = null;
}
function checkFightEnd() {
  if (fightStats.result) return;
  // Считаем убитых
  for (let i = 0; i < enemies.length; i++) {
    if (enemies[i].hp <= 0 && !fightStats.killsCounted.has(i)) {
      fightStats.killsCounted.add(i);
    }
  }
  // Босс — первый враг (isBoss=true).
  // Победа имеет приоритет: если босс убит — это победа, даже если игрок умирает в этот же кадр.
  const boss = enemies.find(e => e.isBoss);
  if (boss && boss.hp <= 0) {
    fightStats.result = 'won';
    fightStats.endMs = performance.now();
    setTimeout(showResultScene, 1200);
  } else if (player.hp <= 0) {
    fightStats.result = 'lost';
    fightStats.endMs = performance.now();
    setTimeout(showResultScene, 1500);
  }
}
function showResultScene() {
  const won = (fightStats.result === 'won');
  document.getElementById('resEmoji').textContent = won ? '🏆' : '💀';
  document.getElementById('resTitle').textContent = won ? 'ПОБЕДА' : 'ПОРАЖЕНИЕ';
  document.getElementById('resSubtitle').textContent = won
    ? '— ' + (BOSS_CFG.name || 'Босс') + ' повержен —'
    : '— ' + (BOSS_CFG.name || 'Босс') + ' оказался сильнее —';
  const secs = Math.max(0, Math.round((fightStats.endMs - fightStats.startMs) / 1000));
  const mm = Math.floor(secs / 60), ss = secs % 60;
  document.getElementById('resTime').textContent = mm + ':' + String(ss).padStart(2, '0');
  document.getElementById('resKills').textContent = fightStats.killsCounted.size + ' / ' + enemies.length;
  document.getElementById('resShots').textContent = fightStats.shots;
  document.getElementById('resHP').textContent = Math.max(0, Math.round(player.hp)) + ' / ' + player.hpMax;
  document.getElementById('resTitle').style.color = won ? '#ffd76b' : '#ff7070';
  document.getElementById('resultScene').style.display = 'flex';
  gamePaused = true;
}
function sendResultAndClose(action) {
  const tg = (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  const payload = {
    a: fightStats.result === 'won' ? 'battle_won' : 'battle_lost',
    php: Math.max(0, Math.round(player.hp)),
    pmp: 0,
    gu: 0,
    boss: QP.boss,
    loc: CURRENT_LOC,
    nav: action, // 'district' | 'menu' — куда вернуться (бот может игнорировать)
  };
  if (tg && tg.sendData) {
    try { tg.sendData(JSON.stringify(payload)); } catch(e) {}
    try { tg.close(); } catch(e) {}
  } else {
    // Демо-режим (не из Telegram): просто скрываем оверлей, чтобы можно было ещё пощёлкать
    document.getElementById('resultScene').style.display = 'none';
  }
}

function update(dt) {
  if (gamePaused) return;
  // тик красной вспышки урона
  if (player.hitT > 0) player.hitT = Math.max(0, player.hitT - dt);

  // AI врагов
  enemies.forEach(e => updateEnemyAI(e, dt));

  // Если игрок мёртв — пропускаем управление
  if (player.hp <= 0) {
    player.fireCD = Math.max(0, player.fireCD - dt * 1000);
    // только обновляем пули и эффекты ниже
  }

  // Движение игрока
  const speed = 4.5 * getSpeedMul(player); // потеря ноги → 40% скорости
  if (player.hp > 0 && joyL.active && (Math.abs(joyL.dx) > 0.1 || Math.abs(joyL.dy) > 0.1)) {
    // joy.dx (экран X) → ось (c-r) ;  joy.dy (экран Y) → ось (c+r)*ISO_Y
    const d = joyL.dx, s = joyL.dy / ISO_Y;
    const dc = (s + d) * 0.5;
    const dr = (s - d) * 0.5;
    const mag = Math.hypot(dr, dc) || 1;
    tryMove(player, dr / mag * speed * dt, dc / mag * speed * dt);
    player.moving = true;
    player.walkPhase += dt * 10;
  } else {
    player.moving = false;
    player.walkPhase *= 0.9;
  }

  // Прицеливание и стрельба
  if (player.hp > 0 && joyR.active && (Math.abs(joyR.dx) > 0.15 || Math.abs(joyR.dy) > 0.15)) {
    // Аналогично: переводим экран → мир
    const d = joyR.dx, s = joyR.dy / ISO_Y;
    const dc = (s + d) * 0.5;
    const dr = (s - d) * 0.5;
    player.angle = Math.atan2(dr, dc);
    // Стрельба (через tryFirePlayer — учитывает патроны/перезарядку)
    tryFirePlayer();
  }
  player.fireCD = Math.max(0, player.fireCD - dt * 1000);

  // Пули
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.r += b.vr * dt;
    b.c += b.vc * dt;
    b.dist += Math.hypot(b.vr, b.vc) * dt;
    // Препятствие (стена/ящик/бочка/машина)? — наносим урон укрытию (стена возвращает true но HP=-1 → жива)
    if (isBlocked(b.r, b.c)) {
      damageCoverAt(b.r, b.c, b.dmg || 25);
      if (b.explosive) triggerExplosion(b.r, b.c, b.dmg || 90);
      bullets.splice(i, 1); continue;
    }
    // Дальность?
    if (b.dist > b.maxDist) {
      if (b.explosive) triggerExplosion(b.r, b.c);
      bullets.splice(i, 1); continue;
    }
    // Попадание в цели (зависит от team)
    let hit = false;
    const bulletAng = Math.atan2(b.vr, b.vc);
    if (b.team === 'enemy') {
      if (player.hp > 0 && Math.hypot(player.r - b.r, player.c - b.c) < 0.4) {
        damageActor(player, b.dmg || 25, bulletAng, b.wepKey);
        if (b.explosive) triggerExplosion(b.r, b.c);
        bullets.splice(i, 1); hit = true;
      }
    } else {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (Math.hypot(e.r - b.r, e.c - b.c) < 0.4) {
          damageActor(e, b.dmg || 25, bulletAng, b.wepKey);
          if (b.explosive) triggerExplosion(b.r, b.c);
          bullets.splice(i, 1); hit = true; break;
        }
      }
    }
    if (hit) continue;
  }

  // Гранаты — парабола r/c по времени; на t=T → взрыв (grenade) или лужа огня (molotov)
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.t += dt;
    const k = Math.min(1, g.t / g.T);
    g.r = g.fromR + (g.tr - g.fromR) * k;
    g.c = g.fromC + (g.tc - g.fromC) * k;
    if (k >= 1) {
      if (g.kind === 'molotov') {
        try { _tone({freq:200,freqEnd:80,dur:0.3,type:'sawtooth',vol:0.32}); _noise({dur:0.5,vol:0.28,filter:'lowpass',filterFreq:600}); } catch(e) {}
        spawnFirePuddle(g.r, g.c, g.fromTeam);
      } else {
        triggerExplosion(g.r, g.c, g.dmg);
      }
      grenades.splice(i, 1);
    }
  }

  // Анимация разрушения укрытий — частицы летят по баллистике
  for (let i = coverBreaks.length - 1; i >= 0; i--) {
    const b = coverBreaks[i];
    b.life -= dt * 1000;
    b.particles.forEach(pt => {
      pt.r += pt.vr * dt;
      pt.c += pt.vc * dt;
      pt.z += pt.vz * dt;
      pt.vz -= 7 * dt; // гравитация
      // трение
      pt.vr *= (1 - dt * 1.5);
      pt.vc *= (1 - dt * 1.5);
      if (pt.z < 0) { pt.z = 0; pt.vz = 0; }
    });
    if (b.life <= 0) coverBreaks.splice(i, 1);
  }

  // Искры от попаданий пуль
  for (let i = hitSparks.length - 1; i >= 0; i--) {
    hitSparks[i].life -= dt * 1000;
    if (hitSparks[i].life <= 0) hitSparks.splice(i, 1);
  }

  // Капли крови — летят дугой, оседают как лужи
  for (let i = bloodDrops.length - 1; i >= 0; i--) {
    const d = bloodDrops[i];
    if (d.splat) {
      d.life -= dt * 1000;
      if (d.life <= 0) bloodDrops.splice(i, 1);
      continue;
    }
    d.r += d.vr * dt;
    d.c += d.vc * dt;
    d.z += d.vz * dt;
    d.vz -= 6.5 * dt; // гравитация (тайл/с^2 — высота в "тайлах")
    if (d.z <= 0) {
      // упала — превращается в красную каплю на земле
      d.z = 0;
      d.splat = true;
      d.life = 4500 + Math.random() * 1500;
      d.max = 6000;
      d.size = d.size * (1.4 + Math.random() * 0.6);
    }
  }

  // ── Реплики (chatBubbles): угасание ──
  for (let i = chatBubbles.length - 1; i >= 0; i--) {
    chatBubbles[i].life -= dt * 1000;
    if (chatBubbles[i].life <= 0 || (chatBubbles[i].owner && chatBubbles[i].owner.hp <= 0)) {
      chatBubbles.splice(i, 1);
    }
  }

  // ── СТЕЛС: обнаружение трупов + спад тревоги ──
  // Проверяем что каждый живой враг видит вокруг себя — если есть труп в FOV → подозрение
  if (alertLevel < 1) {
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      for (const d of enemies) {
        if (d === e || d.hp > 0) continue;
        if (canEnemySeeCorpse(e, d)) {
          setAlert(1, 'corpse');
          spawnChat(e, 'Тут труп! Кто-то тут есть!', 2800);
          break;
        }
      }
      if (alertLevel >= 1) break;
    }
  }
  // Спад тревоги: если никто из врагов не видит игрока — копится таймер
  let anyoneSeesPlayer = false;
  for (const e of enemies) {
    if (e.hp > 0 && canEnemySeePlayer(e)) { anyoneSeesPlayer = true; break; }
  }
  if (anyoneSeesPlayer) {
    alertDecayT = 0;
  } else if (alertLevel > 0) {
    alertDecayT += dt;
    const threshold = alertLevel === 2 ? ALERT_DECAY_TIME : SUSPECT_TO_CALM_TIME;
    if (alertDecayT >= threshold) {
      alertLevel = Math.max(0, alertLevel - 1);
      alertDecayT = 0;
    }
  }
  // Патрульная болтовня — каждые ~10 сек случайно у одного из живых врагов
  if (!window._patrolChatT) window._patrolChatT = 0;
  window._patrolChatT -= dt;
  if (window._patrolChatT <= 0) {
    window._patrolChatT = 7 + Math.random() * 8;
    const alive = enemies.filter(e => e.hp > 0);
    if (alive.length > 0) {
      const e = alive[Math.floor(Math.random() * alive.length)];
      const distToPlayer = Math.hypot(player.r - e.r, player.c - e.c);
      // патрульные фразы при спокойствии, боевые в combat
      maybeChat(e, alertLevel >= 2 ? 'spot' : (alertLevel === 1 ? 'patrol' : 'patrol'), 0.8);
    }
  }
  // Реакция врагов на смерть игрока (один раз)
  if (player.hp <= 0 && !window._playerDownReacted) {
    window._playerDownReacted = true;
    const alive = enemies.filter(e => e.hp > 0);
    if (alive.length > 0) {
      const e = alive[Math.floor(Math.random() * alive.length)];
      maybeChat(e, 'playerDown', 1);
    }
  }
  if (player.hp > 0 && window._playerDownReacted) window._playerDownReacted = false;

  // ── Кровотечение (DoT) + след кровавых капель за раненым ──
  // + cantShoot таймер. Применяется к игроку и врагам.
  const allActors = [player, ...enemies];
  for (const a of allActors) {
    if (!a || a.hp <= 0) continue;
    // cantShoot countdown
    if (a.cantShootT > 0) a.cantShootT = Math.max(0, a.cantShootT - dt * 1000);
    // melee-замах countdown
    if (a.meleeT > 0) a.meleeT = Math.max(0, a.meleeT - dt);
    // bleeding
    if (a.bleedT && a.bleedT > 0) {
      a.bleedT -= dt * 1000;
      a.bleedTickT = (a.bleedTickT || 0) + dt;
      // тик урона раз в 0.5 сек
      if (a.bleedTickT >= 0.5) {
        a.bleedTickT = 0;
        const tick = (a.bleedDps || 3) * 0.5;
        a.hp = Math.max(0, a.hp - tick);
        // капля крови позади (стекает)
        if (Math.random() < 0.7) {
          bloodDrops.push({
            r: a.r + (Math.random()-0.5)*0.15,
            c: a.c + (Math.random()-0.5)*0.15,
            z: 0.05, vr: 0, vc: 0, vz: 0,
            life: 3500, max: 4500,
            size: 1.4 + Math.random() * 1.2,
            splat: true,
          });
        }
        // если истёк кровью насмерть — реакция
        if (a.hp <= 0 && a !== player) {
          maybeChatNearby(a, 'buddyDown', 0.5);
        }
      }
      if (a.bleedT <= 0) { a.bleedT = 0; a.bleedDps = 0; }
    }
  }

  // Оторванные части тела — летят с вращением и приземляются
  for (let i = goreParts.length - 1; i >= 0; i--) {
    const g = goreParts[i];
    if (g.landed) {
      g.life -= dt * 1000;
      if (g.life <= 0) goreParts.splice(i, 1);
      continue;
    }
    g.r += g.vr * dt;
    g.c += g.vc * dt;
    g.z += g.vz * dt;
    g.vz -= 7 * dt;
    g.rot += g.vrot * dt;
    g.vrot *= (1 - dt * 0.4);
    // лёгкое сопротивление по горизонтали
    g.vr *= (1 - dt * 0.6);
    g.vc *= (1 - dt * 0.6);
    if (g.z <= 0) {
      g.z = 0;
      g.vz = 0;
      g.landed = true;
      g.life = 8000;
      g.max = 8000;
      // капля крови под ним
      spawnBlood(g.r, g.c, null, 18);
    }
  }

  // Лужи огня — DoT и постепенное угасание
  for (let i = firePuddles.length - 1; i >= 0; i--) {
    const f = firePuddles[i];
    f.life -= dt * 1000;
    f.tickT += dt;
    // тик урона раз в 0.4 сек
    if (f.tickT >= 0.4) {
      f.tickT = 0;
      // игрок
      if (player.hp > 0 && Math.hypot(player.r - f.r, player.c - f.c) < f.radius) {
        player.hp = Math.max(0, player.hp - 8);
        player.hitT = 0.18;
      }
      // враги
      enemies.forEach(e => {
        if (e.hp <= 0) return;
        if (Math.hypot(e.r - f.r, e.c - f.c) < f.radius) e.hp = Math.max(0, e.hp - 6);
      });
      // укрытия
      damageCovers(f.r, f.c, f.radius, 12);
    }
    if (f.life <= 0) firePuddles.splice(i, 1);
  }

  // Вспышки
  for (let i = muzzles.length - 1; i >= 0; i--) {
    muzzles[i].life -= dt * 1000;
    if (muzzles[i].life <= 0) muzzles.splice(i, 1);
  }
  // Взрывы
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].life -= dt * 1000;
    if (explosions[i].life <= 0) explosions.splice(i, 1);
  }

  // Трупы остаются на земле — респауна нет

  // Камера плавно следует за игроком
  const targetCamX = (player.c - player.r) * TS * 0.5;
  const targetCamY = (player.c + player.r) * TS * 0.5 * ISO_Y;
  const camLerp = 1 - Math.pow(0.001, dt); // плавность
  cam.x += (targetCamX - cam.x) * camLerp;
  cam.y += (targetCamY - cam.y) * camLerp;

  // Проверка завершения боя (победа / поражение)
  checkFightEnd();
}

function triggerExplosion(r, c, dmg) {
  const D = dmg || 60;
  explosions.push({ r, c, life: 600, max: 600, radius: 1.8 });
  // урон врагам в радиусе (взрыв = дополнительный шанс отрыва конечностей)
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    if (Math.hypot(e.r - r, e.c - c) < 2.0) {
      const angAway = Math.atan2(e.r - r, e.c - c); // импульс ОТ эпицентра
      damageActor(e, D, angAway);
    }
  });
  // урон игроку
  if (player.hp > 0 && Math.hypot(player.r - r, player.c - c) < 2.0) {
    const angAway = Math.atan2(player.r - r, player.c - c);
    damageActor(player, D, angAway);
    player.hitT = Math.max(player.hitT, 0.35);
  }
  // урон укрытиям в радиусе
  damageCovers(r, c, 2.0, D);
}

function throwGrenade(from, targetR, targetC, team, opts) {
  opts = opts || {};
  const kind = opts.kind || 'grenade';
  _playThrowSound(kind);
  grenades.push({
    fromR: from.r, fromC: from.c,
    tr: targetR, tc: targetC,
    t: 0, T: 1.1, // время полёта 1.1 сек
    r: from.r, c: from.c,
    fromTeam: team || 'enemy',
    kind,
    dmg: opts.dmg || (kind === 'grenade' ? 60 : 22),
  });
}

function spawnFirePuddle(r, c, team) {
  firePuddles.push({ r, c, life: 4000, max: 4000, radius: 1.6, fromTeam: team || 'enemy', tickT: 0 });
}

function fireWeapon(p, weaponKey, team) {
  const wKey = weaponKey || currentWeapon;
  const tm = team || 'player';
  const cfg = WEAPON_FX_CFG[wKey] || WEAPON_FX_CFG.pistol;
  try { cfg.sound(); } catch(e) {}
  p.fireCD = cfg.cd;
  // ШУМ: огнестрел от игрока → мгновенная тревога; ближний бой тихий
  if (tm === 'player' && !cfg.melee) {
    setAlert(2, 'shot');
  }
  // Игрок начал бить ближним → запускаем анимацию замаха
  if (tm === 'player') p.meleeT = 0.28;
  if (cfg.melee) {
    // === СТЕЛС-КИЛЛ: если игрок и есть цель за спиной — мгновенно ваншот ===
    if (tm === 'player') {
      const back = findBackstabTarget();
      if (back) {
        // тихое убийство в спину: гарантированный ваншот + кровь, без шума
        p.angle = Math.atan2(back.r - p.r, back.c - p.c);
        const slitDmg = back.hpMax + 200; // оверкилл — труп упадёт
        damageActor(back, slitDmg, p.angle, wKey === 'blade_short' ? 'sniper' : null);
        spawnBlood(back.r, back.c, p.angle, 80);
        // лёгкий звук — но НЕ повышаем тревогу: тихо
        return;
      }
    }
    // ближний бой: проверка попадания в радиусе перед носителем
    const tx = p.r + Math.sin(p.angle) * cfg.range;
    const tc = p.c + Math.cos(p.angle) * cfg.range;
    const victims = (tm === 'player') ? enemies : [player];
    victims.forEach(v => {
      if (v.hp <= 0) return;
      if (Math.hypot(v.r - tx, v.c - tc) < 0.9) {
        // На босса меньше шансов на гибинг, но урон x1.5 от ближнего
        const dmgFinal = (v.isBoss ? (cfg.dmg || 12) * 1.5 : (cfg.dmg || 12));
        damageActor(v, dmgFinal, p.angle);
      }
    });
    return;
  }

  const speed = 18; // тайлов/сек
  const angle = p.angle;
  const spread = cfg.spread || 0;
  const pellets = cfg.pellets || 1;
  const burst = cfg.burst || 1;
  const burstInt = cfg.burstInterval || 0;

  // Урон врагов ослаблен, иначе их 4 валят за секунду
  const dmgMul = (tm === 'enemy') ? 0.35 : 1;
  // Точка вылета пули — конец дула. muzzleD задан per-weapon (0.5..1.15 тайлов).
  const muzD = cfg.muzzleD != null ? cfg.muzzleD : 0.5;
  const spawnOne = (a) => {
    const dr = Math.sin(a), dc = Math.cos(a);
    bullets.push({
      r: p.r + dr * muzD, c: p.c + dc * muzD,
      vr: dr * speed, vc: dc * speed,
      color: cfg.color || '#ffea80',
      thick: cfg.thick || false,
      explosive: cfg.explosive || false,
      dmg: (cfg.dmg || 25) * dmgMul,
      dist: 0, maxDist: cfg.range || 8,
      team: tm,
      wepKey: wKey,
    });
  };

  for (let b = 0; b < burst; b++) {
    setTimeout(() => {
      for (let i = 0; i < pellets; i++) {
        const a = angle + (Math.random() - 0.5) * spread * 2;
        spawnOne(a);
      }
      // вспышка дула — там же где вылетает пуля + угол для лучей
      muzzles.push({ r: p.r + Math.sin(angle)*muzD, c: p.c + Math.cos(angle)*muzD, angle: angle, life: 90, max: 90 });
    }, b * burstInt);
  }
}

// ── LOS: рейкаст по тайлам (DDA) ───────────────────────────────────
function hasLOS(r1, c1, r2, c2) {
  const dr = r2 - r1, dc = c2 - c1;
  const dist = Math.hypot(dr, dc);
  const steps = Math.ceil(dist * 4);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const r = r1 + dr * t, c = c1 + dc * t;
    if (isBlocked(r, c)) return false;
  }
  return true;
}

// ── AI врагов ──────────────────────────────────────────────────────
function updateEnemyAI(e, dt) {
  if (e.hp <= 0) return;
  e.fireCD = Math.max(0, e.fireCD - dt * 1000);
  e.repositionT = Math.max(0, e.repositionT - dt);
  if (e.isBoss) {
    e.grenadeCD = Math.max(0, e.grenadeCD - dt * 1000);
    e.rushCD = Math.max(0, e.rushCD - dt * 1000);
    e.rushT = Math.max(0, e.rushT - dt);
  }

  const distToPlayer = Math.hypot(player.r - e.r, player.c - e.c);
  const angleToPlayer = Math.atan2(player.r - e.r, player.c - e.c);
  const playerAlive = player.hp > 0;
  // Учитываем FOV: вне боя враг видит ТОЛЬКО в конусе перед собой
  const canSee = canEnemySeePlayer(e);
  // Если увидел игрока — мгновенно бой
  if (canSee && playerAlive) setAlert(2, 'sight');

  // Босс в режиме rush — игнорирует обычное поведение, прёт на игрока
  if (e.isBoss && e.rushT > 0 && playerAlive) {
    e.aiState = 'rush';
    e.angle = angleToPlayer;
    const dr = player.r - e.r, dc = player.c - e.c;
    const d = Math.hypot(dr, dc);
    if (d > 0.5) {
      const sp = 7.5 * getSpeedMul(e);
      tryMove(e, dr / d * sp * dt, dc / d * sp * dt);
      e.walkPhase += dt * 16;
    }
    if (d < 1.1 && e.fireCD <= 0) {
      fireWeapon(e, 'bat', 'enemy');
    }
    return;
  }

  // Босс — спецатаки если игрок где-то рядом
  if (e.isBoss && playerAlive && distToPlayer < 12) {
    // граната: каждые ~6 сек.
    // Если игрока НЕ видно (он за стенкой/укрытием) — кидаем молотов: лужа огня выкуривает.
    // Если видно — обычная граната.
    if (e.grenadeCD <= 0 && distToPlayer > 2.5 && distToPlayer < 10) {
      const kind = canSee ? 'grenade' : 'molotov';
      const dmg = kind === 'grenade' ? 80 : 0; // молотов урон через DoT в луже
      throwGrenade(e, player.r, player.c, 'enemy', { kind, dmg });
      e.grenadeCD = 6500 + Math.random() * 2500;
      e.fireCD = Math.max(e.fireCD, 800);
      // КРИК "Кидаю гранату!" / "Гори, гадёныш!"
      maybeChat(e, kind === 'molotov' ? 'molotov' : 'grenade', 1);
    }
    // rush: каждые ~9 сек, если игрок не вплотную и есть LOS
    if (e.rushCD <= 0 && distToPlayer > 3 && distToPlayer < 9 && canSee) {
      e.rushT = 1.2;
      e.rushCD = 10000 + Math.random() * 3000;
      maybeChat(e, 'rush', 1);
    }
  }

  if (canSee) {
    e.angle = angleToPlayer;
    const cfg = WEAPON_FX_CFG[e.weapon] || WEAPON_FX_CFG.pistol;
    const optRange = (cfg.range || 8) * 0.7;
    // Стреляем если в дистанции (с разбросом прицела, чтобы не вальнули с одного выстрела)
    if (distToPlayer < (cfg.range || 8) && e.fireCD <= 0 && !(e.cantShootT > 0)) {
      const aimErr = (Math.random() - 0.5) * (e.isBoss ? 0.16 : 0.28);
      const saveAngle = e.angle;
      e.angle = angleToPlayer + aimErr;
      fireWeapon(e, e.weapon, 'enemy');
      e.angle = saveAngle;
      // ~7% шанс крикнуть боевую фразу при выстреле
      if (Math.random() < 0.07) maybeChat(e, 'fire', 1);
    } else if (e.cantShootT > 0 && Math.random() < 0.005) {
      // редкое напоминание что не может стрелять
      maybeChat(e, 'cantShoot', 1);
    }
    // Перемещение: держим дистанцию + стрейф
    e.aiState = 'shoot';
    if (e.repositionT <= 0) {
      // выбираем новую точку чтобы стрейфить
      const strafe = (Math.random() - 0.5) * Math.PI;
      const targetDist = Math.max(2.5, optRange * 0.6);
      e.targetR = player.r + Math.sin(angleToPlayer + Math.PI + strafe) * targetDist;
      e.targetC = player.c + Math.cos(angleToPlayer + Math.PI + strafe) * targetDist;
      e.repositionT = 1.0 + Math.random() * 1.5;
    }
    // движемся к targetR/C если оно задано и далеко
    moveTowardsTarget(e, dt, e.isBoss ? 2.2 : 2.8);
  } else if (playerAlive && distToPlayer < e.sightR * 1.6) {
    // Слышим игрока — идём в его сторону
    e.aiState = 'chase';
    e.angle = angleToPlayer;
    e.targetR = player.r; e.targetC = player.c;
    moveTowardsTarget(e, dt, e.isBoss ? 2.5 : 3.2);
  } else {
    // патруль
    e.aiState = 'patrol';
    if (e.repositionT <= 0 || e.targetR == null) {
      // случайная точка в открытом тайле
      for (let tries = 0; tries < 20; tries++) {
        const rr = 1 + Math.random() * (ROWS - 2);
        const cc = 1 + Math.random() * (COLS - 2);
        if (!isBlocked(rr, cc)) { e.targetR = rr; e.targetC = cc; break; }
      }
      e.repositionT = 2.5 + Math.random() * 2.5;
    }
    moveTowardsTarget(e, dt, 1.6);
  }
}

function moveTowardsTarget(e, dt, speed) {
  if (e.targetR == null) return;
  const dr = e.targetR - e.r, dc = e.targetC - e.c;
  const d = Math.hypot(dr, dc);
  if (d < 0.2) { e.walkPhase *= 0.85; return; }
  const eff = speed * getSpeedMul(e);  // потеря ноги → ползёт
  const vr = dr / d * eff, vc = dc / d * eff;
  const before = { r: e.r, c: e.c };
  tryMove(e, vr * dt, vc * dt);
  // если уперлись — сбросим точку, чтобы выбрать новую
  if (Math.abs(e.r - before.r) < 0.001 && Math.abs(e.c - before.c) < 0.001) {
    e.repositionT = 0;
  }
  e.walkPhase += dt * 10;
  if (e.aiState !== 'shoot') e.angle = Math.atan2(vr, vc);
}

// ── ВВОД (джойстики) ───────────────────────────────────────────────
const stage = document.getElementById('stage');
const joyBase = document.getElementById('joyBase');
const joyKnob = document.getElementById('joyKnob');
const aimBase = document.getElementById('aimBase');
const aimKnob = document.getElementById('aimKnob');
const JOY_RADIUS = 55;

function startTouch(x, y, id) {
  const stageW = stage.clientWidth;
  if (x < stageW / 2) {
    if (joyL.active) return;
    joyL.active = true; joyL.id = id; joyL.ox = x; joyL.oy = y;
    joyL.dx = 0; joyL.dy = 0;
    joyBase.style.left = (x - 55) + 'px';
    joyBase.style.top  = (y - 55) + 'px';
    joyBase.classList.add('on');
    joyKnob.style.transform = 'translate(0,0)';
  } else {
    if (joyR.active) return;
    joyR.active = true; joyR.id = id; joyR.ox = x; joyR.oy = y;
    joyR.dx = 0; joyR.dy = 0;
    aimBase.style.left = (x - 55) + 'px';
    aimBase.style.top  = (y - 55) + 'px';
    aimBase.classList.add('on');
    aimKnob.style.transform = 'translate(0,0)';
    // первый выстрел сразу, как только палец легли (только если игрок жив)
    if (player.hp > 0 && player.fireCD <= 0) {
      // нужно, чтобы был angle — будем считать что нажал = смотрит вверх если не двигает
      player.angle = -Math.PI / 2;
      tryFirePlayer();
    }
  }
}

function moveTouch(x, y, id) {
  if (joyL.active && joyL.id === id) {
    let dx = x - joyL.ox, dy = y - joyL.oy;
    const d = Math.hypot(dx, dy);
    if (d > JOY_RADIUS) { dx = dx / d * JOY_RADIUS; dy = dy / d * JOY_RADIUS; }
    joyL.dx = dx / JOY_RADIUS;
    joyL.dy = dy / JOY_RADIUS;
    joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
  }
  if (joyR.active && joyR.id === id) {
    let dx = x - joyR.ox, dy = y - joyR.oy;
    const d = Math.hypot(dx, dy);
    if (d > JOY_RADIUS) { dx = dx / d * JOY_RADIUS; dy = dy / d * JOY_RADIUS; }
    joyR.dx = dx / JOY_RADIUS;
    joyR.dy = dy / JOY_RADIUS;
    aimKnob.style.transform = `translate(${dx}px, ${dy}px)`;
  }
}

function endTouch(id) {
  if (joyL.active && joyL.id === id) {
    joyL.active = false; joyL.dx = 0; joyL.dy = 0;
    joyBase.classList.remove('on');
  }
  if (joyR.active && joyR.id === id) {
    joyR.active = false; joyR.dx = 0; joyR.dy = 0;
    aimBase.classList.remove('on');
  }
}

stage.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = stage.getBoundingClientRect();
    startTouch(t.clientX - rect.left, t.clientY - rect.top, t.identifier);
  }
}, { passive: false });
stage.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = stage.getBoundingClientRect();
    moveTouch(t.clientX - rect.left, t.clientY - rect.top, t.identifier);
  }
}, { passive: false });
stage.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) endTouch(t.identifier);
}, { passive: false });
stage.addEventListener('touchcancel', (e) => {
  for (const t of e.changedTouches) endTouch(t.identifier);
}, { passive: false });

// Мышь — для desktop
stage.addEventListener('mousedown', (e) => {
  const rect = stage.getBoundingClientRect();
  startTouch(e.clientX - rect.left, e.clientY - rect.top, 'mouse-' + e.button);
});
window.addEventListener('mousemove', (e) => {
  const rect = stage.getBoundingClientRect();
  moveTouch(e.clientX - rect.left, e.clientY - rect.top, 'mouse-0');
  moveTouch(e.clientX - rect.left, e.clientY - rect.top, 'mouse-2');
});
window.addEventListener('mouseup', (e) => {
  endTouch('mouse-' + e.button);
});
stage.addEventListener('contextmenu', (e) => e.preventDefault());

// ── Мини-карта ─────────────────────────────────────────────────────
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');
function renderMinimap() {
  const mw = mm.width, mh = mm.height;
  const cellW = mw / COLS, cellH = mh / ROWS;
  mctx.fillStyle = '#0a0d14'; mctx.fillRect(0, 0, mw, mh);
  // тайлы
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = MAP[r][c];
      if (t === 0) continue;
      mctx.fillStyle = (t === 1) ? '#444' : (t === 3 ? '#604040' : '#604830');
      mctx.fillRect(c * cellW, r * cellH, cellW, cellH);
    }
  }
  // трупы (тёмные точки)
  enemies.forEach(e => {
    if (e.hp > 0) return;
    mctx.fillStyle = '#5a1010';
    mctx.beginPath();
    mctx.arc(e.c * cellW + cellW/2, e.r * cellH + cellH/2, Math.min(cellW, cellH) * 0.22, 0, Math.PI*2);
    mctx.fill();
  });
  // живые враги (красные/сиреневые)
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    mctx.fillStyle = e.isBoss ? '#c060ff' : '#ff3030';
    mctx.beginPath();
    const radius = e.isBoss ? Math.min(cellW, cellH) * 0.5 : Math.min(cellW, cellH) * 0.35;
    mctx.arc(e.c * cellW + cellW/2, e.r * cellH + cellH/2, radius, 0, Math.PI*2);
    mctx.fill();
    if (e.isBoss) {
      mctx.strokeStyle = '#fff'; mctx.lineWidth = 1;
      mctx.stroke();
    }
  });
  // игрок (зелёный)
  mctx.fillStyle = '#5dd55d';
  mctx.beginPath();
  mctx.arc(player.c * cellW + cellW/2, player.r * cellH + cellH/2, Math.min(cellW, cellH) * 0.42, 0, Math.PI*2);
  mctx.fill();
  mctx.strokeStyle = '#fff'; mctx.lineWidth = 1.5;
  mctx.stroke();
  // направление взгляда игрока
  const dx = Math.cos(player.angle), dy = Math.sin(player.angle);
  mctx.strokeStyle = '#5dd55d'; mctx.lineWidth = 2;
  mctx.beginPath();
  mctx.moveTo(player.c * cellW + cellW/2, player.r * cellH + cellH/2);
  mctx.lineTo(player.c * cellW + cellW/2 + dx * cellW * 1.2, player.r * cellH + cellH/2 + dy * cellH * 1.2);
  mctx.stroke();
}

// ── HUD: аватар персонажа (анимированный) ─────────────────────────
const hudAvatarCanvas = document.getElementById('hudAvatar');
const hudAvatarCtx = hudAvatarCanvas.getContext('2d');
function renderHudAvatar(t) {
  const W = hudAvatarCanvas.width, H = hudAvatarCanvas.height;
  hudAvatarCtx.clearRect(0, 0, W, H);
  // фон-радиал чтоб смотрелось "стеклянно"
  const grad = hudAvatarCtx.createRadialGradient(W*0.5, H*0.3, 0, W*0.5, H*0.3, W*0.7);
  grad.addColorStop(0, '#2a3142');
  grad.addColorStop(1, '#0a0d12');
  hudAvatarCtx.fillStyle = grad;
  hudAvatarCtx.fillRect(0, 0, W, H);
  // получаем спрайт игрока и рисуем с лёгкой "идлой" + bob если в движении
  const sprite = getSprite(player.look);
  // вписываем по высоте (спрайт 110:200, ratio 0.55) — крупно, занимает почти весь канвас
  const sh = H * 1.0;
  const sw = sh * 0.55;
  const idleBob = Math.sin(t * 0.003) * 1.5;
  const moveBob = player.moving ? Math.sin(player.walkPhase * 1.2) * 3.5 : 0;
  const lean = player.moving ? Math.sin(player.walkPhase) * 0.05 : 0;
  hudAvatarCtx.save();
  hudAvatarCtx.translate(W/2, H * 0.96 + idleBob + moveBob);
  hudAvatarCtx.rotate(lean);
  hudAvatarCtx.drawImage(sprite, -sw/2, -sh, sw, sh);
  hudAvatarCtx.restore();
  // HP-вспышка по краям если low
  const ratio = player.hp / player.hpMax;
  if (ratio <= 0.25) {
    const pulse = 0.3 + Math.abs(Math.sin(t * 0.006)) * 0.5;
    hudAvatarCtx.strokeStyle = 'rgba(255,40,40,' + pulse + ')';
    hudAvatarCtx.lineWidth = 4;
    hudAvatarCtx.strokeRect(2, 2, W - 4, H - 4);
  }
  // вспышка попадания
  if (player.hitT > 0) {
    hudAvatarCtx.fillStyle = 'rgba(255,40,40,' + (player.hitT * 0.4) + ')';
    hudAvatarCtx.fillRect(0, 0, W, H);
  }
}

  } else {
    // вернём текущий ближний из MELEE_LABELS
    meleeIconEl.textContent = MELEE_ICONS[lastMeleeWeapon] || '👊';
    meleeLabelEl.textContent = MELEE_LABELS[lastMeleeWeapon] || 'кулаки';
    meleeLabelEl.style.color = '#cfd6e6';
  }
}

let lastT = performance.now();
let fpsAcc = 0, fpsN = 0, fpsLast = lastT;
let mmFrame = 0;
function loop(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  update(dt);
  render();
  // Мини-карта — раз в 5 кадров
  if (++mmFrame % 5 === 0) renderMinimap();

  // HUD: HP-бар + красная вспышка + game over
  const hpEl = document.getElementById('hpVal');
  const hpMaxEl = document.getElementById('hpMaxVal');
  const hpBar = document.getElementById('hpBarFill');
  const flash = document.getElementById('hitFlash');
  const go = document.getElementById('gameOver');
  if (hpEl) hpEl.textContent = Math.round(player.hp);
  if (hpMaxEl) hpMaxEl.textContent = player.hpMax;
  if (hpBar) {
    const ratio = player.hp / player.hpMax;
    hpBar.style.width = (ratio * 100) + '%';
    hpBar.classList.remove('low', 'crit');
    if (ratio <= 0.25) hpBar.classList.add('crit');
    else if (ratio <= 0.5) hpBar.classList.add('low');
  }
  if (flash) flash.style.background = 'rgba(255,40,40,' + (player.hitT * 1.6).toFixed(2) + ')';
  if (go) go.style.display = (player.hp <= 0) ? 'flex' : 'none';

  // Анимированный аватар + иконка оружия в HUD
  renderHudAvatar(t);
  renderHudWepIcon();
  renderAlertBanner();
  renderBackstabHint();

  // Индикатор патронов и перезарядки
  const ammoText = document.getElementById('ammoText');
  const reloadBar = document.getElementById('reloadBar');
  const cfg = WEAPON_FX_CFG[currentWeapon];
  if (cfg && cfg.melee) {
    if (ammoText) ammoText.textContent = '∞ (ближний бой)';
    if (reloadBar) reloadBar.style.width = '0%';
  } else if (cfg) {
    const a = getAmmo(currentWeapon);
    if (a && ammoText) ammoText.textContent = a.cur + ' / ' + cfg.mag;
    if (a && a.reloading && reloadBar) {
      const now = performance.now();
      const rT = Math.max(0, a.reloadEnd - now);
      const ratio = 1 - rT / (cfg.reload || 1500);
      reloadBar.style.width = (ratio * 100).toFixed(0) + '%';
    } else if (reloadBar) {
      reloadBar.style.width = '0%';
    }
  }
  fpsAcc++; fpsN++;
  if (t - fpsLast > 500) {
    document.getElementById('fps').textContent = Math.round(fpsAcc / ((t - fpsLast) / 1000));
    fpsAcc = 0; fpsLast = t;
  }
  requestAnimationFrame(loop);
}

resize();
initCoverHP();
updateMeleeBtn();
// Сохраняем оригинальную карту для респа
const MAP_ORIGINAL = MAP.map(row => row.slice());

// ── Заполняем катсцену данными босса/района ────────────────────────
(function initCatscene() {
  document.getElementById('catLoc').textContent       = THEME.name;
  document.getElementById('catBossEmoji').textContent = BOSS_CFG.emoji;
  document.getElementById('catBossName').textContent  = BOSS_CFG.name;
  document.getElementById('catBossHP').textContent    = '❤️ ' + BOSS_CFG.hp + ' HP';
  document.getElementById('catQuote').textContent     = '«' + BOSS_CFG.quote + '»';
  // подсвечиваем нужное оружие в топбаре
  document.querySelectorAll('.wbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.wep === INITIAL_WEAPON);
  });
  const cat = document.getElementById('catscene');
  const startGame = (mode) => {
    cat.style.display = 'none';
    gamePaused = false;
    fightStatsBegin();
    if (mode === 'frontal') {
      setAlert(2, 'manual');
    }
  };
  document.getElementById('btnStealth').onclick = () => startGame('stealth');
  document.getElementById('btnFrontal').onclick = () => startGame('frontal');
  // Кнопки финального экрана
  document.getElementById('btnBackDistrict').onclick = () => sendResultAndClose('district');
  document.getElementById('btnBackMenu').onclick     = () => sendResultAndClose('menu');
})();

requestAnimationFrame(loop);
</script>
</body>
</html>
