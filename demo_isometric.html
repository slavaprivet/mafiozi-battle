<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Изометрическая боёвка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d12; font-family: -apple-system,Segoe UI,Roboto,sans-serif; color: #fff; touch-action: none; }
  #wrap { position: fixed; inset: 0; display: flex; flex-direction: column; }
  #topbar {
    flex: 0 0 auto; display: flex; gap: 4px; padding: 6px;
    background: linear-gradient(180deg, #1a1f2c 0%, #12161e 100%);
    border-bottom: 1px solid #2a3142;
    overflow-x: auto; scrollbar-width: none;
  }
  #topbar::-webkit-scrollbar { display: none; }
  .wbtn {
    flex: 0 0 auto; padding: 6px 10px; border-radius: 8px;
    background: #232a3a; border: 1px solid #2e3648;
    color: #cfd6e6; font-size: 12px; font-weight: 600;
    white-space: nowrap; cursor: pointer; transition: all .12s;
  }
  .wbtn.active { background: #ffd76b; color: #1a1a1a; border-color: #ffe080; box-shadow: 0 0 12px rgba(255,215,107,.4); }
  .wbtn:active { transform: scale(.95); }
  #stage { flex: 1 1 auto; position: relative; overflow: hidden; background: #0b0d12; }
  canvas#gc { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  /* Джойстики */
  .joy-base, .aim-base {
    position: absolute; width: 110px; height: 110px;
    border-radius: 50%; background: rgba(255,255,255,.06);
    border: 2px solid rgba(255,255,255,.12);
    pointer-events: none; opacity: 0; transition: opacity .15s;
    z-index: 5;
  }
  .joy-base.on, .aim-base.on { opacity: 1; }
  .joy-knob, .aim-knob {
    position: absolute; width: 46px; height: 46px; left: 50%; top: 50%;
    margin-left: -23px; margin-top: -23px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #aab2c8 70%);
    border: 1px solid rgba(0,0,0,.4); box-shadow: 0 4px 12px rgba(0,0,0,.5);
  }
  .aim-knob { background: radial-gradient(circle at 35% 30%, #ffe080, #c89030 80%); }
  #hud {
    position: absolute; left: 10px; top: 10px; z-index: 6;
    background: linear-gradient(180deg, rgba(20,24,32,.92) 0%, rgba(10,12,18,.85) 100%);
    padding: 8px 12px 8px 8px; border-radius: 12px;
    border: 1px solid #3a4452;
    box-shadow: 0 4px 14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    font-size: 11px; line-height: 1.3;
    display: flex; gap: 10px; align-items: center;
    min-width: 240px;
  }
  #hudAvatar {
    width: 88px; height: 88px;
    border-radius: 12px;
    background: radial-gradient(circle at 50% 30%, #2a3142 0%, #14181f 100%);
    border: 2px solid #4a5468;
    box-shadow: inset 0 0 8px rgba(0,0,0,.6);
    flex-shrink: 0;
    display: block;
  }
  #hudInfo { display: flex; flex-direction: column; gap: 3px; flex: 1; pointer-events: none; }
  #hudInfo .row1 {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; color: #ffd76b;
    text-shadow: 0 1px 2px #000;
  }
  #hudWepIcon { width: 50px; height: 16px; flex-shrink: 0; }
  #hudInfo .hp-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #cfd6e6;
  }
  #hudInfo .hp-row .label { color: #8a92a8; font-size: 10px; }
  #hpBarBig {
    width: 130px; height: 12px;
    background: #1a1e26; border: 1px solid #3a4452; border-radius: 6px;
    overflow: hidden; position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.6);
    transition: border-color .25s, box-shadow .25s;
  }
  #hpBarBig.alert-suspect {
    border-color: #b58820;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.6), 0 0 8px rgba(255,210,80,.55);
  }
  #hpBarBig.alert-combat {
    border-color: #c83030;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.6), 0 0 10px rgba(255,40,40,.6);
    animation: hpAlertPulse 1s ease-in-out infinite;
  }
  @keyframes hpAlertPulse {
    0%, 100% { box-shadow: inset 0 1px 3px rgba(0,0,0,.6), 0 0 10px rgba(255,40,40,.6); }
    50%      { box-shadow: inset 0 1px 3px rgba(0,0,0,.6), 0 0 16px rgba(255,60,60,.95); }
  }
  #hpBarFill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg,#5dd55d,#3aa53a);
    transition: width .2s, background .2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
  }
  #hpBarFill.low { background: linear-gradient(90deg,#ffd24a,#cf8a20); }
  #hpBarFill.crit { background: linear-gradient(90deg,#ff5050,#a02020); }
  #hudInfo .fps-row {
    font-size: 9px; color: #5a6478; pointer-events: none;
  }
  #alertIcon {
    font-size: 14px; line-height: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
    transition: filter .25s, transform .25s;
  }
  #alertIcon.suspect { filter: drop-shadow(0 0 4px rgba(255,210,80,.85)); }
  #alertIcon.combat  {
    filter: drop-shadow(0 0 5px rgba(255,60,60,1));
    animation: alertIconPulse 1s ease-in-out infinite;
  }
  @keyframes alertIconPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }
  #hudBtns {
    display: flex; flex-direction: column; gap: 3px;
    pointer-events: auto;
  }
  #hudBtns button {
    padding: 3px 7px; background: #2a3142; color: #cfd6e6;
    border: 1px solid #4a5468; border-radius: 5px;
    font-size: 10px; cursor: pointer; white-space: nowrap;
    transition: background .1s;
  }
  #hudBtns button:hover { background: #3a4458; color: #ffd76b; }
  #hudBtns button:active { transform: scale(.95); }
  #hint {
    position: absolute; right: 10px; bottom: 10px; z-index: 6;
    background: rgba(0,0,0,.4); padding: 6px 10px; border-radius: 8px;
    font-size: 10px; color: #aab2c8; pointer-events: none; max-width: 160px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <button class="wbtn" data-wep="fists">кулаки</button>
    <button class="wbtn" data-wep="brass">кастет</button>
    <button class="wbtn" data-wep="bat">бита</button>
    <button class="wbtn" data-wep="blade_short">нож</button>
    <button class="wbtn" data-wep="blade_long">катана</button>
    <button class="wbtn active" data-wep="pistol">пистолет</button>
    <button class="wbtn" data-wep="pistol_heavy">тяж.пистолет</button>
    <button class="wbtn" data-wep="pistol_gold">золотой</button>
    <button class="wbtn" data-wep="shotgun">дробовик</button>
    <button class="wbtn" data-wep="smg">ПП</button>
    <button class="wbtn" data-wep="rifle">винтовка</button>
    <button class="wbtn" data-wep="sniper">снайперка</button>
    <button class="wbtn" data-wep="rpg">РПГ</button>
  </div>
  <div id="stage">
    <canvas id="gc"></canvas>
    <div class="joy-base" id="joyBase"><div class="joy-knob" id="joyKnob"></div></div>
    <div class="aim-base" id="aimBase"><div class="aim-knob" id="aimKnob"></div></div>
    <div id="hud">
      <canvas id="hudAvatar" width="128" height="128"></canvas>
      <div id="hudInfo">
        <div class="row1">
          <canvas id="hudWepIcon" width="100" height="32"></canvas>
          <span id="wepName">пистолет</span>
        </div>
        <div class="hp-row">
          <span id="alertIcon" title="Не замечен">👻</span>
          <span class="label">HP</span>
          <div id="hpBarBig"><div id="hpBarFill"></div></div>
          <span id="hpVal">100</span><span style="color:#5a6478">/<span id="hpMaxVal">100</span></span>
        </div>
        <div class="fps-row">FPS: <span id="fps">0</span></div>
      </div>
      <div id="hudBtns">
        <button id="rerollBtn">🎲 Перс</button>
        <button id="resetBtn">↻ Респ</button>
      </div>
    </div>
    <!-- Боевой UI справа снизу: melee-кнопка + индикатор патронов/перезарядки -->
    <div id="combatUI" style="position:absolute;right:14px;bottom:14px;z-index:6;display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:none">
      <div id="ammoBox" style="background:rgba(0,0,0,.55);padding:6px 10px;border-radius:8px;border:1px solid #3a4452;font-size:12px;color:#fff;text-align:right;min-width:120px">
        <div id="ammoText" style="font-weight:bold">— / —</div>
        <div style="height:6px;background:#222;border-radius:3px;margin-top:4px;overflow:hidden">
          <div id="reloadBar" style="height:100%;width:0;background:linear-gradient(90deg,#ffd76b,#ff8030);transition:width .1s"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;pointer-events:auto">
        <button id="reloadBtn" title="Перезарядка (R)" style="width:52px;height:52px;background:rgba(40,50,70,.85);border:2px solid #4a5468;border-radius:10px;color:#ffd76b;font-size:11px;font-weight:bold;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)">↻<br>R</button>
        <button id="meleeBtn" title="Ближний бой" style="width:64px;height:64px;background:rgba(60,30,30,.85);border:2px solid #7a3a3a;border-radius:12px;color:#ffd76b;font-size:30px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5);position:relative">
          <span id="meleeIcon">👊</span>
          <span id="meleeLabel" style="position:absolute;left:0;right:0;bottom:2px;font-size:9px;color:#cfd6e6;font-weight:bold">кулаки</span>
        </button>
      </div>
    </div>
    <div id="hitFlash" style="position:absolute;inset:0;background:rgba(255,40,40,0);pointer-events:none;z-index:7;transition:background .1s"></div>
    <div id="gameOver" style="position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.55);z-index:8;color:#ff5050;font-size:32px;font-weight:bold;text-shadow:0 0 12px #800;pointer-events:none">
      <div>☠ ВЫ МЕРТВЫ ☠</div>
      <div style="font-size:13px;color:#ccc;font-weight:normal;margin-top:8px;pointer-events:auto">нажмите «↻ Респ» в HUD</div>
    </div>
    <canvas id="minimap" width="140" height="200" style="position:absolute;right:10px;top:10px;z-index:6;border:1px solid rgba(255,255,255,.25);border-radius:6px;background:rgba(0,0,0,.5);pointer-events:none"></canvas>
    <div id="hint">Левая половина — ходить<br>Правая — целиться/стрелять</div>
    <!-- Финальный экран: статистика + кнопки возврата -->
    <div id="resultScene" style="position:absolute;inset:0;z-index:31;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%, rgba(30,20,15,.65), rgba(0,0,0,.96));backdrop-filter:blur(4px);color:#fff;gap:10px;padding:24px;text-align:center;pointer-events:auto">
      <div id="resEmoji" style="font-size:72px;line-height:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.8))">🏆</div>
      <div id="resTitle" style="font-size:26px;font-weight:bold;color:#ffd76b;text-shadow:0 2px 6px #000;margin-top:4px">ПОБЕДА</div>
      <div id="resSubtitle" style="font-size:13px;color:#aab2c8;font-style:italic;margin-bottom:8px">— Босс повержен —</div>
      <div id="resStats" style="display:grid;grid-template-columns:auto auto;gap:6px 18px;font-size:13px;color:#cfd6e6;background:rgba(20,24,32,.85);border:1px solid #3a4452;padding:14px 22px;border-radius:10px;min-width:260px">
        <div style="text-align:left;color:#8a92a8">⏱ Время:</div><div id="resTime" style="text-align:right;font-weight:bold">0:00</div>
        <div style="text-align:left;color:#8a92a8">💀 Убито:</div><div id="resKills" style="text-align:right;font-weight:bold">0</div>
        <div style="text-align:left;color:#8a92a8">🔫 Выстрелов:</div><div id="resShots" style="text-align:right;font-weight:bold">0</div>
        <div style="text-align:left;color:#8a92a8">❤️ HP остаток:</div><div id="resHP" style="text-align:right;font-weight:bold">0/0</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center">
        <button id="btnBackDistrict" style="padding:12px 18px;background:linear-gradient(180deg,#2a4a30,#1a3020);border:2px solid #4a7a4a;border-radius:10px;color:#5dd55d;font-size:13px;font-weight:bold;cursor:pointer;min-width:150px">↩ К району</button>
        <button id="btnBackMenu" style="padding:12px 18px;background:linear-gradient(180deg,#2a3548,#1a2030);border:2px solid #4a6080;border-radius:10px;color:#80a0d0;font-size:13px;font-weight:bold;cursor:pointer;min-width:150px">🏠 В меню</button>
      </div>
    </div>
    <!-- Катсцена: выбор тактики перед боем -->
    <div id="catscene" style="position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%, rgba(30,20,15,.55), rgba(0,0,0,.95));backdrop-filter:blur(3px);color:#fff;gap:14px;padding:24px;text-align:center;pointer-events:auto">
      <div id="catLoc" style="font-size:11px;color:#aab2c8;letter-spacing:3px;text-transform:uppercase">район</div>
      <div id="catBossEmoji" style="font-size:64px;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.7))">👤</div>
      <div id="catBossName" style="font-size:24px;font-weight:bold;color:#ffd76b;text-shadow:0 2px 4px #000">Босс</div>
      <div id="catBossHP" style="font-size:11px;color:#ff7070">❤️ 0 HP</div>
      <div id="catQuote" style="font-size:13px;color:#aab2c8;max-width:340px;font-style:italic;margin:4px 0 12px">«…»</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button id="btnStealth" style="padding:14px 20px;background:linear-gradient(180deg,#2a4030,#1a2820);border:2px solid #4a7a4a;border-radius:10px;color:#5dd55d;font-size:14px;font-weight:bold;cursor:pointer;min-width:130px">🤫 СТЕЛС<br><span style="font-size:10px;color:#a0c0a0;font-weight:normal">подкрасться</span></button>
        <button id="btnFrontal" style="padding:14px 20px;background:linear-gradient(180deg,#4a2020,#2a1010);border:2px solid #a04040;border-radius:10px;color:#ff7070;font-size:14px;font-weight:bold;cursor:pointer;min-width:130px">💥 В ЛОБ<br><span style="font-size:10px;color:#c0a0a0;font-weight:normal">бой сразу</span></button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ЗВУКОВОЙ ДВИЖОК (перенос 1-в-1 из battle.html, строки 622–711)
// ════════════════════════════════════════════════════════════════
let _audioCtx = null;
function _getAudio() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { _audioCtx = null; }
  }
  return _audioCtx;
}
function _tone(o) {
  const ctx = _getAudio(); if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const g = ctx.createGain();
  osc.type = o.type || 'square';
  osc.frequency.setValueAtTime(o.freq, now);
  if (o.freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.freqEnd), now + o.dur);
  g.gain.setValueAtTime(o.vol != null ? o.vol : 0.18, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + o.dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(now); osc.stop(now + o.dur + 0.04);
}
function _noise(o) {
  const ctx = _getAudio(); if (!ctx) return;
  const dur = o.dur || 0.12;
  const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * dur)), ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(o.vol != null ? o.vol : 0.22, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  let last = src;
  if (o.filter) {
    const f = ctx.createBiquadFilter();
    f.type = o.filter; f.frequency.setValueAtTime(o.filterFreq || 1500, ctx.currentTime);
    if (o.q) f.Q.setValueAtTime(o.q, ctx.currentTime);
    src.connect(f); last = f;
  }
  last.connect(g).connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + dur + 0.05);
}

// muzzleD — расстояние от центра персонажа до конца дула в тайлах (где спавнятся пули/вспышки)
// twoHanded — двуручное (вторая рука поддерживает оружие на цевье)
const WEAPON_FX_CFG = {
  fists:        { sound:()=>{ _tone({freq:140,freqEnd:80,dur:0.08,type:'sine',vol:0.18}); }, cd: 350, range: 1.4, melee: true, dmg: 12, muzzleD: 0.5, twoHanded: false },
  brass:        { sound:()=>{ _tone({freq:210,freqEnd:90,dur:0.10,type:'square',vol:0.24}); _noise({dur:0.06,vol:0.14,filter:'lowpass',filterFreq:600}); }, cd: 380, range: 1.4, melee: true, dmg: 18, muzzleD: 0.55, twoHanded: false },
  chain:        { sound:()=>{ _noise({dur:0.22,vol:0.16,filter:'bandpass',filterFreq:2400}); _tone({freq:800,freqEnd:300,dur:0.18,type:'triangle',vol:0.10}); }, cd: 500, range: 1.8, melee: true, dmg: 25, muzzleD: 0.75, twoHanded: false },
  bat:          { sound:()=>{ _tone({freq:180,freqEnd:55,dur:0.22,type:'triangle',vol:0.26}); _noise({dur:0.08,vol:0.14,filter:'lowpass',filterFreq:400}); }, cd: 500, range: 1.6, melee: true, dmg: 30, muzzleD: 0.85, twoHanded: true },
  blade_short:  { sound:()=>{ _noise({dur:0.10,vol:0.18,filter:'highpass',filterFreq:3000}); _tone({freq:2400,freqEnd:1200,dur:0.08,type:'sine',vol:0.08}); }, cd: 320, range: 1.3, melee: true, dmg: 22, muzzleD: 0.6, twoHanded: false },
  blade_long:   { sound:()=>{ _noise({dur:0.20,vol:0.18,filter:'highpass',filterFreq:2000}); _tone({freq:1500,freqEnd:400,dur:0.15,type:'sawtooth',vol:0.08}); }, cd: 450, range: 1.7, melee: true, dmg: 35, muzzleD: 1.0, twoHanded: true },
  pistol:       { sound:()=>{ _tone({freq:300,freqEnd:80,dur:0.08,type:'square',vol:0.30}); _noise({dur:0.05,vol:0.20}); }, cd: 260, range: 8, color: '#ffea80', spread: 0.05, dmg: 22, mag: 12, reload: 1200, muzzleD: 0.75, twoHanded: false },
  pistol_heavy: { sound:()=>{ _tone({freq:200,freqEnd:50,dur:0.13,type:'square',vol:0.36}); _noise({dur:0.07,vol:0.24,filter:'lowpass',filterFreq:800}); }, cd: 420, range: 9, color: '#ffb060', spread: 0.04, thick: true, dmg: 38, mag: 8, reload: 1500, muzzleD: 0.8, twoHanded: false },
  pistol_gold:  { sound:()=>{ _tone({freq:620,freqEnd:200,dur:0.10,type:'sawtooth',vol:0.30}); _tone({freq:1200,freqEnd:400,dur:0.08,type:'sine',vol:0.14}); _noise({dur:0.05,vol:0.15}); }, cd: 240, range: 9, color: '#ffd76b', spread: 0.03, dmg: 28, mag: 14, reload: 1100, muzzleD: 0.75, twoHanded: false },
  shotgun:      { sound:()=>{ _tone({freq:120,freqEnd:30,dur:0.18,type:'square',vol:0.42}); _noise({dur:0.14,vol:0.32,filter:'lowpass',filterFreq:500}); }, cd: 700, range: 5, color: '#ffaa50', spread: 0.35, pellets: 6, dmg: 14, mag: 6, reload: 1800, muzzleD: 1.0, twoHanded: true },

      row.push(t > 0 ? (COVER_TYPES[t].hp || -1) : 0);
    }
    coverHP.push(row);
  }
}

// Нанести урон укрытию в одной клетке. Возвращает true если поглотило (пуля останавливается).
function damageCoverAt(r, c, dmg) {
  const ri = Math.floor(r), ci = Math.floor(c);
  if (ri < 0 || ri >= ROWS || ci < 0 || ci >= COLS) return false;
  const t = MAP[ri][ci];
  if (t === 0) return false;
  // искра от попадания
  spawnHitSpark(r, c, t);
  if (t === 1) return true; // стена — неразрушима
  const cfg = COVER_TYPES[t];
  coverHP[ri][ci] -= dmg;
  if (coverHP[ri][ci] <= 0) {
    // эффект разрушения с разлёта частиц
    spawnCoverBreak(ri, ci, t);
    MAP[ri][ci] = 0;
    coverHP[ri][ci] = 0;
    // бочка взрывается при уничтожении
    if (cfg && cfg.explodeOnBreak) triggerExplosion(ri + 0.5, ci + 0.5, 50);
  }
  return true;
}

function spawnHitSpark(r, c, coverType) {
  // короткая искра/пыль на месте удара пули
  const cfg = COVER_TYPES[coverType];
  hitSparks.push({
    r, c, life: 200, max: 200,
    color: cfg ? cfg.topColor : '#888',
  });
}

// Брызги крови от попадания. dmg задаёт интенсивность.
// dirAngle — направление полёта пули, чтоб брызги летели ВПЕРЁД (по ходу пули).
function spawnBlood(r, c, dirAngle, dmg) {
  const intensity = Math.min(3, 0.5 + dmg / 30);  // 0.5..3
  const N = Math.floor(8 * intensity + Math.random() * 6);
  for (let i = 0; i < N; i++) {
    const ang = (dirAngle != null ? dirAngle : Math.random() * Math.PI * 2)
      + (Math.random() - 0.5) * 1.6;
    const sp = (0.6 + Math.random() * 2.4) * intensity * 0.6;
    bloodDrops.push({
      r, c,
      z: 0.45 + Math.random() * 0.35,
      vr: Math.sin(ang) * sp,
      vc: Math.cos(ang) * sp,
      vz: 0.5 + Math.random() * 1.6,
      life: 700 + Math.random() * 500,
      max: 1200,
      size: (1.4 + Math.random() * 2.4) * Math.min(2, intensity),
      splat: false,
    });
  }
}

// Отрыв части тела при большом уроне. kind: head/arm/leg/hand
function spawnGorePart(r, c, dirAngle, kind, victim) {
  const ang = (dirAngle != null ? dirAngle : Math.random() * Math.PI * 2)
    + (Math.random() - 0.5) * 0.7;
  const sp = 1.2 + Math.random() * 2.0;
  const skin = victim && victim.look ? (SKINS[victim.look.skin] || SKINS[0]) : '#d0a070';
  // Цвет одежды: суиту мужика или платью женщины — берём из bodyDefs (упрощённо)
  const bodyCol = victim && victim.look
    ? (victim.look.gender === 0
       ? (['#1a1a2e','#1a2e1a','#2e1a1a','#1a1e2e'][victim.look.body % 4])
       : (['#3a1a3a','#1a2a3a','#3a1a1a','#1a3a2a'][victim.look.body % 4]))
    : '#1a1a2e';
  goreParts.push({
    r, c, z: 0.7,
    vr: Math.sin(ang) * sp,
    vc: Math.cos(ang) * sp,
    vz: 1.6 + Math.random() * 1.4,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 14,
    kind, skinCol: skin, bodyCol,
    life: 6000, max: 6000,
    landed: false,
  });
}

// Универсальный хелпер для применения урона по живому персонажу
// (вызывается отовсюду где было `v.hp -= dmg`).
// dirAngle — направление импульса (откуда летит пуля/откуда взрыв) для брызг.
function damageActor(v, dmg, dirAngle, weaponKey) {
  if (!v || v.hp <= 0) return;
  const wasAlive = v.hp > 0;
  const prevHp = v.hp;
  v.hp = Math.max(0, v.hp - dmg);
  if (v === player) player.hitT = Math.max(player.hitT || 0, 0.25);
  // Кровь — всегда при попадании
  spawnBlood(v.r, v.c, dirAngle, dmg);

  if (!v.lostParts) v.lostParts = {};
  const killed = wasAlive && v.hp <= 0;
  const overkill = killed && dmg > prevHp;          // пуля сняла больше чем оставалось HP
  const wasLowHp = prevHp <= 35;                     // был на грани
  const gibWeapon = weaponKey === 'shotgun' || weaponKey === 'rpg' || weaponKey === 'sniper';

  // ── GIBBING: убийство снайперкой/дробовиком/РПГ при низком HP → разрывает на куски ──
  if (killed && gibWeapon && (wasLowHp || dmg >= 80) && v !== player) {
    // куча частей + море крови
    const allParts = ['head','arm','leg','hand','arm','leg','hand'];
    for (const k of allParts) {
      const dir = (dirAngle != null ? dirAngle : 0) + (Math.random() - 0.5) * 2.5;
      spawnGorePart(v.r, v.c, dir, k, v);
    }
    spawnBlood(v.r, v.c, dirAngle, dmg * 2.5);
    spawnBlood(v.r, v.c, null, dmg * 2);
    v.lostParts.head = v.lostParts.arm = v.lostParts.leg = v.lostParts.hand = true;
    v.hp = 0;
    if (Math.random() < 0.7) maybeChatNearby(v, 'buddyDown', 0.9);
    return;
  }

  // ── ГОЛОВА: только если убил оверкилл-выстрелом при низком HP ──
  if (overkill && wasLowHp && dmg >= 25 && !v.lostParts.head && Math.random() < 0.75) {
    v.lostParts.head = true;
    spawnGorePart(v.r, v.c, dirAngle, 'head', v);
    spawnBlood(v.r, v.c, dirAngle, dmg * 1.8);
    v.hp = 0;
    if (v !== player) maybeChatNearby(v, 'buddyDown', 0.6);
    return;
  }

  // ── РУКА / НОГА / КИСТЬ: при крупном уроне, шанс зависит от dmg ──
  let goreChance = 0;
  if (dmg >= 80)                goreChance = 0.65;
  else if (dmg >= 50)           goreChance = 0.30;
  else if (dmg >= 30 && killed) goreChance = 0.22;
  if (Math.random() < goreChance) {
    const candidates = ['arm','leg','hand'].filter(k => !v.lostParts[k]);
    if (candidates.length > 0) {
      const kind = candidates[Math.floor(Math.random() * candidates.length)];
      v.lostParts[kind] = true;
      spawnGorePart(v.r, v.c, dirAngle, kind, v);
      spawnBlood(v.r, v.c, dirAngle, dmg * 1.3);
      // потеря руки/кисти → временно не может стрелять
      if (kind === 'arm' || kind === 'hand') {
        v.cantShootT = Math.max(v.cantShootT || 0, 4000);
        if (v !== player) maybeChat(v, 'cantShoot', 0.8);
      }
      if (kind === 'leg' && v !== player) maybeChat(v, 'hurt', 0.7);
    }
  }

  // ── КРИТ → кровотечение DoT ──
  // 15% базовый шанс, +20% при крупном уроне
  const critChance = dmg >= 50 ? 0.35 : 0.15;
  if (!killed && Math.random() < critChance) {
    v.bleedT = Math.max(v.bleedT || 0, 5500 + Math.random() * 2500);
    v.bleedDps = 2 + dmg * 0.04; // урон в секунду от кровотечения
    v.bleedTickT = 0;
    if (v !== player) maybeChat(v, 'hurt', 0.5);
  } else if (!killed) {
    if (v !== player && Math.random() < 0.20) maybeChat(v, 'hurt', 1);
  }

  // мёртв (и не разорван) — иногда напарники реагируют
  if (killed && v !== player) {
    if (Math.random() < 0.45) maybeChatNearby(v, 'buddyDown', 0.6);
  }
}

// Реплика у соседнего напарника (живого, в радиусе 8 тайлов)
// ═══════════════════════════════════════════════════════════════════
// СТЕЛС-СИСТЕМА: уровень тревоги, FOV-конусы зрения, тихие убийства
// ═══════════════════════════════════════════════════════════════════
// 0 = спокойно (👻 "Не замечен"), 1 = подозрение (💡 "Что-то заподозрили"),
// 2 = бой (🔴 "Тебя обнаружили")
let alertLevel = 0;
let alertDecayT = 0;          // сек после последнего "контакта" — для остывания
const FOV_HALF_RAD = Math.PI / 2.5;   // ±36° → конус 72°
const ALERT_DECAY_TIME = 9;            // сек на спад до spuasus после потери игрока
const SUSPECT_TO_CALM_TIME = 14;       // сек на возврат к "спокойно"

// Может ли враг видеть игрока (с учётом FOV)
function canEnemySeePlayer(e) {
  if (!e || e.hp <= 0 || player.hp <= 0) return false;
  const dx = player.c - e.c, dy = player.r - e.r;
  const dist = Math.hypot(dx, dy);
  if (dist > e.sightR) return false;
  if (!hasLOS(e.r, e.c, player.r, player.c)) return false;
  // В режиме боя — 360°: уже знают где ты
  if (alertLevel >= 2) return true;
  // Если стоит ВПРИТЫК (<1 тайл) — почувствует независимо от FOV
  if (dist < 1.0) return true;
  // Проверка FOV
  const angToPlayer = Math.atan2(dy, dx);
  let diff = angToPlayer - e.angle;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return Math.abs(diff) <= FOV_HALF_RAD;
}

// Может ли враг увидеть труп (для перехода в "подозрение")
function canEnemySeeCorpse(e, dead) {
  if (!e || e.hp <= 0 || !dead || dead.hp > 0) return false;
  const dx = dead.c - e.c, dy = dead.r - e.r;
  const dist = Math.hypot(dx, dy);
  if (dist > 5) return false;                              // труп видим в радиусе 5
  if (!hasLOS(e.r, e.c, dead.r, dead.c)) return false;
  // FOV (трупы видим только в конусе)
  const ang = Math.atan2(dy, dx);
  let diff = ang - e.angle;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return Math.abs(diff) <= FOV_HALF_RAD;
}

// Игрок ЗА СПИНОЙ у врага (для стелс-килла)
function isPlayerBehind(e) {
  if (!e || e.hp <= 0 || player.hp <= 0) return false;
  const dx = player.c - e.c, dy = player.r - e.r;
  const dist = Math.hypot(dx, dy);
  if (dist > 1.2) return false;
  const ang = Math.atan2(dy, dx);
  let diff = ang - e.angle;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  // back-arc ±63° от противоположного направления
  return Math.abs(Math.abs(diff) - Math.PI) < Math.PI * 0.35;
}

// Найти врага, к которому можно подкрасться (живой, ближайший в спине, не босс)
function findBackstabTarget() {
  if (player.hp <= 0 || alertLevel >= 2) return null;     // в бою — нельзя
  let best = null, bestD = 99;
  for (const e of enemies) {
    if (e.hp <= 0 || e.isBoss) continue;
    if (!isPlayerBehind(e)) continue;
    const d = Math.hypot(player.r - e.r, player.c - e.c);
    if (d < bestD) { bestD = d; best = e; }
  }
  return best;
}

// Поднять уровень тревоги (с учётом источника)
function setAlert(level, source) {
  if (level > alertLevel) {
    alertLevel = level;
    alertDecayT = 0;
    // реакция врагов
    if (level >= 2 && source !== 'silent') {
      const alive = enemies.filter(e => e.hp > 0);
      if (alive.length) {
        const e = alive[Math.floor(Math.random() * alive.length)];
        maybeChat(e, 'spot', 0.9);
      }
    } else if (level === 1) {
      const alive = enemies.filter(e => e.hp > 0);
      if (alive.length) {
        const e = alive[Math.floor(Math.random() * alive.length)];
        spawnChat(e, 'Эй, что это было?', 2500);
      }
    }
  } else if (level === alertLevel) {
    alertDecayT = 0;  // сбрасываем затухание при подтверждении
  }
}

function maybeChatNearby(deadActor, kind, chance) {
  if (!enemies) return;
  const buddies = enemies.filter(e => e !== deadActor && e.hp > 0
    && Math.hypot(e.r - deadActor.r, e.c - deadActor.c) < 8);
  if (buddies.length === 0) return;
  const b = buddies[Math.floor(Math.random() * buddies.length)];
  maybeChat(b, kind, chance);
}

// Множитель скорости — потерял ногу → еле тащится. Используется в движении.
function getSpeedMul(v) {
  if (!v || !v.lostParts) return 1;
  let m = 1;
  if (v.lostParts.leg)  m *= 0.40;
  if (v.lostParts.arm)  m *= 0.85;
  if (v.lostParts.hand) m *= 0.95;
  return m;
}

function spawnCoverBreak(ri, ci, type) {
  const cfg = COVER_TYPES[type];
  if (!cfg) return;
  const N = type === 3 ? 18 : (type === 4 ? 22 : 14); // больше частиц для крупных
  const particles = [];
  for (let i = 0; i < N; i++) {
    const ang = Math.random() * Math.PI * 2;
    const speed = 0.6 + Math.random() * 2.2;
    particles.push({
      r: ri + 0.5, c: ci + 0.5,
      vr: Math.sin(ang) * speed,
      vc: Math.cos(ang) * speed,
      z: 0.2 + Math.random() * 0.4,   // высота
      vz: 1.5 + Math.random() * 2.5,  // вверх
      size: 2 + Math.random() * 3,
      color: Math.random() < 0.5 ? cfg.topColor : cfg.sideColor,
    });
  }
  coverBreaks.push({
    r: ri + 0.5, c: ci + 0.5, type,
    life: 700, max: 700,
    particles,
  });
  // звук разрушения
  try {
    if (type === 3) { // бочка — металл
      _noise({dur:0.3,vol:0.32,filter:'bandpass',filterFreq:1500,q:5});
      _tone({freq:300,freqEnd:80,dur:0.2,type:'square',vol:0.22});
    } else if (type === 4) { // машина — крах стекла+металла
      _noise({dur:0.45,vol:0.36,filter:'highpass',filterFreq:1200});
      _tone({freq:200,freqEnd:50,dur:0.3,type:'sawtooth',vol:0.28});
    } else { // ящик — дерево
      _noise({dur:0.25,vol:0.28,filter:'lowpass',filterFreq:1500});
      _tone({freq:180,freqEnd:60,dur:0.18,type:'triangle',vol:0.24});
    }
  } catch(e) {}
}

// Урон всем укрытиям в радиусе (для взрывов/огня)
function damageCovers(r, c, radius, dmg) {
  const r0 = Math.max(0, Math.floor(r - radius));
  const r1 = Math.min(ROWS - 1, Math.floor(r + radius));
  const c0 = Math.max(0, Math.floor(c - radius));
  const c1 = Math.min(COLS - 1, Math.floor(c + radius));
  for (let ri = r0; ri <= r1; ri++) {
    for (let ci = c0; ci <= c1; ci++) {
      const t = MAP[ri][ci];
      if (t <= 1) continue; // 0 пусто, 1 стена
      const d = Math.hypot((ri + 0.5) - r, (ci + 0.5) - c);
      if (d < radius) damageCoverAt(ri + 0.5, ci + 0.5, dmg);
    }
  }
}

// Look игрока — из LocalStorage (или рандом при первом запуске)
function loadPlayerLook() {
  try {
    const saved = localStorage.getItem('mafiozi_demo_look');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  const fresh = rndLook();
  try { localStorage.setItem('mafiozi_demo_look', JSON.stringify(fresh)); } catch(e) {}
  return fresh;
}
function savePlayerLook(look) {
  try { localStorage.setItem('mafiozi_demo_look', JSON.stringify(look)); } catch(e) {}
}

// Игрок — стартовая позиция (центр карты, гарантированно открытый тайл)
const player = {
  r: SPAWNS.player[0], c: SPAWNS.player[1],
  hp: QP.playerHP, hpMax: QP.playerMax,
  atk: QP.playerAtk, def: QP.playerDef,
  name: QP.playerName,
  angle: 0,
  fireCD: 0, walkPhase: 0, moving: false, hitT: 0,
  look: loadPlayerLook(),
  ammo: {}, // {wepKey: {cur, reloading, reloadEnd}}
};

function getAmmo(key) {
  const cfg = WEAPON_FX_CFG[key];
  if (!cfg || !cfg.mag) return null; // melee — без патронов
  if (!player.ammo[key]) player.ammo[key] = { cur: cfg.mag, reloading: false, reloadEnd: 0 };
  return player.ammo[key];
}

function startReload(a, cfg) {
  if (a.reloading) return;
  a.reloading = true;
  a.reloadEnd = performance.now() + (cfg.reload || 1500);
  // звук перезарядки — короткий клик
  try { _tone({freq:600,freqEnd:200,dur:0.08,type:'square',vol:0.18}); } catch(e) {}
  setTimeout(() => { try { _tone({freq:380,freqEnd:160,dur:0.12,type:'square',vol:0.15}); _noise({dur:0.08,vol:0.10}); } catch(e) {} }, (cfg.reload || 1500) - 200);
}

function tryFirePlayer() {
  if (player.hp <= 0) return;
  if (player.fireCD > 0) return;
  const cfg = WEAPON_FX_CFG[currentWeapon];
  if (!cfg) return;
  if (cfg.melee) { fireWeapon(player); if (typeof fightStats !== 'undefined') fightStats.shots++; return; }
  const a = getAmmo(currentWeapon);
  if (!a) return;
  const now = performance.now();
  if (a.reloading) {
    if (now >= a.reloadEnd) { a.cur = cfg.mag; a.reloading = false; }
    else return;
  }
  if (a.cur <= 0) { startReload(a, cfg); return; }
  fireWeapon(player);
  if (typeof fightStats !== 'undefined') fightStats.shots++;
  a.cur -= 1;
  if (a.cur <= 0) startReload(a, cfg);
}

function manualReload() {
  if (player.hp <= 0) return;
  const cfg = WEAPON_FX_CFG[currentWeapon];
  if (!cfg || cfg.melee) return;
  const a = getAmmo(currentWeapon);
  if (!a || a.reloading || a.cur >= cfg.mag) return;
  startReload(a, cfg);
}

// Внешность босса берётся из BOSS_CFG (URL ?boss=...)
const BOSS_LOOK = BOSS_CFG.look;

// Враги: 1 босс + 3 миньона. Миньоны конфигурируются от района (район = сложность).
// AI: aiState — 'patrol' (бродит), 'chase' (бежит к игроку), 'shoot' (стреляет с позиции), 'rush' (босс-рывок)
const _DISTRICT_MINIONS = {

const _minions = _DISTRICT_MINIONS[CURRENT_LOC] || _DISTRICT_MINIONS.market;
const enemies = [

    weapon: _minions[0].w, fireCD: _minions[0].fc, sightR: 8, aiState: 'patrol', repositionT: 0, walkPhase: 0 },
  { r: SPAWNS.minions[1][0], c: SPAWNS.minions[1][1], hp: _minions[1].hp, hpMax: _minions[1].hp, angle: 0, look: rndLook(), isBoss: false,
    weapon: _minions[1].w, fireCD: _minions[1].fc, sightR: 8, aiState: 'patrol', repositionT: 0, walkPhase: 0 },

    weapon: _minions[2].w, fireCD: _minions[2].fc, sightR: 8, aiState: 'patrol', repositionT: 0, walkPhase: 0 },
];

const grenades = []; // {r, c, tr, tc, t, T, fromTeam, kind: 'grenade'|'molotov', dmg}
const firePuddles = []; // лужи огня от молотовых: {r, c, life, max, radius, fromTeam}
const coverBreaks = []; // эффекты разрушения укрытий: {r, c, life, max, type, particles[]}
const hitSparks = []; // искры от попаданий пуль: {r, c, life, max, color}
// === GORE: брызги крови (летят дугой и оседают как лужи) и оторванные части тела ===
const bloodDrops = []; // {r,c,z,vr,vc,vz,life,max,size,splat}

function spawnChat(owner, text, life) {
  if (!owner || !text) return;
  // если у этого овнера уже есть реплика — обновим её, а не плодим
  for (const b of chatBubbles) {
    if (b.owner === owner) {
      b.text = text; b.life = life || 2200; b.max = b.life;
      return;
    }
  }
  chatBubbles.push({ owner, text, life: life || 2200, max: life || 2200 });
}

function maybeChat(owner, kind, chance) {
  if (Math.random() > (chance != null ? chance : 0.5)) return;
  const list = PHRASES[kind]; if (!list || !list.length) return;
  spawnChat(owner, list[Math.floor(Math.random() * list.length)]);
}

let currentWeapon = INITIAL_WEAPON;

// Камера
const cam = { x: 0, y: 0 };
let TS = 64;        // tile size в пикселях (база)
let ISO_Y = 0.5;    // соотношение Y к X (0.5 = классика 2:1; меньше = площе; больше = вертикальнее)
let dpr = 1;

// Состояние джойстиков
const joyL = { active: false, id: null, ox: 0, oy: 0, dx: 0, dy: 0 };
const joyR = { active: false, id: null, ox: 0, oy: 0, dx: 0, dy: 0 };

function resize() {
  const stage = document.getElementById('stage');
  const w = stage.clientWidth, h = stage.clientHeight;
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Зум: примерно 8 тайлов в высоту видимой области → камера ближе.
  // Камера следует за игроком — не нужно чтобы вся карта влезла.
  TS = Math.min(w / 11, h / 8.5);
  TS = Math.max(60, Math.min(120, TS));
}
window.addEventListener('resize', resize);

// world(r,c) → screen(x,y) — изометрия с центром экрана
function w2s(r, c) {
  const stage = document.getElementById('stage');
  const cx = stage.clientWidth / 2;
  const cy = stage.clientHeight / 2;
  return {
    x: cx + (c - r) * TS * 0.5 - cam.x,
    y: cy + (c + r) * TS * 0.5 * ISO_Y - cam.y
  };
}

// "Высота" в экранных пикселях для объекта высотой h тайлов
function isoH(h) { return h * TS * 0.55; }

// Проверка проходимости клетки (целая часть)
function isBlocked(r, c) {
  const ri = Math.floor(r), ci = Math.floor(c);
  if (ri < 0 || ri >= ROWS || ci < 0 || ci >= COLS) return true;
  return MAP[ri][ci] !== 0;
}

// Попытка движения с скольжением по осям
function tryMove(obj, dr, dc) {
  const padding = 0.3;
  // По r
  let nr = obj.r + dr;
  if (!isBlocked(nr - padding, obj.c) && !isBlocked(nr + padding, obj.c) &&
      !isBlocked(nr, obj.c - padding) && !isBlocked(nr, obj.c + padding)) {
    obj.r = nr;
  }
  // По c
  let nc = obj.c + dc;
  if (!isBlocked(obj.r - padding, nc) && !isBlocked(obj.r + padding, nc) &&
      !isBlocked(obj.r, nc - padding) && !isBlocked(obj.r, nc + padding)) {
    obj.c = nc;
  }
}

// ── РЕНДЕР ─────────────────────────────────────────────────────────
function drawTile(r, c) {
  const p = w2s(r, c);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  // ромб
  ctx.beginPath();
  ctx.moveTo(p.x,       p.y - wy);
  ctx.lineTo(p.x + wx,  p.y);
  ctx.lineTo(p.x,       p.y + wy);
  ctx.lineTo(p.x - wx,  p.y);
  ctx.closePath();
  const dark = (r + c) % 2 === 0;
  ctx.fillStyle = dark ? THEME.floorA : THEME.floorB;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawCover(r, c, type) {
  const cfg = COVER_TYPES[type]; if (!cfg) return;
  const base = w2s(r + 0.5, c + 0.5);  // центр тайла (r/c — индекс ячейки)
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(cfg.h);
  // Уровень повреждения (0 = цел, 1 = почти разрушено)
  const dmgRatio = (cfg.hp > 0 && coverHP[r] != null && coverHP[r][c] != null)
    ? Math.max(0, 1 - coverHP[r][c] / cfg.hp) : 0;

  if (cfg.shape === 'cyl') {
    // ── ЦИЛИНДР (бочка) ──
    const cx = base.x, cy = base.y;
    // тень
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    ctx.beginPath();
    ctx.ellipse(cx + 3, cy + 4, wx * 0.45, wy * 0.45, 0, 0, Math.PI*2);
    ctx.fill();
    // боковая стенка
    const grd = ctx.createLinearGradient(cx - wx*0.4, cy, cx + wx*0.4, cy);
    grd.addColorStop(0, cfg.sideColor);
    grd.addColorStop(0.5, cfg.topColor);
    grd.addColorStop(1, cfg.sideColor);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(cx, cy, wx * 0.4, wy * 0.4, 0, 0, Math.PI, false);
    ctx.lineTo(cx + wx*0.4, cy - H);
    ctx.ellipse(cx, cy - H, wx * 0.4, wy * 0.4, 0, 0, Math.PI, true);
    ctx.closePath();
    ctx.fill();
    // верхняя крышка
    ctx.fillStyle = cfg.topColor;
    ctx.beginPath();
    ctx.ellipse(cx, cy - H, wx * 0.4, wy * 0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.5)';
    ctx.stroke();
    // обручи
    ctx.strokeStyle = 'rgba(0,0,0,.4)';
    ctx.lineWidth = 1;
    [0.3, 0.7].forEach(t => {
      ctx.beginPath();
      ctx.ellipse(cx, cy - H * (1 - t), wx * 0.4, wy * 0.4, 0, 0, Math.PI);
      ctx.stroke();
    });
  } else {
    // ── БОКС (стена, ящик, машина) ──
    // тень на полу
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.beginPath();
    ctx.moveTo(base.x,        base.y - wy);
    ctx.lineTo(base.x + wx,   base.y);
    ctx.lineTo(base.x,        base.y + wy);
    ctx.lineTo(base.x - wx,   base.y);
    ctx.closePath();
    ctx.fill();
    // 4 верхние точки бокса
    const top  = { x: base.x,      y: base.y - wy - H };
    const right= { x: base.x + wx, y: base.y      - H };
    const bot  = { x: base.x,      y: base.y + wy - H };
    const left = { x: base.x - wx, y: base.y      - H };
    // нижние точки
    const topB = { x: base.x,      y: base.y - wy };
    const rightB={ x: base.x + wx, y: base.y };
    const botB = { x: base.x,      y: base.y + wy };
    const leftB= { x: base.x - wx, y: base.y };
    // правая боковая грань (светлее)
    ctx.fillStyle = cfg.topColor;
    ctx.beginPath();
    ctx.moveTo(right.x, right.y);
    ctx.lineTo(bot.x,   bot.y);
    ctx.lineTo(botB.x,  botB.y);
    ctx.lineTo(rightB.x,rightB.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.5)';
    ctx.stroke();
    // левая боковая грань (темнее)
    ctx.fillStyle = cfg.sideColor;
    ctx.beginPath();
    ctx.moveTo(left.x, left.y);
    ctx.lineTo(bot.x,  bot.y);
    ctx.lineTo(botB.x, botB.y);
    ctx.lineTo(leftB.x,leftB.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // крышка (светлее всего)
    const grdTop = ctx.createLinearGradient(top.x, top.y, bot.x, bot.y);
    grdTop.addColorStop(0, lighten(cfg.topColor, 20));
    grdTop.addColorStop(1, cfg.topColor);
    ctx.fillStyle = grdTop;
    ctx.beginPath();
    ctx.moveTo(top.x,   top.y);
    ctx.lineTo(right.x, right.y);
    ctx.lineTo(bot.x,   bot.y);
    ctx.lineTo(left.x,  left.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Трещины при HP < 50% (только для разрушаемых)
  if (dmgRatio > 0.4 && cfg.hp > 0) {
    ctx.strokeStyle = 'rgba(0,0,0,' + (0.3 + dmgRatio * 0.4).toFixed(2) + ')';
    ctx.lineWidth = 1.5;
    // детерминированные «трещины» из центра — используем r/c как seed
    const seed = (r * 31 + c * 17) % 100;
    const nLines = Math.floor(2 + dmgRatio * 4);
    for (let i = 0; i < nLines; i++) {
      const ang = (seed + i * 37) % 360 * Math.PI / 180;
      const startD = 0.05 + ((seed + i * 11) % 30) / 200;
      const endD = 0.25 + dmgRatio * 0.2;
      const sx = base.x + Math.cos(ang) * wx * startD * 0.8;
      const sy = base.y - H * 0.8 + Math.sin(ang) * wy * startD * 0.8;
      const ex = base.x + Math.cos(ang) * wx * endD * 1.5;
      const ey = base.y - H * 0.8 + Math.sin(ang) * wy * endD * 1.5;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      // зигзаг
      const midX = (sx + ex) / 2 + Math.cos(ang + Math.PI/2) * 2;
      const midY = (sy + ey) / 2 + Math.sin(ang + Math.PI/2) * 2;
      ctx.lineTo(midX, midY);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    }
    // покачивание: если повреждение >70%, лёгкий tilt
    if (dmgRatio > 0.7) {
      // дым из трещин
      const smoke = (performance.now() * 0.003 + seed) % 1;
      ctx.fillStyle = 'rgba(80,80,80,' + (0.3 * (1 - smoke)).toFixed(2) + ')';
      ctx.beginPath();
      ctx.arc(base.x, base.y - H - 10 - smoke * 15, 4 + smoke * 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function lighten(hex, percent) {
  const c = hex.replace('#','');
  const num = parseInt(c, 16);
  let r = (num >> 16) + Math.round(2.55 * percent);
  let g = ((num >> 8) & 0xff) + Math.round(2.55 * percent);
  let b = (num & 0xff) + Math.round(2.55 * percent);
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r<<16) | (g<<8) | b).toString(16).padStart(6, '0');
}

const SKINS = ['#FDDBB4','#F0C27F','#D4935A','#A0622A','#7A3B10','#C8A882'];
const HAIR_COLORS_M = ['#1a0e00','#3d2200','#8b6333','#b8860b','#888','#111'];
const HAIR_COLORS_F = ['#1a0e00','#8b1a1a','#b8860b','#3d2200','#888','#c87050','#e0c080'];

function drawChar(ctx, W, H, opts) {
  const { gender, skin, body, face, hair, hat, _back } = opts;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2;
  const sc = Math.min(W, H) / 220;
  function px(x) { return cx + x * sc; }
  function py(y) { return H * 0.92 - y * sc; }
  const skinCol = SKINS[skin] || SKINS[0];
  if (gender === 0) drawMale(ctx, px, py, sc, skinCol, body, face, hair, hat, !!_back);
  else              drawFemale(ctx, px, py, sc, skinCol, body, face, hair, hat, !!_back);
}

function drawMale(ctx, px, py, sc, skinCol, body, face, hair, hat, isBack=false) {
  const bodyDefs = [
    { sw: 34, sh: 80, nw: 14, nh: 22, hw: 26 },
    { sw: 44, sh: 85, nw: 16, nh: 22, hw: 30 },
    { sw: 58, sh: 82, nw: 18, nh: 20, hw: 36 },
    { sw: 52, sh: 92, nw: 16, nh: 24, hw: 32 },
  ];
  const bd = bodyDefs[body] || bodyDefs[1];
  const suitCol = ['#1a1a2e','#1a2e1a','#2e1a1a','#1a1e2e'][body % 4];
  const tieCol  = ['#c0392b','#e8c96e','#8e44ad','#2980b9'][face % 4];
  ctx.fillStyle = suitCol;
  const legW = bd.sw * 0.38; const legH = 55 * sc;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw*0.22), py(legH), legW*sc, legH, 4*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw*0.22 - legW), py(legH), legW*sc, legH, 4*sc); ctx.fill();
  ctx.fillStyle = '#111';
  [-1,1].forEach(s => { ctx.beginPath(); ctx.ellipse(px(s*bd.sw*0.1), py(2), 10*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill(); });
  ctx.fillStyle = suitCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2), py(bd.sh), bd.sw*sc, bd.sh*sc, [0,0,6*sc,6*sc]); ctx.fill();
  if (!isBack) {
    ctx.fillStyle = '#ddd';
    ctx.beginPath(); ctx.roundRect(px(-7), py(bd.sh), 14*sc, bd.sh*0.7*sc, 2*sc); ctx.fill();
    ctx.fillStyle = tieCol;
    ctx.beginPath();
    ctx.moveTo(px(-5), py(bd.sh-4)); ctx.lineTo(px(5), py(bd.sh-4));
    ctx.lineTo(px(3), py(bd.sh*0.32)); ctx.lineTo(px(0), py(bd.sh*0.25));
    ctx.lineTo(px(-3), py(bd.sh*0.32)); ctx.closePath(); ctx.fill();
    ctx.fillStyle = suitCol;
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-2)); ctx.lineTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.sw/2), py(bd.sh-20)); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-2)); ctx.lineTo(px(bd.sw/2), py(bd.sh)); ctx.lineTo(px(bd.sw/2), py(bd.sh-20)); ctx.closePath(); ctx.fill();
  }
  const armLen = body===3?65:60, armW = body===3?13:10;
  ctx.fillStyle = suitCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2-armW*sc+2), py(bd.sh), armW*sc, armLen*sc, 5*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw/2-2), py(bd.sh), armW*sc, armLen*sc, 5*sc); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(-bd.sw/2-armW*sc/2+2), py(armLen-10), 7*sc, 9*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(bd.sw/2+armW*sc/2-2), py(armLen-10), 7*sc, 9*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.nw/2), py(bd.sh+bd.nh), bd.nw*sc, bd.nh*sc, 4*sc); ctx.fill();
  const headH = bd.hw*1.22;
  const headY = bd.sh + bd.nh + headH;
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+headH/2), bd.hw/2*sc, headH/2*sc, 0, 0, Math.PI*2); ctx.fill();
  if (!isBack) ctx.beginPath(), ctx.ellipse(px(0), py(bd.sh+bd.nh+5), bd.hw/2.2*sc, 10*sc, 0, 0, Math.PI), ctx.fill();
  if (!isBack) {
    const eyeY = bd.sh + bd.nh + headH*0.55;
    const eyeSpan = bd.hw*0.22;
    const mouthY = bd.sh + bd.nh + headH*0.18;
    drawFaceM(ctx, face, px, py, eyeY, eyeSpan, mouthY, bd, sc);
    if (hair > 0) drawHairM(ctx, hair, px, py, bd, headY, headH, sc);
    if (hat > 0)  drawHat(ctx, hat, px, py, bd, headY, headH, sc);
  }
}

function drawFemale(ctx, px, py, sc, skinCol, body, face, hair, hat, isBack=false) {
  const bodyDefs = [
    { sw: 30, sh: 78, nw: 12, nh: 20, hw: 24, hip: 32 },
    { sw: 36, sh: 80, nw: 13, nh: 20, hw: 27, hip: 40 },
    { sw: 48, sh: 76, nw: 15, nh: 18, hw: 32, hip: 54 },
    { sw: 34, sh: 85, nw: 13, nh: 22, hw: 26, hip: 38 },
  ];
  const bd = bodyDefs[body] || bodyDefs[1];
  const dressCol = ['#3a1a3a','#1a2a3a','#3a1a1a','#1a3a2a'][body % 4];
  const accentCol = ['#e8c96e','#c0392b','#8e44ad','#2980b9'][face % 4];
  ctx.fillStyle = dressCol;
  ctx.beginPath();
  ctx.moveTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.hip/2), py(0));
  ctx.lineTo(px(bd.hip/2), py(0)); ctx.lineTo(px(bd.sw/2), py(bd.sh));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#111';
  [-1,1].forEach(s => {
    ctx.beginPath(); ctx.ellipse(px(s*bd.hip*0.18), py(3), 8*sc, 4*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(s*bd.hip*0.18+4*sc), py(0), 3*sc, 8*sc, 1*sc); ctx.fill();
  });
  ctx.fillStyle = dressCol;
  ctx.beginPath();
  ctx.roundRect(px(-bd.sw/2), py(bd.sh), bd.sw*sc, bd.sh*sc, [0,0,6*sc,6*sc]); ctx.fill();
  if (!isBack) {
    ctx.fillStyle = '#f0e8e0';
    ctx.beginPath(); ctx.roundRect(px(-6), py(bd.sh), 12*sc, bd.sh*0.65*sc, 2*sc); ctx.fill();
    ctx.fillStyle = dressCol;
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-4)); ctx.lineTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.sw/2), py(bd.sh-18)); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-4)); ctx.lineTo(px(bd.sw/2), py(bd.sh)); ctx.lineTo(px(bd.sw/2), py(bd.sh-18)); ctx.closePath(); ctx.fill();
    ctx.fillStyle = accentCol;
    ctx.beginPath(); ctx.arc(px(-8), py(bd.sh-10), 4*sc, 0, Math.PI*2); ctx.fill();
  }
  const armLen = 58, armW = 8;
  ctx.fillStyle = dressCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2-armW*sc+2), py(bd.sh), armW*sc, armLen*sc, 4*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw/2-2), py(bd.sh), armW*sc, armLen*sc, 4*sc); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(-bd.sw/2-armW*sc/2+2), py(armLen-10), 6*sc, 8*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(bd.sw/2+armW*sc/2-2), py(armLen-10), 6*sc, 8*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.nw/2), py(bd.sh+bd.nh), bd.nw*sc, bd.nh*sc, 4*sc); ctx.fill();
  ctx.strokeStyle = accentCol; ctx.lineWidth = 2*sc;
  ctx.beginPath();
  ctx.arc(px(0), py(bd.sh+bd.nh+bd.nh*0.5), (bd.nw*0.7)*sc, Math.PI*0.2, Math.PI*0.8);
  ctx.stroke();
  const headH = bd.hw*1.18;
  const headY = bd.sh + bd.nh + headH;
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+headH/2), bd.hw/2*sc, headH/2*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+4), bd.hw/2.3*sc, 9*sc, 0, 0, Math.PI); ctx.fill();
  const eyeY = bd.sh + bd.nh + headH*0.55;
  const eyeSpan = bd.hw*0.22;
  const mouthY = bd.sh + bd.nh + headH*0.18;
  if (!isBack) {
    drawFaceF(ctx, face, px, py, eyeY, eyeSpan, mouthY, bd, sc);
    if (hair > 0) drawHairF(ctx, hair, px, py, bd, headY, headH, sc);
    if (hat > 0)  drawHat(ctx, hat, px, py, bd, headY, headH, sc);
  }
}

function drawFaceM(ctx, faceId, px, py, eyeY, eyeSpan, mouthY, bd, sc) {
  const eyeR = 4*sc;
  ctx.fillStyle = '#fff';
  [-1,1].forEach(s => { ctx.beginPath(); ctx.ellipse(px(s*eyeSpan), py(eyeY), eyeR*1.3, eyeR, 0, 0, Math.PI*2); ctx.fill(); });
  const pupilCol = ['#1a0a00','#1a0020','#002010','#100020'][faceId%4];
  ctx.fillStyle = pupilCol;
  const lookX = faceId===1?1.5:faceId===5?-0.5:0;
  [-1,1].forEach(s => { ctx.beginPath(); ctx.arc(px(s*eyeSpan+lookX*sc), py(eyeY), eyeR*0.65, 0, Math.PI*2); ctx.fill(); });
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5*sc; ctx.lineCap = 'round';
  const browAngles = [0,-0.3,0,0.15,0.2,0.25,-0.2,-0.15,0,0.1];
  const bAngle = browAngles[faceId]||0;
  [-1,1].forEach(s => {
    ctx.save(); ctx.translate(px(s*eyeSpan), py(eyeY+9)); ctx.rotate(s*bAngle);
    ctx.beginPath(); ctx.moveTo(-8*sc,0); ctx.lineTo(8*sc,0); ctx.stroke(); ctx.restore();
  });
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2*sc;
  if (faceId===0) { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY)); ctx.lineTo(px(8),py(mouthY)); ctx.stroke(); }
  else if (faceId===1) { ctx.beginPath(); ctx.moveTo(px(-9),py(mouthY+3)); ctx.quadraticCurveTo(px(0),py(mouthY-4),px(9),py(mouthY+3)); ctx.stroke(); }
  else if (faceId===5) { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY+4)); ctx.quadraticCurveTo(px(0),py(mouthY-2),px(8),py(mouthY+4)); ctx.stroke(); }
  else if (faceId===6) { ctx.beginPath(); ctx.moveTo(px(-6),py(mouthY)); ctx.quadraticCurveTo(px(3),py(mouthY+5),px(9),py(mouthY+2)); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY)); ctx.quadraticCurveTo(px(0),py(mouthY+3),px(8),py(mouthY)); ctx.stroke(); }
  if (faceId===2) {
    ctx.fillStyle = '#2a1800';
    ctx.beginPath(); ctx.ellipse(px(0),py(mouthY-12),14*sc,16*sc,0,0,Math.PI); ctx.fill();
    [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*14),py(mouthY+4),5*sc,10*sc,0,0,Math.PI*2);ctx.fill();});
  }
  if (faceId===3) {
    ctx.fillStyle='#1a0e00';
    ctx.beginPath();ctx.ellipse(px(-5),py(mouthY+6),7*sc,4*sc,0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px(5),py(mouthY+6),7*sc,4*sc,-0.3,0,Math.PI*2);ctx.fill();
  }
  if (faceId===4) {
    ctx.strokeStyle='#cc5555';ctx.lineWidth=2*sc;
    ctx.beginPath();ctx.moveTo(px(-10),py(eyeY+8));ctx.lineTo(px(-4),py(mouthY+8));ctx.stroke();
    ctx.strokeStyle='#ff8888';ctx.lineWidth=1*sc;ctx.stroke();
  }
  if (faceId===7) {
    ctx.strokeStyle='#a06060';ctx.lineWidth=2*sc;
    ctx.beginPath();ctx.moveTo(px(0),py(eyeY-4));ctx.lineTo(px(3),py(eyeY-10));ctx.lineTo(px(-1),py(eyeY-16));ctx.stroke();
  }
  if (faceId===8) {
    ctx.fillStyle='#eee';ctx.beginPath();ctx.roundRect(px(7),py(mouthY-1),18*sc,4*sc,2*sc);ctx.fill();
    ctx.fillStyle='#e8c96e';ctx.beginPath();ctx.roundRect(px(22),py(mouthY-1),5*sc,4*sc,1*sc);ctx.fill();
  }
}

function drawFaceF(ctx, faceId, px, py, eyeY, eyeSpan, mouthY, bd, sc) {
  const eyeR = 4.2*sc;
  const eyeColors = ['#1a3a5a','#3a1a1a','#1a3a1a','#3a1a3a','#2a2a1a','#1a2a3a','#3a0a0a','#1a1a2a','#3a2a0a','#0a2a3a'];
  ctx.fillStyle = eyeColors[faceId%eyeColors.length]+'66';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*eyeSpan),py(eyeY+2),eyeR*1.8,eyeR*0.7,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#fff';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*eyeSpan),py(eyeY),eyeR*1.4,eyeR,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#1a0a30';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(px(s*eyeSpan),py(eyeY),eyeR*0.7,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='#111';ctx.lineWidth=1.5*sc;
  [-1,1].forEach(s=>{
    for(let l=-2;l<=2;l++){
      ctx.beginPath();ctx.moveTo(px(s*eyeSpan+l*2.5),py(eyeY+eyeR));ctx.lineTo(px(s*eyeSpan+l*3),py(eyeY+eyeR+4));ctx.stroke();
    }
  });
  ctx.strokeStyle='#331a00';ctx.lineWidth=1.8*sc;ctx.lineCap='round';
  [-1,1].forEach(s=>{
    ctx.beginPath();ctx.moveTo(px(s*eyeSpan-8),py(eyeY+10));ctx.quadraticCurveTo(px(s*eyeSpan),py(eyeY+12),px(s*eyeSpan+8*s),py(eyeY+9));ctx.stroke();
  });
  ctx.fillStyle='#ff888844';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*(eyeSpan+8)),py(mouthY+6),9*sc,5*sc,0,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle=SKINS[0]+'88';ctx.lineWidth=1.5*sc;
  ctx.beginPath();ctx.arc(px(0),py((eyeY+mouthY)/2),3*sc,0.2*Math.PI,0.8*Math.PI);ctx.stroke();
  const lipColors=['#c0392b','#e74c3c','#c0392b','#ff1493','#a04040','#d35400','#e91e63','#880000','#c0392b','#8e44ad'];
  ctx.fillStyle = lipColors[faceId%lipColors.length];
  ctx.beginPath();
  ctx.moveTo(px(-8),py(mouthY));
  ctx.quadraticCurveTo(px(-4),py(mouthY+5),px(0),py(mouthY+3));
  ctx.quadraticCurveTo(px(4),py(mouthY+5),px(8),py(mouthY));
  ctx.quadraticCurveTo(px(4),py(mouthY-3),px(0),py(mouthY-2));
  ctx.quadraticCurveTo(px(-4),py(mouthY-3),px(-8),py(mouthY));
  ctx.closePath();ctx.fill();
  if (faceId===2) {
    ctx.fillStyle='#8e44ad44';
    [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*eyeSpan),py(eyeY+1),eyeR*1.6,eyeR*0.8,0,0,Math.PI*2);ctx.fill();});
  }
  if (faceId===4) {
    ctx.strokeStyle='#cc5555';ctx.lineWidth=1.5*sc;
    ctx.beginPath();ctx.moveTo(px(-10),py(eyeY+6));ctx.lineTo(px(-5),py(mouthY+6));ctx.stroke();
  }
  if (faceId===7) {
    ctx.fillStyle='#3a1a5544';
    ctx.beginPath();ctx.ellipse(px(-12),py(eyeY+2),7*sc,5*sc,0,0,Math.PI*2);ctx.fill();
  }
  if (faceId===8) {
    ctx.fillStyle='#eee';ctx.beginPath();ctx.roundRect(px(8),py(mouthY-2),14*sc,3*sc,2*sc);ctx.fill();
    ctx.fillStyle='#e8c96e';ctx.beginPath();ctx.roundRect(px(20),py(mouthY-2),4*sc,3*sc,1*sc);ctx.fill();
  }
}

function drawHairM(ctx, hairId, px, py, bd, headY, headH, sc) {
  const hc = HAIR_COLORS_M[hairId % HAIR_COLORS_M.length];
  const hw = bd.hw / 2;
  ctx.fillStyle = hc; ctx.strokeStyle = hc;
  if (hairId===1) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY-5),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffffff33';ctx.lineWidth=2*sc;
    ctx.beginPath();ctx.moveTo(px(-hw*0.5),py(headY-8));ctx.quadraticCurveTo(px(0),py(headY-12),px(hw*0.5),py(headY-8));ctx.stroke();
  } else if (hairId===2) {
    ctx.fillStyle=hc;
    ctx.beginPath();ctx.ellipse(px(0),py(headY+2),hw*sc,9*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px(-4*sc),py(headY+14),hw*0.8*sc,16*sc,-0.2,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===3) {
    ctx.beginPath();ctx.moveTo(px(-4),py(headY-2));ctx.lineTo(px(-3),py(headY+28));ctx.lineTo(px(3),py(headY+28));ctx.lineTo(px(4),py(headY-2));ctx.closePath();ctx.fill();
  } else if (hairId===4) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===5) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=8*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.quadraticCurveTo(px(s*(hw+5)),py(headY-20),px(s*(hw+1)),py(headY-70));ctx.stroke();});
  } else if (hairId===6) {
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.arc(px(i*7),py(headY+5),7*sc,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,8*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===7) {
    ctx.beginPath();ctx.ellipse(px(-4),py(headY+4),hw*0.9*sc,9*sc,-0.2,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.roundRect(px(-14),py(headY+5),14*sc,8*sc,3*sc);ctx.fill();
  } else if (hairId===8) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffffff44';ctx.lineWidth=1.5*sc;
    ctx.beginPath();ctx.moveTo(px(-3),py(headY-2));ctx.lineTo(px(-3),py(headY+10));ctx.stroke();
  } else if (hairId===9) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY+1),hw*sc,6*sc,0,Math.PI,Math.PI*2);ctx.fill();
  }
}

function drawHairF(ctx, hairId, px, py, bd, headY, headH, sc) {
  const hc = HAIR_COLORS_F[hairId % HAIR_COLORS_F.length];
  const hw = bd.hw / 2;
  ctx.fillStyle = hc;
  if (hairId===1) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(px(hw-2),py(headY));ctx.quadraticCurveTo(px(hw+10),py(headY-15),px(hw+5),py(headY-40));ctx.stroke();
    ctx.fillStyle='#e8c96e';ctx.beginPath();ctx.arc(px(hw-2),py(headY+2),3*sc,0,Math.PI*2);ctx.fill();
  } else if (hairId===2) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.lineTo(px(s*(hw+2)),py(headY-25));ctx.stroke();});
    ctx.fillStyle=hc;ctx.beginPath();ctx.ellipse(px(0),py(headY+8),hw*0.9*sc,6*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===3) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.quadraticCurveTo(px(s*(hw+6)),py(headY-30),px(s*(hw+3)),py(headY-80));ctx.stroke();});
  } else if (hairId===4) {
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.arc(px(i*6),py(headY+6),7*sc,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,8*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(px(s*hw),py(headY-15),5*sc,0,Math.PI*2);ctx.fill();});
  } else if (hairId===5) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.lineWidth=6*sc;ctx.strokeStyle=hc;
    ctx.beginPath();ctx.moveTo(px(hw-3),py(headY));ctx.lineTo(px(hw),py(headY-15));ctx.stroke();
    for(let i=0;i<5;i++){
      const y=headY-15-i*10;
      ctx.lineWidth=(4-i*0.3)*sc;ctx.strokeStyle=i%2===0?hc:HAIR_COLORS_F[(hairId+1)%HAIR_COLORS_F.length];
      ctx.beginPath();ctx.moveTo(px(hw-4),py(y));ctx.lineTo(px(hw+4),py(y-5));ctx.stroke();
    }
  } else if (hairId===6) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px(4),py(headY+22),10*sc,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff44';ctx.beginPath();ctx.arc(px(2),py(headY+20),4*sc,0,Math.PI*2);ctx.fill();
  } else if (hairId===7) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{
      ctx.lineWidth=9*sc;ctx.strokeStyle=hc;
      ctx.beginPath();
      ctx.moveTo(px(s*hw),py(headY));
      ctx.quadraticCurveTo(px(s*(hw+8)),py(headY-20),px(s*(hw+2)),py(headY-40));
      ctx.quadraticCurveTo(px(s*(hw+10)),py(headY-55),px(s*(hw+4)),py(headY-70));
      ctx.stroke();
    });
  } else if (hairId===8) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(px(-hw),py(headY+5));ctx.quadraticCurveTo(px(0),py(headY+12),px(hw*0.6),py(headY+3));ctx.lineWidth=8*sc;ctx.strokeStyle=hc;ctx.stroke();
  } else if (hairId===9) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY-2),(hw+2)*sc,12*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px(0),py(headY+4),(hw+2)*sc,8*sc,0,0,Math.PI);ctx.fill();
  }
}

function drawHat(ctx, hatId, px, py, bd, headY, headH, sc) {
  const hw = bd.hw / 2;
  const eyeY = headY - headH * 0.45;
  if (hatId===1) {
    ctx.fillStyle = '#1a0e00';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+2), (hw+10)*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(-hw+2), py(headY+2+26), (hw*2-4)*sc, 26*sc, 4*sc); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+2+26), (hw-6)*sc, 4*sc, 0, Math.PI, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e8c96e';
    ctx.fillRect(px(-hw+2), py(headY+2+4+2), (hw*2-4)*sc, 4*sc);
  } else if (hatId===2) {
    ctx.fillStyle = '#1a2e3a';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY), hw*sc, 14*sc, 0, Math.PI, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px(hw*0.5), py(headY), (hw+6)*sc, 4*sc, 0.15, 0, Math.PI); ctx.fill();
    ctx.fillStyle = '#e8c96e';
    ctx.beginPath(); ctx.arc(px(0), py(headY+12), 3*sc, 0, Math.PI*2); ctx.fill();
  } else if (hatId===3) {
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+4), (hw+1)*sc, (headH*0.5+2)*sc, 0, Math.PI*0.5, Math.PI*2.5); ctx.fill();
    ctx.beginPath(); ctx.arc(px(hw-1), py(headY+3), 5*sc, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff333322';
    for (let i=0; i<4; i++) { ctx.beginPath(); ctx.arc(px(-hw+5+i*6), py(headY+6), 2.5*sc, 0, Math.PI*2); ctx.fill(); }
  } else if (hatId===4) {
    ctx.fillStyle = '#5c3d11';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+3), (hw+14)*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px(-hw+2), py(headY+3));
    ctx.lineTo(px(-hw+6), py(headY+3+32));
    ctx.lineTo(px(-3),    py(headY+3+36));
    ctx.lineTo(px(3),     py(headY+3+36));
    ctx.lineTo(px(hw-6),  py(headY+3+32));
    ctx.lineTo(px(hw-2),  py(headY+3));
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8b6333';
    ctx.fillRect(px(-hw+2), py(headY+3+5), (hw*2-4)*sc, 3*sc);
  } else if (hatId===5) {
    const span = hw*0.55, lensW = (hw*0.55)*sc, lensH = 9*sc, gap = hw*0.08;
    ctx.strokeStyle='#111'; ctx.lineWidth = 2*sc; ctx.fillStyle='#1a3a5a88';
    ctx.beginPath(); ctx.roundRect(px(-(span+gap)), py(eyeY+5), lensW, lensH, 3*sc); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(px(gap),         py(eyeY+5), lensW, lensH, 3*sc); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(-gap), py(eyeY+9)); ctx.lineTo(px(gap), py(eyeY+9)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(-(span+gap)), py(eyeY+9)); ctx.lineTo(px(-hw-2), py(eyeY+6)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(gap+span),     py(eyeY+9)); ctx.lineTo(px(hw+2),  py(eyeY+6)); ctx.stroke();
  } else if (hatId===6) {
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(px(-11), py(eyeY), 9*sc, 7*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2.2*sc;
    ctx.beginPath(); ctx.moveTo(px(-20), py(eyeY)); ctx.lineTo(px(-hw-2), py(eyeY-2)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(-2), py(eyeY));  ctx.lineTo(px(hw+2),  py(eyeY-2)); ctx.stroke();
  } else if (hatId===7) {
    ctx.fillStyle = '#2c2c4e';
    ctx.beginPath(); ctx.ellipse(px(-3), py(headY+8), (hw+4)*sc, 13*sc, -0.15, Math.PI*0.05, Math.PI*1.95); ctx.fill();
    ctx.fillStyle = '#1a1a30';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY), hw*sc, 4*sc, 0, 0, Math.PI*2); ctx.fill();
  } else if (hatId===8) {
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+2), (hw+16)*sc, 6*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(-hw+4), py(headY+2+30), (hw*2-8)*sc, 30*sc, [2*sc,2*sc,0,0]); ctx.fill();
    ctx.fillStyle = '#eeeeee';
    ctx.fillRect(px(-hw+4), py(headY+2+3+1), (hw*2-8)*sc, 3*sc);
  } else if (hatId===9) {
    ctx.strokeStyle = '#e8c96e'; ctx.lineWidth = 3*sc;
    ctx.beginPath(); ctx.arc(px(0), py(headY), (hw+2)*sc, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
    ctx.fillStyle = '#e8c96e';
    for (let i = -2; i <= 2; i++) {
      const a = Math.PI * 1.5 + i * 0.22, r = (hw+2)*sc;
      const cx2 = px(0) + Math.cos(a)*r, cy2 = py(headY) - Math.sin(a)*r;
      ctx.beginPath(); ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + Math.cos(a)*6*sc, cy2 - Math.sin(a)*6*sc);
      ctx.lineTo(cx2 + Math.cos(a+0.15)*3*sc, cy2 - Math.sin(a+0.15)*3*sc);
      ctx.closePath(); ctx.fill();
    }
  }
}

// ── Кеш спрайтов: рисуем drawChar один раз → переносим как картинку ──
const SPRITE_W = 110, SPRITE_H = 200;
const _spriteCache = new Map();
function getSprite(look) {
  const key = [look.gender, look.skin, look.body, look.face, look.hair, look.hat].join('.');
  if (_spriteCache.has(key)) return _spriteCache.get(key);
  const off = document.createElement('canvas');
  off.width = SPRITE_W; off.height = SPRITE_H;
  drawChar(off.getContext('2d'), SPRITE_W, SPRITE_H, look);
  _spriteCache.set(key, off);
  return off;
}

function rndLook() {
  return {
    gender: Math.random() < 0.5 ? 0 : 1,
    skin:   Math.floor(Math.random() * 6),
    body:   Math.floor(Math.random() * 4),
    face:   Math.floor(Math.random() * 10),
    hair:   Math.floor(Math.random() * 10),
    hat:    Math.floor(Math.random() * 10),
  };
}

// ── Рисование детального оружия в руках (вид сбоку, локальные координаты) ──
// hx,hy — точка хвата (конец руки); sx,sy — направление прицела в экранных px;
// scale — общий множитель (1 = игрок, 1.4 = босс).
function drawFirearm(wepKey, hx, hy, sx, sy, scale, ctxOverride) {
  const ctx = ctxOverride || window.__gameCtx;
  if (!ctx) return;
  const angle = Math.atan2(sy, sx);
  const sc = scale || 1;
  // зеркалим если игрок смотрит "влево" — чтобы магазин/прицел всегда были сверху
  const flip = (Math.cos(angle) < 0) ? -1 : 1;
  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(angle);
  ctx.scale(1, flip);
  // тонкая тень под оружием — чтоб не сливалось со спрайтом
  ctx.shadowColor = 'rgba(0,0,0,.5)';
  ctx.shadowBlur = 3;

  switch (wepKey) {
    case 'pistol': {
      ctx.fillStyle = '#2a2a30';
      ctx.fillRect(-2*sc, -3*sc, 16*sc, 5*sc); // корпус
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(0, -5*sc, 13*sc, 2*sc);     // затвор
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(11*sc, -6*sc, 1.5*sc, 1.5*sc); // мушка
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-3*sc, 1*sc, 5*sc, 7*sc);   // рукоять
      break;
    }
    case 'pistol_heavy': {
      ctx.fillStyle = '#2a2226';
      ctx.fillRect(-3*sc, -4*sc, 22*sc, 6*sc); // длинный корпус
      ctx.fillStyle = '#1a1216';
      ctx.fillRect(0, -6*sc, 18*sc, 2*sc);
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(16*sc, -7*sc, 2*sc, 1.5*sc);
      ctx.fillStyle = '#5a3a1a';                // деревянная рукоять
      ctx.fillRect(-4*sc, 1*sc, 6*sc, 8*sc);
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(-4*sc, 1*sc, 6*sc, 1*sc);
      break;
    }
    case 'pistol_gold': {
      ctx.fillStyle = '#c89030';
      ctx.fillRect(-3*sc, -4*sc, 20*sc, 6*sc);
      ctx.fillStyle = '#ffd76b';
      ctx.fillRect(0, -6*sc, 16*sc, 2*sc);     // полированный затвор
      ctx.fillStyle = '#a06010';
      ctx.fillRect(0, 0, 16*sc, 1*sc);         // нижняя кромка
      ctx.fillStyle = '#3a1a0a';
      ctx.fillRect(-4*sc, 1*sc, 6*sc, 7*sc);   // деревянная рукоять
      ctx.fillStyle = '#e8c96e';
      ctx.fillRect(-3*sc, 2*sc, 1*sc, 5*sc);   // золотая накладка
      break;
    }
    case 'shotgun': {
      ctx.fillStyle = '#5a3a1a';                // деревянный приклад сзади
      ctx.fillRect(-15*sc, -2*sc, 13*sc, 6*sc);
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(-15*sc, 3*sc, 13*sc, 1*sc);
      ctx.fillStyle = '#2a2628';                // тёмный ствол
      ctx.fillRect(-3*sc, -4*sc, 30*sc, 4*sc);
      ctx.fillStyle = '#4a3a1a';                // деревянное цевьё
      ctx.fillRect(8*sc, -1*sc, 9*sc, 4*sc);
      ctx.fillStyle = '#1a1618';
      ctx.fillRect(24*sc, -5*sc, 4*sc, 2*sc);  // дульный срез
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-4*sc, 1*sc, 5*sc, 7*sc);   // рукоять
      break;
    }
    case 'smg': {
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(-4*sc, -3*sc, 22*sc, 5*sc); // корпус
      ctx.fillStyle = '#0a0a0c';
      ctx.fillRect(16*sc, -4*sc, 5*sc, 2*sc);  // глушитель/срез
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(2*sc, 2*sc, 4.5*sc, 11*sc); // изогнутый магазин
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(13*sc, 1*sc, 3.5*sc, 6*sc); // передняя рукоять
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-5*sc, 1*sc, 5*sc, 7*sc);   // главная рукоять
      ctx.fillStyle = '#2a2a30';
      ctx.fillRect(2*sc, -5*sc, 6*sc, 2*sc);   // верхний прицел
      break;
    }
    case 'rifle': {
      ctx.fillStyle = '#5a3a1a';                // деревянный приклад
      ctx.fillRect(-15*sc, -2*sc, 13*sc, 6*sc);
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(-15*sc, 3*sc, 13*sc, 1*sc);
      ctx.fillStyle = '#2a2a30';                // ствол + ствольная коробка
      ctx.fillRect(-3*sc, -3*sc, 34*sc, 4*sc);
      ctx.fillStyle = '#3a3a40';                // прицельная планка
      ctx.fillRect(2*sc, -5*sc, 5*sc, 2*sc);
      ctx.fillRect(26*sc, -5*sc, 2*sc, 2*sc);  // мушка на конце
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-1*sc, 1*sc, 4*sc, 9*sc);   // магазин
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-5*sc, 1*sc, 5*sc, 7*sc);   // рукоять
      break;
    }
    case 'sniper': {
      ctx.fillStyle = '#5a3a1a';                // приклад
      ctx.fillRect(-16*sc, -2*sc, 14*sc, 7*sc);
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(-16*sc, 4*sc, 14*sc, 1*sc);
      ctx.fillStyle = '#2a352a';                // длинный военный ствол
      ctx.fillRect(-3*sc, -2.5*sc, 44*sc, 3*sc);
      ctx.fillStyle = '#1a251a';
      ctx.fillRect(40*sc, -4*sc, 5*sc, 2*sc);  // дульный тормоз
      // оптический прицел
      ctx.fillStyle = '#0a0a0c';
      ctx.fillRect(2*sc, -8*sc, 14*sc, 4*sc);
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(2*sc, -9*sc, 14*sc, 1.5*sc);
      ctx.fillStyle = '#3a3a45';
      ctx.fillRect(15*sc, -7*sc, 1*sc, 3*sc);  // блик линзы
      // рукоять
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-5*sc, 1*sc, 5*sc, 7*sc);
      // сошки
      ctx.strokeStyle = '#1a1a20';
      ctx.lineWidth = 1.3*sc;
      ctx.beginPath();
      ctx.moveTo(32*sc, 0);  ctx.lineTo(35*sc, 8*sc);
      ctx.moveTo(32*sc, 0);  ctx.lineTo(29*sc, 8*sc);
      ctx.stroke();
      break;
    }
    case 'rpg': {
      // длинная труба
      ctx.fillStyle = '#3a4a30';
      ctx.fillRect(-20*sc, -5*sc, 52*sc, 8*sc);
      ctx.fillStyle = '#2a3a20';
      ctx.fillRect(-20*sc, -6*sc, 52*sc, 1.2*sc);
      ctx.fillStyle = '#5a6a45';
      ctx.fillRect(-20*sc, 2*sc, 52*sc, 1*sc);
      // боеголовка/конус впереди
      ctx.fillStyle = '#2a1a10';
      ctx.beginPath();
      ctx.moveTo(32*sc, -5*sc);
      ctx.lineTo(44*sc, 0);
      ctx.lineTo(32*sc, 3*sc);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#5a2010';
      ctx.fillRect(28*sc, -5*sc, 4*sc, 8*sc);   // взрыватель
      // прицельная планка
      ctx.fillStyle = '#2a2a30';
      ctx.fillRect(-2*sc, -8*sc, 5*sc, 3*sc);
      // рукоять снизу
      ctx.fillStyle = '#1a1010';
      ctx.fillRect(-5*sc, 3*sc, 5*sc, 9*sc);
      break;
    }
    default: {
      ctx.fillStyle = '#333';
      ctx.fillRect(0, -2*sc, 16*sc, 4*sc);
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

// Длина оружия "вперёд" в тайлах — для расчёта точки цевья (вторая рука)
const FIREARM_FOREGRIP = {
  pistol: 0,        // одноручный — нет цевья
  pistol_heavy: 0,
  pistol_gold: 0,
  shotgun: 0.30,
  smg: 0.22,
  rifle: 0.34,
  sniper: 0.40,
  rpg: 0.42,
};

// ── Рендер персонажа на сцену ─────────────────────────────────────────
function drawCharacter(obj, isPlayer) {
  const p = w2s(obj.r, obj.c);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const isDead = obj.hp <= 0;
  const bob = isDead ? 0 : Math.sin(obj.walkPhase || 0) * 2.5;
  const hpMax = obj.hpMax || 100;

  // Лужа крови под трупом
  if (isDead) {
    ctx.fillStyle = 'rgba(120,10,10,.55)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 3, wx * 0.55, wy * 0.85, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(180,20,20,.7)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 2, wx * 0.32, wy * 0.5, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    // тень
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 2, wx * 0.34, wy * 0.6, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // спрайт
  const sprite = getSprite(obj.look);
  const scale = obj.isBoss ? 2.5 : 1.95;
  const sh = TS * scale;
  // sw искусственно расширяем — спрайт сам по себе узкий (110x200=0.55 ratio).
  // Делаем 0.72, чтобы персонаж выглядел более «крепким».
  const sw = sh * 0.72;

  if (isDead) {
    // Лежащий спрайт — поворот на 90° вокруг ног
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.PI / 2);
    ctx.globalAlpha = 0.85;
    ctx.drawImage(sprite, Math.round(-sw/2), Math.round(-sh*0.94), sw, sh);
    ctx.globalAlpha = 1;
    ctx.restore();
  } else {
    // Анимация ходьбы: наклон корпуса ± и лёгкое сжатие на шаге.
    // Когда obj.moving — амплитуды полные, иначе затухают.
    const moveK = obj.moving ? 1 : 0.15;
    const ph = obj.walkPhase || 0;
    const lean = Math.sin(ph) * 0.06 * moveK;            // наклон ±3.4°
    const squashY = 1 - Math.abs(Math.sin(ph * 2)) * 0.04 * moveK; // двойная частота — шаг каждой ноги
    const squashX = 1 + Math.abs(Math.sin(ph * 2)) * 0.02 * moveK;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(lean);
    ctx.scale(squashX, squashY);
    ctx.drawImage(sprite, Math.round(-sw/2), Math.round(-sh*0.94), sw, sh);
    ctx.restore();
  }

  // Рука с оружием (только живой). Плечо — на уровне груди (примерно 45% высоты спрайта снизу),
  // смещение вбок перпендикулярно направлению, чтобы рука росла из плеча.
  if (!isDead && obj.angle != null) {
    // Анимация замаха ближним: при meleeT > 0 рука выносится ВПЕРЁД и резко возвращается
    const meleeT = obj.meleeT || 0;
    // k: 0→0 в начале, 1 на пике замаха (середина), 0→0 в конце
    const meleeK = meleeT > 0 ? Math.sin((1 - Math.min(1, meleeT / 0.28)) * Math.PI) : 0;
    const armLen = TS * (obj.isBoss ? 0.5 : 0.36) * (1 + meleeK * 0.55);  // удлинение замаха
    const dx = Math.cos(obj.angle), dy = Math.sin(obj.angle);
    const sx = (dx - dy) * 0.5;
    const sy = (dx + dy) * 0.5 * ISO_Y;
    const shY = p.y - sh * 0.17 + bob;
    const dirLen = Math.hypot(sx, sy) || 1;
    const perpX = -sy / dirLen;
    const perpY =  sx / dirLen;
    const shoulderD = TS * (obj.isBoss ? 0.14 : 0.10);
    const hx = p.x + perpX * shoulderD;
    const hy = shY + perpY * shoulderD;
    const ex = hx + sx * armLen;
    const ey = hy + sy * armLen;
    // ОСНОВНАЯ рука (тёмный рукав)
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = obj.isBoss ? 6 : 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(ex, ey); ctx.stroke();
    // оружие
    const wepKey = obj === player ? currentWeapon : (obj.weapon || 'pistol');
    const wepCfg = WEAPON_FX_CFG[wepKey] || {};
    const isMelee = !!wepCfg.melee;
    if (isMelee) {
      // ближнее оружие — короткое, светлое (нож/бита/катана)
      let len = 0.2, col = '#bbb', w = 3;
      if (wepKey === 'blade_long') { len = 0.36; col = '#cfcfcf'; w = 2.5; }
      else if (wepKey === 'bat')   { len = 0.28; col = '#8b5a2b'; w = 4; }
      else if (wepKey === 'chain') { len = 0.26; col = '#888'; w = 2.5; }
      else if (wepKey === 'fists') { len = 0;    col = '#bbb'; w = 0; }
      else if (wepKey === 'brass') { len = 0.06; col = '#e8c96e'; w = 5; }
      // При замахе оружие "ускоряется" — длиннее траектория + дуговой смаз
      const swingLen = len * (1 + meleeK * 0.6);
      if (len > 0) {
        // Дуговой смаз белой полупрозрачной аркой (вокруг руки)
        if (meleeK > 0.2) {
          ctx.save();
          ctx.strokeStyle = wepKey === 'bat' ? 'rgba(255,200,120,.45)' : 'rgba(255,255,255,.5)';
          ctx.lineWidth = w * 0.8 + 2;
          ctx.lineCap = 'round';
          ctx.beginPath();
          // дуга от позиции "до замаха" до текущей
          const angSpread = 1.1 * meleeK;
          ctx.arc(hx, hy, TS * swingLen * 1.3, Math.atan2(sy, sx) - angSpread, Math.atan2(sy, sx) + angSpread * 0.3);
          ctx.stroke();
          ctx.restore();
        }
