<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🌆 Город — Мафиози</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
#stage { position: fixed; inset: 0; overflow: hidden; }
#gc    { display: block; width: 100%; height: 100%; touch-action: none; background: #0a0a10; }

/* Верхняя плашка: онлайн + кнопка выхода */
#topBar {
  position: absolute; top: env(safe-area-inset-top, 6px); left: 0; right: 0;
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  pointer-events: none; z-index: 5;
}
#topBar > * { pointer-events: auto; }
#btnHome {
  background: rgba(20,24,32,.85); border: 1px solid #3a4452; border-radius: 10px;
  color: #fff; padding: 8px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
}
#onlineTag {
  margin-left: auto; background: rgba(20,40,20,.85); border: 1px solid #4a7a4a;
  border-radius: 10px; padding: 8px 12px; font-size: 12px; color: #7be58a;
  font-weight: 700; display: flex; align-items: center; gap: 6px;
}
#onlineTag .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71;
  box-shadow: 0 0 8px #2ecc71; animation: pulseDot 1.4s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.4} }

#connectingOverlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; background: rgba(0,0,0,.6); color: #fff;
  z-index: 10; pointer-events: none;
}
#connectingOverlay.hide { display: none; }
#connectingOverlay .spin {
  width: 36px; height: 36px; border: 4px solid #2a3a55; border-top-color: #ffd76b;
  border-radius: 50%; animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Левый стик движения */
#joyL {
  position: absolute; left: 24px; bottom: 24px;
  width: 130px; height: 130px; border-radius: 50%;
  background: radial-gradient(circle at center, rgba(120,120,140,.18), rgba(40,50,70,.12) 60%, rgba(20,30,50,.10));
  border: 2px solid rgba(120,140,180,.25); touch-action: none; z-index: 4;
}
#joyL .knob {
  position: absolute; width: 60px; height: 60px; left: 35px; top: 35px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #4a5a78, #2a3548);
  border: 2px solid rgba(180,200,230,.45); box-shadow: 0 4px 10px rgba(0,0,0,.5);
}

/* Чат-инпут */
#chatBar {
  position: absolute; right: 14px; bottom: 30px; display: flex; gap: 6px;
  align-items: center; z-index: 4;
}
#chatInput {
  width: 0; opacity: 0; transition: width .2s ease, opacity .2s ease;
  background: rgba(20,24,32,.92); border: 1px solid #3a4452; border-radius: 10px;
  padding: 10px 12px; font-size: 14px; color: #fff; outline: none;
  font-family: inherit;
}
#chatInput.open { width: min(220px, 50vw); opacity: 1; }
#btnChat {
  background: rgba(40,60,100,.92); border: 2px solid #5aa8ff; border-radius: 14px;
  color: #bcd9ff; font-size: 22px; cursor: pointer; width: 56px; height: 56px;
}

/* Floating «Зайти в район» — для перехода к боям */
#zoneBtn {
  position: absolute; left: 50%; transform: translateX(-50%); top: 64px;
  background: linear-gradient(135deg, #1f6a32, #2f9e4f); color: #fff;
  border: 1px solid #3aa055; border-radius: 12px; padding: 10px 18px;
  font-size: 13px; font-weight: 700; cursor: pointer; display: none; z-index: 5;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
  font-family: inherit;
}

#errorBanner {
  position: absolute; left: 14px; right: 14px; top: 60px;
  background: rgba(80,20,20,.92); border: 1px solid #c83030; border-radius: 10px;
  color: #ffb0b0; padding: 10px 14px; font-size: 12px; text-align: center; z-index: 8;
  display: none;
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="gc"></canvas>

  <div id="topBar">
    <button id="btnHome">← Меню</button>
    <div id="onlineTag"><span class="dot"></span><span id="onlineN">…</span> онлайн</div>
  </div>

  <button id="zoneBtn"></button>

  <div id="joyL"><div class="knob"></div></div>

  <div id="chatBar">
    <input id="chatInput" placeholder="Сообщение…" maxlength="80">
    <button id="btnChat">💬</button>
  </div>

  <!-- Debug-оверлей. Показывает joyL.dx/dy и позицию игрока — нужно
       чтобы продиагностировать почему джойстик не ловит touch на iOS. -->
  <div id="dbgOverlay" style="position:absolute;left:10px;top:62px;background:rgba(0,0,0,.6);color:#7be58a;font:11px/1.3 monospace;padding:6px 8px;border-radius:6px;z-index:9;pointer-events:none;white-space:pre">…</div>

  <div id="errorBanner"></div>

  <div id="connectingOverlay">
    <div class="spin"></div>
    <div id="connectingMsg">Подключаюсь к городу…</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ОБЩИЙ МИР — клиент. Подключается к /world/sim по WebSocket.
//  Архитектура такая же как в demo_isometric (изометрия), но без AI:
//  только игроки, их позиции, имена и чат-баббл над головой.
// ════════════════════════════════════════════════════════════════

const _UP = new URLSearchParams(location.search);
function _q(k, d) { return _UP.get(k) || d; }
function _qInt(k, d) { const v = parseInt(_UP.get(k)); return isFinite(v) ? v : d; }
function _qStr(k, d) { try { return decodeURIComponent(_UP.get(k) || '') || d; } catch(e){ return d; } }
const QP = {
  api:  _UP.get('api') || '',
  uid:  _UP.get('uid') || '',
  name: _qStr('name', 'Игрок'),
  hubUrl: _UP.get('hub') || '',
  look: {
    gender: _qInt('gender', 0),
    skin:   _qInt('skin', 0),
    body:   _qInt('body', 1),
    face:   _qInt('face', 0),
    hair:   _qInt('hair', 0),
    hat:    _qInt('hat', 0),
  },
  has_look: _qInt('has_look', 0),
};

// ── Telegram WebApp ─────────────────────────────────────────────
const tg = (typeof window.Telegram !== 'undefined') ? window.Telegram.WebApp : null;
try {
  if (tg) {
    tg.ready();
    tg.expand();
    // Bot API 7.7+: отключает свайп вниз закрывающий мини-апп.
    // Без этого джойстик при свайпе пальцем вниз тянет за собой плашку
    // Telegram и сворачивает приложение.
    if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
    // Bot API 8.0+: запрос фуллскрина (если доступно)
    if (typeof tg.requestFullscreen === 'function') {
      try { tg.requestFullscreen(); } catch(_) {}
    }
    // На случай если confirmation окно — выключаем
    if (typeof tg.enableClosingConfirmation === 'function') {
      // Не включаем подтверждение — пусть выходит сразу
    }
  }
} catch(e) {}
// Дополнительная страховка: глушим любой touchmove на body вне инпутов,
// чтобы Safari/TG не интерпретировал жест как pull-to-close.
document.body.addEventListener('touchmove', (e) => {
  // Не блокируем тач если он внутри текстового инпута чата
  const target = e.target;
  if (target && target.tagName === 'INPUT') return;
  e.preventDefault();
}, { passive: false });

// ── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width  = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Карта (статичная) ──────────────────────────────────────────
// Размер задаст сервер в hello-кадре, но дублируем дефолты на случай оффлайна.
let MAP_COLS = 40, MAP_ROWS = 40;
const TS     = 56;           // размер тайла на экране — крупнее, как в боях
const ISO_Y  = 0.55;         // ужатие по Y (тот же угол что в demo_isometric)
// Блок города: 8×8 тайлов. Дорога занимает 2 тайла шириной, тротуар
// ещё 1 тайл, внутри 4×4 — здание. Тип 0 — улица (проходимая),
// 1 — стена/здание (непроходимо), 2 — машина (декор/укрытие, тоже блокирует).
const BLOCK = 8;
let MAP = [];
function buildMap() {
  MAP = [];
  for (let r = 0; r < MAP_ROWS; r++) {
    const row = [];
    for (let c = 0; c < MAP_COLS; c++) {
      // Граница карты — стена
      if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
        row.push(1); continue;
      }
      // Дорога — две клетки шириной (mod 8 = 0 или 1)
      const onRoadR = (r % BLOCK <= 1);
      const onRoadC = (c % BLOCK <= 1);
      if (onRoadR || onRoadC) { row.push(0); continue; }
      // Тротуар — третья клетка от границы блока (mod 8 = 2 или 7)
      const sideR = (r % BLOCK === 2) || (r % BLOCK === BLOCK - 1);
      const sideC = (c % BLOCK === 2) || (c % BLOCK === BLOCK - 1);
      if (sideR || sideC) { row.push(0); continue; }
      // Иначе — здание (4×4 в центре блока)
      row.push(1);
    }
    MAP.push(row);
  }
  // Декор на тротуарах: пачки ящиков, машины у бордюра, бочки.
  // Псевдослучайно, но детерминированно — чтобы у всех игроков было
  // одинаково (без сетевой синхронизации).
  function det(r, c, k) { return ((r * 73 + c * 131 + k * 17) % 1000) / 1000; }
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 0) continue;
      // Только на тротуаре (sideR/sideC), не на дороге
      const onRoadR = (r % BLOCK <= 1);
      const onRoadC = (c % BLOCK <= 1);
      if (onRoadR || onRoadC) continue;
      const x = det(r, c, 1);
      if (x < 0.035)       MAP[r][c] = 3; // ящик
      else if (x < 0.060)  MAP[r][c] = 4; // бочка
      else if (x < 0.075)  MAP[r][c] = 5; // мусорка
    }
  }
  // Машины — припаркованные ВДОЛЬ дороги (на второй полосе)
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 0) continue;
      if ((r % BLOCK !== 1) && (c % BLOCK !== 1)) continue; // только дальняя полоса
      const x = det(r, c, 7);
      if (x < 0.08) MAP[r][c] = 2; // машина
    }
  }
}
buildMap();

// Камера следит за игроком. Инициализируем смещением в точку спавна
// игрока (18,18) — на дороге блока 8 (см. buildMap, mod 8 ≤ 1 = road).
// При смене TS не забудь обновить эту константу (используется TS=56, ISO_Y=0.55).
const cam = {
  x: (18 - 18) * 56 * 0.5,                // 0
  y: (18 + 18) * 56 * 0.5 * 0.55,         // ~554
};

// Преобразование тайл→экран и обратно
function w2s(r, c) {
  const stage = document.getElementById('stage');
  const cx = stage.clientWidth / 2;
  const cy = stage.clientHeight / 2;
  return {
    x: cx + (c - r) * TS * 0.5 - cam.x,
    y: cy + (c + r) * TS * 0.5 * ISO_Y - cam.y,
  };
}
function isoH(h) { return h * TS * 0.55; }

// ── Локальный игрок (predict) ───────────────────────────────────
// Спавн на дороге (тайлы кратные 6 в buildMap → проходимо).
// Точное значение всё равно перетрёт сервер первым же снапшотом.
const player = {
  r: 18,
  c: 18,
  ang: 0,
  walking: false,
  walkPhase: 0,
  hp: 100,
};

// Другие игроки (актуальные позиции + цель интерполяции)
const others = new Map();   // uid -> {x, y, ang, w, name, look, chat,
                            //         tx, ty, tAng, lastT}

// ── Joystick ────────────────────────────────────────────────────
// Pointer events работают и на touch, и на mouse, и не теряются когда
// палец уезжает со стика (move/up слушаем на window, а не на joyL).
const joyL = { active: false, dx: 0, dy: 0, id: -1, sx: 0, sy: 0 };
const joyLEl = document.getElementById('joyL');
const joyLKnob = joyLEl.querySelector('.knob');
function joyLMove(x, y) {
  const r = joyLEl.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const dx = x - cx, dy = y - cy;
  const max = r.width / 2 - 12;
  const d = Math.hypot(dx, dy);
  const k = d > max ? max / d : 1;
  joyL.dx = (dx * k) / max;
  joyL.dy = (dy * k) / max;
  joyLKnob.style.transform = `translate(${dx * k}px, ${dy * k}px)`;
}
function joyLEnd() {
  joyL.active = false; joyL.dx = 0; joyL.dy = 0; joyL.id = -1;
  joyLKnob.style.transform = '';
}
joyLEl.addEventListener('pointerdown', (e) => {
  joyL.active = true; joyL.id = e.pointerId;
  joyL.sx = e.clientX; joyL.sy = e.clientY;
  joyLMove(e.clientX, e.clientY);
  try { joyLEl.setPointerCapture(e.pointerId); } catch(_) {}
  e.preventDefault();
}, { passive: false });
window.addEventListener('pointermove', (e) => {
  if (joyL.active && (joyL.id === -1 || e.pointerId === joyL.id)) {
    joyLMove(e.clientX, e.clientY);
  }
});
window.addEventListener('pointerup',     () => { if (joyL.active) joyLEnd(); });
window.addEventListener('pointercancel', () => { if (joyL.active) joyLEnd(); });
// Fallback на старые touch-устройства где pointer events недоступны
joyLEl.addEventListener('touchstart', (e) => {
  if (joyL.active) return;
  const t = e.changedTouches[0]; if (!t) return;
  joyL.active = true; joyL.id = -1;
  joyLMove(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (!joyL.active) return;
  const t = e.changedTouches[0]; if (!t) return;
  joyLMove(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchend',    () => { if (joyL.active) joyLEnd(); });
window.addEventListener('touchcancel', () => { if (joyL.active) joyLEnd(); });
// Клавиатура (для теста с десктопа)
const _keyState = { up:false, down:false, left:false, right:false };
window.addEventListener('keydown', (e) => {
  if (e.key === 'w' || e.key === 'ArrowUp')    _keyState.up    = true;
  if (e.key === 's' || e.key === 'ArrowDown')  _keyState.down  = true;
  if (e.key === 'a' || e.key === 'ArrowLeft')  _keyState.left  = true;
  if (e.key === 'd' || e.key === 'ArrowRight') _keyState.right = true;
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'w' || e.key === 'ArrowUp')    _keyState.up    = false;
  if (e.key === 's' || e.key === 'ArrowDown')  _keyState.down  = false;
  if (e.key === 'a' || e.key === 'ArrowLeft')  _keyState.left  = false;
  if (e.key === 'd' || e.key === 'ArrowRight') _keyState.right = false;
});

// ── Коллизии ───────────────────────────────────────────────────
function isBlocked(r, c) {
  const ri = Math.floor(r), ci = Math.floor(c);
  if (ri < 0 || ri >= MAP_ROWS || ci < 0 || ci >= MAP_COLS) return true;
  return MAP[ri][ci] !== 0;
}
function tryMove(obj, dr, dc) {
  const pad = 0.3;
  let nr = obj.r + dr;
  if (!isBlocked(nr - pad, obj.c) && !isBlocked(nr + pad, obj.c) &&
      !isBlocked(nr, obj.c - pad) && !isBlocked(nr, obj.c + pad)) {
    obj.r = nr;
  }
  let nc = obj.c + dc;
  if (!isBlocked(obj.r - pad, nc) && !isBlocked(obj.r + pad, nc) &&
      !isBlocked(obj.r, nc - pad) && !isBlocked(obj.r, nc + pad)) {
    obj.c = nc;
  }
}

// ── WebSocket ──────────────────────────────────────────────────
let ws = null;
let wsConnected = false;
let lastInputSent = 0;
let onlineCount = 1;

function wsUrl() {
  if (!QP.api) return '';
  // QP.api это https?://... → ws(s)://...
  const base = QP.api.replace(/^http/, 'ws').replace(/\/+$/, '');
  const params = new URLSearchParams({ uid: QP.uid });
  return `${base}/world/sim?${params.toString()}`;
}

function setError(msg) {
  const el = document.getElementById('errorBanner');
  if (!el) return;
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else el.style.display = 'none';
}
function setConnecting(msg) {
  const ov = document.getElementById('connectingOverlay');
  const mm = document.getElementById('connectingMsg');
  if (msg) { if (mm) mm.textContent = msg; ov.classList.remove('hide'); }
  else ov.classList.add('hide');
}

function wsConnect() {
  const url = wsUrl();
  if (!url) {
    setConnecting('Сервер недоступен. Запусти бота с туннелем.');
    return;
  }
  try { ws = new WebSocket(url); } catch(e) { setError('Не удалось подключиться'); return; }
  ws.onopen = () => {
    wsConnected = true;
    setConnecting(null);
    setError(null);
  };
  ws.onmessage = (ev) => {
    let pkt; try { pkt = JSON.parse(ev.data); } catch(e) { return; }
    if (pkt.t === 'hello') {
      const d = pkt.d || {};
      MAP_COLS = d.map_cols || MAP_COLS;
      MAP_ROWS = d.map_rows || MAP_ROWS;
      buildMap();
      // Сервер пришлёт точную позицию первым же snap. Локальное значение
      // (18,18) уже на дороге — не сбрасываем его на центр карты, чтобы
      // не попасть на тайл здания и не залипнуть до прихода первого snap.
    } else if (pkt.t === 'snap') {
      const d = pkt.d || {};
      // Подтягиваем себя к серверной позиции (lightweight reconcile)
      if (d.me) {
        // Если разъехались сильно — телепортируем (rare)
        const dist = Math.hypot(player.r - d.me.y, player.c - d.me.x);
        if (dist > 3.0) { player.r = d.me.y; player.c = d.me.x; }
      }
      const seen = new Set();
      const list = d.others || [];
      for (const o of list) {
        seen.add(o.uid);
        let p = others.get(o.uid);
        if (!p) {
          p = { x: o.x, y: o.y, ang: o.ang || 0, w: !!o.w,
                tx: o.x, ty: o.y, tAng: o.ang || 0,
                name: o.name || '?', look: o.look || {}, chat: '',
                chatT: 0, lastT: performance.now() };
          others.set(o.uid, p);
        } else {
          p.tx = o.x; p.ty = o.y; p.tAng = o.ang || 0; p.w = !!o.w;
          p.name = o.name || p.name;
          if (o.look) p.look = o.look;
          if (o.chat && o.chat !== p.chat) { p.chat = o.chat; p.chatT = performance.now(); }
          p.lastT = performance.now();
        }
      }
      // Удаляем тех кого больше нет в радиусе
      for (const uid of Array.from(others.keys())) {
        if (!seen.has(uid)) others.delete(uid);
      }
      onlineCount = list.length + 1;
      const el = document.getElementById('onlineN');
      if (el) el.textContent = onlineCount;
    }
  };
  ws.onerror = () => { setError('Ошибка соединения'); };
  ws.onclose = () => {
    wsConnected = false;
    setConnecting('Связь потеряна. Переподключаюсь…');
    setTimeout(wsConnect, 2000);
  };
}

function sendInput() {
  if (!ws || ws.readyState !== 1) return;
  const now = performance.now();
  if (now - lastInputSent < 75) return;   // ~13 Гц
  lastInputSent = now;
  try {
    ws.send(JSON.stringify({
      t: 'input',
      d: { x: +player.c.toFixed(2), y: +player.r.toFixed(2),
           ang: +player.ang.toFixed(2), w: !!player.walking }
    }));
  } catch(e) {}
}
function sendChat(text) {
  if (!ws || ws.readyState !== 1) return;
  try { ws.send(JSON.stringify({ t: 'chat', d: { text: String(text || '').slice(0, 80) } })); } catch(e) {}
}

// ── Update / Render ────────────────────────────────────────────
let prevT = performance.now();
function update(dt) {
  // Сводный ввод: джойстик + клавиатура.
  // Клавиатура полезна для теста с PC; на мобильном — игнорируется.
  let inDx = joyL.dx, inDy = joyL.dy;
  if (_keyState.left)  inDx -= 1;
  if (_keyState.right) inDx += 1;
  if (_keyState.up)    inDy -= 1;
  if (_keyState.down)  inDy += 1;
  // Нормализация если выходит за круг
  const inMag = Math.hypot(inDx, inDy);
  if (inMag > 1) { inDx /= inMag; inDy /= inMag; }

  const speed = 5.0; // тайлов/сек
  player.walking = false;
  if (Math.abs(inDx) > 0.08 || Math.abs(inDy) > 0.08) {
    const d = inDx, s = inDy / ISO_Y;
    const dc = (s + d) * 0.5;
    const dr = (s - d) * 0.5;
    const mag = Math.hypot(dr, dc) || 1;
    const mv = Math.min(1, Math.hypot(inDx, inDy));
    tryMove(player, dr / mag * speed * dt * mv, dc / mag * speed * dt * mv);
    player.ang = Math.atan2(dr, dc);
    player.walking = mv > 0.15;
    player.walkPhase += dt * 10 * mv;
  }
  // Камера следит за игроком — держим его ровно по центру экрана.
  // Целевое смещение камеры = изометрические координаты игрока
  // (то самое что прибавляется в w2s до вычитания cam). Плавно.
  const targetCamX = (player.c - player.r) * TS * 0.5;
  const targetCamY = (player.c + player.r) * TS * 0.5 * ISO_Y;
  cam.x += (targetCamX - cam.x) * Math.min(1, dt * 8);
  cam.y += (targetCamY - cam.y) * Math.min(1, dt * 8);
  // Интерполяция других игроков
  for (const [, o] of others) {
    o.x += (o.tx - o.x) * Math.min(1, dt * 8);
    o.y += (o.ty - o.y) * Math.min(1, dt * 8);
    let aDiff = o.tAng - o.ang;
    while (aDiff >  Math.PI) aDiff -= Math.PI * 2;
    while (aDiff < -Math.PI) aDiff += Math.PI * 2;
    o.ang += aDiff * Math.min(1, dt * 8);
    if (o.w) o._walkPhase = (o._walkPhase || 0) + dt * 10;
  }
  sendInput();
}

function drawTile(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  // Тип поверхности — дорога/тротуар
  const onRoadR = (r % BLOCK <= 1);
  const onRoadC = (c % BLOCK <= 1);
  const isRoad  = (onRoadR || onRoadC);
  let color;
  if (isRoad) {
    color = ((r + c) % 2 === 0) ? '#1c1c20' : '#181820'; // асфальт
  } else {
    color = ((r + c) % 2 === 0) ? '#2e2e28' : '#262620'; // тротуар (плитка)
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y - wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x,      p.y + wy);
  ctx.lineTo(p.x - wx, p.y);
  ctx.closePath();
  ctx.fill();
  // Лёгкая обводка между плитками тротуара
  if (!isRoad) {
    ctx.strokeStyle = 'rgba(0,0,0,.18)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Жёлтая прерывистая разметка по центру дороги (только горизонтальные полосы)
  if (onRoadR && !onRoadC && (r % BLOCK === 0) && (c % 3 === 0)) {
    ctx.fillStyle = '#a68a18';
    ctx.fillRect(p.x - wx * 0.18, p.y - 1.5, wx * 0.36, 3);
  }
  // По центру вертикальных дорог — белые круги (фары/люки)
  if (onRoadC && !onRoadR && (c % BLOCK === 0) && (r % 4 === 0)) {
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, wx * 0.10, wy * 0.10, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Машина — припаркована на тайле, занимает ~80% площади
function drawCar(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.55);
  // Палитра — рандомно по координатам
  const palettes = [
    ['#3a5a8a', '#22386a'], ['#8a3030', '#5a1818'],
    ['#3a3a3a', '#1f1f1f'], ['#5a5a3a', '#3a3a1a'],
    ['#2f6a3a', '#1a3a22'],
  ];
  const [top, side] = palettes[((r * 7 + c * 11) % palettes.length + palettes.length) % palettes.length];
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y - wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y);
  ctx.lineTo(p.x,      p.y + wy * 0.8);
  ctx.lineTo(p.x - wx * 0.8, p.y);
  ctx.closePath();
  ctx.fill();
  // Корпус
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.8, p.y);
  ctx.lineTo(p.x,            p.y + wy * 0.8);
  ctx.lineTo(p.x,            p.y + wy * 0.8 - H);
  ctx.lineTo(p.x - wx * 0.8, p.y - H);
  ctx.closePath();
  ctx.fill();
  const fGrad = ctx.createLinearGradient(p.x, p.y - H, p.x + wx, p.y);
  fGrad.addColorStop(0, top); fGrad.addColorStop(1, side);
  ctx.fillStyle = fGrad;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y);
  ctx.lineTo(p.x + wx * 0.8, p.y - H);
  ctx.lineTo(p.x,            p.y + wy * 0.8 - H);
  ctx.closePath();
  ctx.fill();
  // Крыша
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y - H + wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y - H);
  ctx.lineTo(p.x,            p.y - H - wy * 0.8);
  ctx.lineTo(p.x - wx * 0.8, p.y - H);
  ctx.closePath();
  ctx.fill();
  // Окна — две тёмные полоски на правой грани
  ctx.fillStyle = 'rgba(150,200,240,.35)';
  ctx.fillRect(p.x + wx * 0.10, p.y - H + 4, wx * 0.20, H - 12);
  ctx.fillRect(p.x + wx * 0.45, p.y - H + 4, wx * 0.20, H - 12);
}

// Ящик — невысокий, ~70% ширины тайла
function drawCrate(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.6);
  const top = '#a87040', side = '#603820';
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x, p.y + wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.7, p.y); ctx.lineTo(p.x, p.y + wy * 0.7);
  ctx.lineTo(p.x, p.y + wy * 0.7 - H); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x + wx * 0.7, p.y - H); ctx.lineTo(p.x, p.y + wy * 0.7 - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c08858';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - H + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y - H);
  ctx.lineTo(p.x, p.y - H - wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
}

// Бочка — цилиндр
function drawBarrel(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.9);
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.ellipse(p.x + 2, p.y + 3, wx * 0.36, wy * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();
  const grd = ctx.createLinearGradient(p.x - wx * 0.32, p.y, p.x + wx * 0.32, p.y);
  grd.addColorStop(0, '#6a1a1a'); grd.addColorStop(0.5, '#a23030'); grd.addColorStop(1, '#6a1a1a');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, wx * 0.32, wy * 0.32, 0, 0, Math.PI, false);
  ctx.lineTo(p.x + wx * 0.32, p.y - H);
  ctx.ellipse(p.x, p.y - H, wx * 0.32, wy * 0.32, 0, 0, Math.PI, true);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a23030';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - H, wx * 0.32, wy * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // Обручи
  ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.lineWidth = 1;
  [0.3, 0.7].forEach(t => {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - H * (1 - t), wx * 0.32, wy * 0.32, 0, 0, Math.PI);
    ctx.stroke();
  });
}

// Мусорный бак
function drawDumpster(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.75);
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x, p.y + wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2a3a1a';
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.7, p.y); ctx.lineTo(p.x, p.y + wy * 0.7);
  ctx.lineTo(p.x, p.y + wy * 0.7 - H); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a5a28';
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x + wx * 0.7, p.y - H); ctx.lineTo(p.x, p.y + wy * 0.7 - H);
  ctx.closePath(); ctx.fill();
  // Крышка приоткрыта
  ctx.fillStyle = '#5a8038';
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.75, p.y - H - 2); ctx.lineTo(p.x, p.y - H + wy * 0.7);
  ctx.lineTo(p.x + wx * 0.75, p.y - H - 2); ctx.lineTo(p.x, p.y - H - wy * 0.7);
  ctx.closePath(); ctx.fill();
}

function drawBuilding(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  // Высота здания — псевдослучайная по координатам (детерминированная)
  const seed = ((r * 73 + c * 131) % 7) / 7;
  const H = isoH(1.3 + seed * 1.4);
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x, p.y + wy);
  ctx.lineTo(p.x - wx, p.y);
  ctx.closePath();
  ctx.fill();
  // Палитра для каждого квартала разная
  const blockId = Math.floor(r / 6) * 7 + Math.floor(c / 6);
  const palettes = [
    ['#3a2a18', '#1f1810'], ['#1f2c3a', '#101820'],
    ['#3a1f2a', '#1f1018'], ['#2a3a1f', '#181f10'],
    ['#3a3a1f', '#1f1f10'], ['#2a1f3a', '#10101f'],
  ];
  const [top, side] = palettes[blockId % palettes.length];
  // Левая грань
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx, p.y);
  ctx.lineTo(p.x,      p.y + wy);
  ctx.lineTo(p.x,      p.y + wy - H);
  ctx.lineTo(p.x - wx, p.y - H);
  ctx.closePath();
  ctx.fill();
  // Правая грань
  const fGrad = ctx.createLinearGradient(p.x, p.y - H, p.x + wx, p.y);
  fGrad.addColorStop(0, top);
  fGrad.addColorStop(1, side);
  ctx.fillStyle = fGrad;
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y + wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x + wx, p.y - H);
  ctx.lineTo(p.x,      p.y + wy - H);
  ctx.closePath();
  ctx.fill();
  // Крыша
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,        p.y - H + wy);
  ctx.lineTo(p.x + wx,   p.y - H);
  ctx.lineTo(p.x,        p.y - H - wy);
  ctx.lineTo(p.x - wx,   p.y - H);
  ctx.closePath();
  ctx.fill();
  // Окошки на правой грани (несколько горизонтальных рядов)
  const winCols = 2, winRows = Math.max(2, Math.floor(H / 16));
  for (let wr = 0; wr < winRows; wr++) {
    for (let wc = 0; wc < winCols; wc++) {
      const wxp = p.x + wx * (0.18 + wc * 0.36);
      const wyp = p.y - H * (0.18 + wr * (0.7 / Math.max(1, winRows)));
      const lit = ((r * 17 + c * 31 + wr * 5 + wc) % 4 === 0);
      ctx.fillStyle = lit ? '#ffd76b' : '#1a1410';
      ctx.fillRect(wxp - 3, wyp - 4, 6, 6);
    }
  }
}

// ════════════════════════════════════════════════════════════════
// CHARACTER RENDERER (drawChar/drawMale/drawFemale/drawFace*/drawHair*/drawHat
// — копия из demo_isometric.html, чтобы рендерить ТОГО ЖЕ персонажа что в
// бою. Спрайт кешируется по look-полям через getSprite.
// ════════════════════════════════════════════════════════════════
const SKINS = ['#FDDBB4','#F0C27F','#D4935A','#A0622A','#7A3B10','#C8A882'];
const HAIR_COLORS_M = ['#1a0e00','#3d2200','#8b6333','#b8860b','#888','#111'];
const HAIR_COLORS_F = ['#1a0e00','#8b1a1a','#b8860b','#3d2200','#888','#c87050','#e0c080'];

function drawChar(ctx, W, H, opts) {
  const { gender, skin, body, face, hair, hat, _back } = opts;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2;
  const sc = Math.min(W, H) / 220;
  function px(x) { return cx + x * sc; }
  function py(y) { return H * 0.92 - y * sc; }
  const skinCol = SKINS[skin] || SKINS[0];
  if (gender === 0) drawMale(ctx, px, py, sc, skinCol, body, face, hair, hat, !!_back);
  else              drawFemale(ctx, px, py, sc, skinCol, body, face, hair, hat, !!_back);
}

function drawMale(ctx, px, py, sc, skinCol, body, face, hair, hat, isBack) {
  const bodyDefs = [
    { sw: 34, sh: 80, nw: 14, nh: 22, hw: 26 },
    { sw: 44, sh: 85, nw: 16, nh: 22, hw: 30 },
    { sw: 58, sh: 82, nw: 18, nh: 20, hw: 36 },
    { sw: 52, sh: 92, nw: 16, nh: 24, hw: 32 },
  ];
  const bd = bodyDefs[body] || bodyDefs[1];
  const suitCol = ['#1a1a2e','#1a2e1a','#2e1a1a','#1a1e2e'][body % 4];
  const tieCol  = ['#c0392b','#e8c96e','#8e44ad','#2980b9'][face % 4];
  ctx.fillStyle = suitCol;
  const legW = bd.sw * 0.38; const legH = 55 * sc;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw*0.22), py(legH), legW*sc, legH, 4*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw*0.22 - legW), py(legH), legW*sc, legH, 4*sc); ctx.fill();
  ctx.fillStyle = '#111';
  [-1,1].forEach(s => { ctx.beginPath(); ctx.ellipse(px(s*bd.sw*0.1), py(2), 10*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill(); });
  ctx.fillStyle = suitCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2), py(bd.sh), bd.sw*sc, bd.sh*sc, [0,0,6*sc,6*sc]); ctx.fill();
  if (!isBack) {
    ctx.fillStyle = '#ddd';
    ctx.beginPath(); ctx.roundRect(px(-7), py(bd.sh), 14*sc, bd.sh*0.7*sc, 2*sc); ctx.fill();
    ctx.fillStyle = tieCol;
    ctx.beginPath();
    ctx.moveTo(px(-5), py(bd.sh-4)); ctx.lineTo(px(5), py(bd.sh-4));
    ctx.lineTo(px(3), py(bd.sh*0.32)); ctx.lineTo(px(0), py(bd.sh*0.25));
    ctx.lineTo(px(-3), py(bd.sh*0.32)); ctx.closePath(); ctx.fill();
    ctx.fillStyle = suitCol;
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-2)); ctx.lineTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.sw/2), py(bd.sh-20)); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-2)); ctx.lineTo(px(bd.sw/2), py(bd.sh)); ctx.lineTo(px(bd.sw/2), py(bd.sh-20)); ctx.closePath(); ctx.fill();
  }
  const armLen = body===3?65:60, armW = body===3?13:10;
  ctx.fillStyle = suitCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2-armW*sc+2), py(bd.sh), armW*sc, armLen*sc, 5*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw/2-2), py(bd.sh), armW*sc, armLen*sc, 5*sc); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(-bd.sw/2-armW*sc/2+2), py(armLen-10), 7*sc, 9*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(bd.sw/2+armW*sc/2-2), py(armLen-10), 7*sc, 9*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.nw/2), py(bd.sh+bd.nh), bd.nw*sc, bd.nh*sc, 4*sc); ctx.fill();
  const headH = bd.hw*1.22;
  const headY = bd.sh + bd.nh + headH;
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+headH/2), bd.hw/2*sc, headH/2*sc, 0, 0, Math.PI*2); ctx.fill();
  if (!isBack) { ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+5), bd.hw/2.2*sc, 10*sc, 0, 0, Math.PI); ctx.fill(); }
  if (!isBack) {
    const eyeY = bd.sh + bd.nh + headH*0.55;
    const eyeSpan = bd.hw*0.22;
    const mouthY = bd.sh + bd.nh + headH*0.18;
    drawFaceM(ctx, face, px, py, eyeY, eyeSpan, mouthY, bd, sc);
    if (hair > 0) drawHairM(ctx, hair, px, py, bd, headY, headH, sc);
    if (hat > 0)  drawHat(ctx, hat, px, py, bd, headY, headH, sc);
  }
}

function drawFemale(ctx, px, py, sc, skinCol, body, face, hair, hat, isBack) {
  const bodyDefs = [
    { sw: 30, sh: 78, nw: 12, nh: 20, hw: 24, hip: 32 },
    { sw: 36, sh: 80, nw: 13, nh: 20, hw: 27, hip: 40 },
    { sw: 48, sh: 76, nw: 15, nh: 18, hw: 32, hip: 54 },
    { sw: 34, sh: 85, nw: 13, nh: 22, hw: 26, hip: 38 },
  ];
  const bd = bodyDefs[body] || bodyDefs[1];
  const dressCol = ['#3a1a3a','#1a2a3a','#3a1a1a','#1a3a2a'][body % 4];
  const accentCol = ['#e8c96e','#c0392b','#8e44ad','#2980b9'][face % 4];
  ctx.fillStyle = dressCol;
  ctx.beginPath();
  ctx.moveTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.hip/2), py(0));
  ctx.lineTo(px(bd.hip/2), py(0)); ctx.lineTo(px(bd.sw/2), py(bd.sh));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#111';
  [-1,1].forEach(s => {
    ctx.beginPath(); ctx.ellipse(px(s*bd.hip*0.18), py(3), 8*sc, 4*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(s*bd.hip*0.18+4*sc), py(0), 3*sc, 8*sc, 1*sc); ctx.fill();
  });
  ctx.fillStyle = dressCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2), py(bd.sh), bd.sw*sc, bd.sh*sc, [0,0,6*sc,6*sc]); ctx.fill();
  if (!isBack) {
    ctx.fillStyle = '#f0e8e0';
    ctx.beginPath(); ctx.roundRect(px(-6), py(bd.sh), 12*sc, bd.sh*0.65*sc, 2*sc); ctx.fill();
    ctx.fillStyle = dressCol;
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-4)); ctx.lineTo(px(-bd.sw/2), py(bd.sh)); ctx.lineTo(px(-bd.sw/2), py(bd.sh-18)); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0), py(bd.sh-4)); ctx.lineTo(px(bd.sw/2), py(bd.sh)); ctx.lineTo(px(bd.sw/2), py(bd.sh-18)); ctx.closePath(); ctx.fill();
    ctx.fillStyle = accentCol;
    ctx.beginPath(); ctx.arc(px(-8), py(bd.sh-10), 4*sc, 0, Math.PI*2); ctx.fill();
  }
  const armLen = 58, armW = 8;
  ctx.fillStyle = dressCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.sw/2-armW*sc+2), py(bd.sh), armW*sc, armLen*sc, 4*sc); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px(bd.sw/2-2), py(bd.sh), armW*sc, armLen*sc, 4*sc); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(-bd.sw/2-armW*sc/2+2), py(armLen-10), 6*sc, 8*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(bd.sw/2+armW*sc/2-2), py(armLen-10), 6*sc, 8*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.roundRect(px(-bd.nw/2), py(bd.sh+bd.nh), bd.nw*sc, bd.nh*sc, 4*sc); ctx.fill();
  ctx.strokeStyle = accentCol; ctx.lineWidth = 2*sc;
  ctx.beginPath();
  ctx.arc(px(0), py(bd.sh+bd.nh+bd.nh*0.5), (bd.nw*0.7)*sc, Math.PI*0.2, Math.PI*0.8);
  ctx.stroke();
  const headH = bd.hw*1.18;
  const headY = bd.sh + bd.nh + headH;
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+headH/2), bd.hw/2*sc, headH/2*sc, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px(0), py(bd.sh+bd.nh+4), bd.hw/2.3*sc, 9*sc, 0, 0, Math.PI); ctx.fill();
  const eyeY = bd.sh + bd.nh + headH*0.55;
  const eyeSpan = bd.hw*0.22;
  const mouthY = bd.sh + bd.nh + headH*0.18;
  if (!isBack) {
    drawFaceF(ctx, face, px, py, eyeY, eyeSpan, mouthY, bd, sc);
    if (hair > 0) drawHairF(ctx, hair, px, py, bd, headY, headH, sc);
    if (hat > 0)  drawHat(ctx, hat, px, py, bd, headY, headH, sc);
  }
}

function drawFaceM(ctx, faceId, px, py, eyeY, eyeSpan, mouthY, bd, sc) {
  const eyeR = 4*sc;
  ctx.fillStyle = '#fff';
  [-1,1].forEach(s => { ctx.beginPath(); ctx.ellipse(px(s*eyeSpan), py(eyeY), eyeR*1.3, eyeR, 0, 0, Math.PI*2); ctx.fill(); });
  const pupilCol = ['#1a0a00','#1a0020','#002010','#100020'][faceId%4];
  ctx.fillStyle = pupilCol;
  const lookX = faceId===1?1.5:faceId===5?-0.5:0;
  [-1,1].forEach(s => { ctx.beginPath(); ctx.arc(px(s*eyeSpan+lookX*sc), py(eyeY), eyeR*0.65, 0, Math.PI*2); ctx.fill(); });
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5*sc; ctx.lineCap = 'round';
  const browAngles = [0,-0.3,0,0.15,0.2,0.25,-0.2,-0.15,0,0.1];
  const bAngle = browAngles[faceId]||0;
  [-1,1].forEach(s => {
    ctx.save(); ctx.translate(px(s*eyeSpan), py(eyeY+9)); ctx.rotate(s*bAngle);
    ctx.beginPath(); ctx.moveTo(-8*sc,0); ctx.lineTo(8*sc,0); ctx.stroke(); ctx.restore();
  });
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2*sc;
  if (faceId===0) { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY)); ctx.lineTo(px(8),py(mouthY)); ctx.stroke(); }
  else if (faceId===1) { ctx.beginPath(); ctx.moveTo(px(-9),py(mouthY+3)); ctx.quadraticCurveTo(px(0),py(mouthY-4),px(9),py(mouthY+3)); ctx.stroke(); }
  else if (faceId===5) { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY+4)); ctx.quadraticCurveTo(px(0),py(mouthY-2),px(8),py(mouthY+4)); ctx.stroke(); }
  else if (faceId===6) { ctx.beginPath(); ctx.moveTo(px(-6),py(mouthY)); ctx.quadraticCurveTo(px(3),py(mouthY+5),px(9),py(mouthY+2)); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(px(-8),py(mouthY)); ctx.quadraticCurveTo(px(0),py(mouthY+3),px(8),py(mouthY)); ctx.stroke(); }
  if (faceId===2) {
    ctx.fillStyle = '#2a1800';
    ctx.beginPath(); ctx.ellipse(px(0),py(mouthY-12),14*sc,16*sc,0,0,Math.PI); ctx.fill();
    [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*14),py(mouthY+4),5*sc,10*sc,0,0,Math.PI*2);ctx.fill();});
  }
  if (faceId===3) {
    ctx.fillStyle='#1a0e00';
    ctx.beginPath();ctx.ellipse(px(-5),py(mouthY+6),7*sc,4*sc,0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px(5),py(mouthY+6),7*sc,4*sc,-0.3,0,Math.PI*2);ctx.fill();
  }
}

function drawFaceF(ctx, faceId, px, py, eyeY, eyeSpan, mouthY, bd, sc) {
  const eyeR = 4.2*sc;
  const eyeColors = ['#1a3a5a','#3a1a1a','#1a3a1a','#3a1a3a','#2a2a1a','#1a2a3a','#3a0a0a','#1a1a2a','#3a2a0a','#0a2a3a'];
  ctx.fillStyle = eyeColors[faceId%eyeColors.length]+'66';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*eyeSpan),py(eyeY+2),eyeR*1.8,eyeR*0.7,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#fff';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.ellipse(px(s*eyeSpan),py(eyeY),eyeR*1.4,eyeR,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#1a0a30';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(px(s*eyeSpan),py(eyeY),eyeR*0.7,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='#331a00';ctx.lineWidth=1.8*sc;ctx.lineCap='round';
  [-1,1].forEach(s=>{
    ctx.beginPath();ctx.moveTo(px(s*eyeSpan-8),py(eyeY+10));ctx.quadraticCurveTo(px(s*eyeSpan),py(eyeY+12),px(s*eyeSpan+8*s),py(eyeY+9));ctx.stroke();
  });
  const lipColors=['#c0392b','#e74c3c','#c0392b','#ff1493','#a04040','#d35400','#e91e63','#880000','#c0392b','#8e44ad'];
  ctx.fillStyle = lipColors[faceId%lipColors.length];
  ctx.beginPath();
  ctx.moveTo(px(-8),py(mouthY));
  ctx.quadraticCurveTo(px(-4),py(mouthY+5),px(0),py(mouthY+3));
  ctx.quadraticCurveTo(px(4),py(mouthY+5),px(8),py(mouthY));
  ctx.quadraticCurveTo(px(4),py(mouthY-3),px(0),py(mouthY-2));
  ctx.quadraticCurveTo(px(-4),py(mouthY-3),px(-8),py(mouthY));
  ctx.closePath();ctx.fill();
}

function drawHairM(ctx, hairId, px, py, bd, headY, headH, sc) {
  const hc = HAIR_COLORS_M[hairId % HAIR_COLORS_M.length];
  const hw = bd.hw / 2;
  ctx.fillStyle = hc; ctx.strokeStyle = hc;
  if (hairId===1) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY-5),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===2) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY+2),hw*sc,9*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px(-4*sc),py(headY+14),hw*0.8*sc,16*sc,-0.2,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===3) {
    ctx.beginPath();ctx.moveTo(px(-4),py(headY-2));ctx.lineTo(px(-3),py(headY+28));ctx.lineTo(px(3),py(headY+28));ctx.lineTo(px(4),py(headY-2));ctx.closePath();ctx.fill();
  } else if (hairId===4) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===5) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=8*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.quadraticCurveTo(px(s*(hw+5)),py(headY-20),px(s*(hw+1)),py(headY-70));ctx.stroke();});
  } else if (hairId===6) {
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.arc(px(i*7),py(headY+5),7*sc,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,8*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===7) {
    ctx.beginPath();ctx.ellipse(px(-4),py(headY+4),hw*0.9*sc,9*sc,-0.2,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.roundRect(px(-14),py(headY+5),14*sc,8*sc,3*sc);ctx.fill();
  } else if (hairId===8) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===9) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY+1),hw*sc,6*sc,0,Math.PI,Math.PI*2);ctx.fill();
  }
}

function drawHairF(ctx, hairId, px, py, bd, headY, headH, sc) {
  const hc = HAIR_COLORS_F[hairId % HAIR_COLORS_F.length];
  const hw = bd.hw / 2;
  ctx.fillStyle = hc;
  if (hairId===1) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(px(hw-2),py(headY));ctx.quadraticCurveTo(px(hw+10),py(headY-15),px(hw+5),py(headY-40));ctx.stroke();
  } else if (hairId===2) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.lineTo(px(s*(hw+2)),py(headY-25));ctx.stroke();});
  } else if (hairId===3) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{ctx.lineWidth=10*sc;ctx.strokeStyle=hc;ctx.beginPath();ctx.moveTo(px(s*hw),py(headY));ctx.quadraticCurveTo(px(s*(hw+6)),py(headY-30),px(s*(hw+3)),py(headY-80));ctx.stroke();});
  } else if (hairId===4) {
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.arc(px(i*6),py(headY+6),7*sc,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,8*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===5) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===6) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px(4),py(headY+22),10*sc,0,Math.PI*2);ctx.fill();
  } else if (hairId===7) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
    [-1,1].forEach(s=>{
      ctx.lineWidth=9*sc;ctx.strokeStyle=hc;
      ctx.beginPath();
      ctx.moveTo(px(s*hw),py(headY));
      ctx.quadraticCurveTo(px(s*(hw+8)),py(headY-20),px(s*(hw+2)),py(headY-40));
      ctx.quadraticCurveTo(px(s*(hw+10)),py(headY-55),px(s*(hw+4)),py(headY-70));
      ctx.stroke();
    });
  } else if (hairId===8) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY),hw*sc,10*sc,0,Math.PI,Math.PI*2);ctx.fill();
  } else if (hairId===9) {
    ctx.beginPath();ctx.ellipse(px(0),py(headY-2),(hw+2)*sc,12*sc,0,Math.PI,Math.PI*2);ctx.fill();
  }
}

function drawHat(ctx, hatId, px, py, bd, headY, headH, sc) {
  const hw = bd.hw / 2;
  const eyeY = headY - headH * 0.45;
  if (hatId===1) {
    ctx.fillStyle = '#1a0e00';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+2), (hw+10)*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(-hw+2), py(headY+2+26), (hw*2-4)*sc, 26*sc, 4*sc); ctx.fill();
    ctx.fillStyle = '#e8c96e';
    ctx.fillRect(px(-hw+2), py(headY+2+4+2), (hw*2-4)*sc, 4*sc);
  } else if (hatId===2) {
    ctx.fillStyle = '#1a2e3a';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY), hw*sc, 14*sc, 0, Math.PI, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px(hw*0.5), py(headY), (hw+6)*sc, 4*sc, 0.15, 0, Math.PI); ctx.fill();
    ctx.fillStyle = '#e8c96e';
    ctx.beginPath(); ctx.arc(px(0), py(headY+12), 3*sc, 0, Math.PI*2); ctx.fill();
  } else if (hatId===3) {
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+4), (hw+1)*sc, (headH*0.5+2)*sc, 0, Math.PI*0.5, Math.PI*2.5); ctx.fill();
  } else if (hatId===4) {
    ctx.fillStyle = '#5c3d11';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+3), (hw+14)*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px(-hw+2), py(headY+3));
    ctx.lineTo(px(-hw+6), py(headY+3+32));
    ctx.lineTo(px(-3),    py(headY+3+36));
    ctx.lineTo(px(3),     py(headY+3+36));
    ctx.lineTo(px(hw-6),  py(headY+3+32));
    ctx.lineTo(px(hw-2),  py(headY+3));
    ctx.closePath(); ctx.fill();
  } else if (hatId===5) {
    const span = hw*0.55, lensW = (hw*0.55)*sc, lensH = 9*sc, gap = hw*0.08;
    ctx.strokeStyle='#111'; ctx.lineWidth = 2*sc; ctx.fillStyle='#1a3a5a88';
    ctx.beginPath(); ctx.roundRect(px(-(span+gap)), py(eyeY+5), lensW, lensH, 3*sc); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(px(gap),         py(eyeY+5), lensW, lensH, 3*sc); ctx.fill(); ctx.stroke();
  } else if (hatId===6) {
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(px(-11), py(eyeY), 9*sc, 7*sc, 0, 0, Math.PI*2); ctx.fill();
  } else if (hatId===7) {
    ctx.fillStyle = '#2c2c4e';
    ctx.beginPath(); ctx.ellipse(px(-3), py(headY+8), (hw+4)*sc, 13*sc, -0.15, Math.PI*0.05, Math.PI*1.95); ctx.fill();
  } else if (hatId===8) {
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.ellipse(px(0), py(headY+2), (hw+16)*sc, 6*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px(-hw+4), py(headY+2+30), (hw*2-8)*sc, 30*sc, [2*sc,2*sc,0,0]); ctx.fill();
  }
}

// Кеш спрайтов
const SPRITE_W = 110, SPRITE_H = 200;
const _spriteCache = new Map();
function getSprite(look) {
  const key = [look.gender|0, look.skin|0, look.body|0, look.face|0, look.hair|0, look.hat|0].join('.');
  if (_spriteCache.has(key)) return _spriteCache.get(key);
  const off = document.createElement('canvas');
  off.width = SPRITE_W; off.height = SPRITE_H;
  drawChar(off.getContext('2d'), SPRITE_W, SPRITE_H, look);
  _spriteCache.set(key, off);
  return off;
}

// ── Финальная отрисовка персонажа на карте (с тенью, спрайтом, именем, чатом) ──
function drawPerson(x, y, ang, look, walkPhase, moving, name, chat, isSelf) {
  const bob = Math.sin(walkPhase || 0) * 2.5;
  // Тень
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.beginPath();
  ctx.ellipse(x, y + 2, wx * 0.32, wy * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  // Спрайт
  const sprite = getSprite(look || {});
  const scale = 1.7;             // меньше чем в боёвке (там 1.95) — карта мельче
  const sh = TS * scale;
  const sw = sh * 0.72;
  // Анимация ходьбы — наклон корпуса + лёгкое сжатие на шаге.
  const moveK = moving ? 1 : 0.15;
  const ph = walkPhase || 0;
  const lean    = Math.sin(ph) * 0.06 * moveK;
  const squashY = 1 - Math.abs(Math.sin(ph * 2)) * 0.04 * moveK;
  const squashX = 1 + Math.abs(Math.sin(ph * 2)) * 0.02 * moveK;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.rotate(lean);
  ctx.scale(squashX, squashY);
  ctx.drawImage(sprite, Math.round(-sw / 2), Math.round(-sh * 0.94), sw, sh);
  ctx.restore();
  // Имя над головой
  if (name) {
    ctx.font = 'bold 12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(0,0,0,.85)';
    ctx.strokeText(name, x, y - sh * 0.86);
    ctx.fillStyle = isSelf ? '#ffd76b' : '#7be58a';
    ctx.fillText(name, x, y - sh * 0.86);
    ctx.textAlign = 'left';
  }
  // Чат-баббл
  if (chat) {
    ctx.font = '12px system-ui, sans-serif';
    const W = Math.min(180, ctx.measureText(chat).width + 18);
    const H = 22;
    const bx = x - W / 2, by = y - sh * 0.86 - H - 6;
    ctx.fillStyle = 'rgba(20,24,32,.92)';
    ctx.strokeStyle = '#4a5060';
    ctx.lineWidth = 1;
    roundRect(bx, by, W, H, 6);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 4, by + H);
    ctx.lineTo(x + 4, by + H);
    ctx.lineTo(x,     by + H + 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(chat, x, by + 15);
    ctx.textAlign = 'left';
  }
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

function render() {
  ctx.fillStyle = '#0a0a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Viewport culling (под более крупный TS уменьшаем радиус)
  const VIS_R = 12;
  const r0 = Math.max(0, Math.floor(player.r - VIS_R));
  const r1 = Math.min(MAP_ROWS, Math.ceil(player.r + VIS_R));
  const c0 = Math.max(0, Math.floor(player.c - VIS_R));
  const c1 = Math.min(MAP_COLS, Math.ceil(player.c + VIS_R));
  // 1) Пол — везде где НЕ здание (под машинами/ящиками тротуар виден)
  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      if (MAP[r][c] !== 1) drawTile(r, c);
  // 2) Объекты с depth-sort
  const items = [];
  for (let r = r0; r < r1; r++) {
    for (let c = c0; c < c1; c++) {
      const t = MAP[r][c];
      if (t === 1) items.push({ depth: r + c, draw: () => drawBuilding(r, c) });
      else if (t === 2) items.push({ depth: r + c, draw: () => drawCar(r, c) });
      else if (t === 3) items.push({ depth: r + c, draw: () => drawCrate(r, c) });
      else if (t === 4) items.push({ depth: r + c, draw: () => drawBarrel(r, c) });
      else if (t === 5) items.push({ depth: r + c, draw: () => drawDumpster(r, c) });
    }
  }
  // Игрок (свой) — берём look из QP, если игрок настроил образ; иначе дефолт.
  items.push({ depth: player.r + player.c + 0.001, draw: () => {
    const p = w2s(player.r + 0.5, player.c + 0.5);
    const myLook = QP.has_look ? QP.look : { gender:0, skin:1, body:1, face:0, hair:0, hat:0 };
    drawPerson(p.x, p.y, player.ang, myLook,
               player.walkPhase, player.walking, QP.name, null, true);
  } });
  // Другие
  for (const [, o] of others) {
    items.push({ depth: o.y + o.x + 0.001, draw: () => {
      const p = w2s(o.y + 0.5, o.x + 0.5);
      const phase = (o._walkPhase || 0);
      const chat = (o.chat && performance.now() - o.chatT < 4000) ? o.chat : null;
      drawPerson(p.x, p.y, o.ang || 0, o.look || {}, phase, !!o.w, o.name, chat, false);
    } });
  }
  items.sort((a, b) => a.depth - b.depth);
  items.forEach(i => i.draw());
}

let _dbgEl = null;
function frame() {
  const t = performance.now();
  let dt = (t - prevT) / 1000;
  prevT = t;
  if (dt > 0.1) dt = 0.1;
  update(dt);
  render();
  // Debug — обновляем 5 раз/сек, не каждый кадр (CSS лагает)
  if (!_dbgEl) _dbgEl = document.getElementById('dbgOverlay');
  if (_dbgEl && (t % 200) < 20) {
    _dbgEl.textContent =
      `joy ${joyL.active?'ON':'  '} dx=${joyL.dx.toFixed(2)} dy=${joyL.dy.toFixed(2)}\n` +
      `pos r=${player.r.toFixed(1)} c=${player.c.toFixed(1)}\n` +
      `ws ${wsConnected?'OK':'..'} online=${onlineCount}`;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Кнопка возврата в хаб ──────────────────────────────────────
document.getElementById('btnHome').addEventListener('click', () => {
  if (QP.hubUrl) { window.location.href = decodeURIComponent(QP.hubUrl); return; }
  // Fallback: t.me/<bot>?startapp=hub
  try {
    if (tg) { tg.close(); return; }
  } catch(e) {}
  window.history.back();
});

// ── Чат ────────────────────────────────────────────────────────
const chatInput = document.getElementById('chatInput');
const btnChat   = document.getElementById('btnChat');
let chatOpen = false;
function openChat() {
  chatOpen = true;
  chatInput.classList.add('open');
  setTimeout(() => chatInput.focus(), 50);
}
function closeChat() {
  chatOpen = false;
  chatInput.classList.remove('open');
  chatInput.blur();
}
btnChat.addEventListener('click', () => {
  if (!chatOpen) openChat();
  else {
    const t = chatInput.value.trim();
    if (t) { sendChat(t); chatInput.value = ''; }
    closeChat();
  }
});
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const t = chatInput.value.trim();
    if (t) { sendChat(t); chatInput.value = ''; }
    closeChat();
  } else if (e.key === 'Escape') closeChat();
});

// ── Старт ──────────────────────────────────────────────────────
if (!QP.api || !QP.uid) {
  setConnecting('Сервер недоступен. Запусти бота с туннелем и зайди заново.');
} else {
  wsConnect();
}
</script>
