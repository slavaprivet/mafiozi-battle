<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🌆 Город — Мафиози</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
#stage { position: fixed; inset: 0; overflow: hidden; }
#gc    { display: block; width: 100%; height: 100%; touch-action: none; background: #0a0a10; }

/* Верхняя плашка: онлайн + кнопка выхода */
#topBar {
  position: absolute; top: env(safe-area-inset-top, 6px); left: 0; right: 0;
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  pointer-events: none; z-index: 5;
}
#topBar > * { pointer-events: auto; }
#btnHome {
  background: rgba(20,24,32,.85); border: 1px solid #3a4452; border-radius: 10px;
  color: #fff; padding: 8px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
}
#onlineTag {
  margin-left: auto; background: rgba(20,40,20,.85); border: 1px solid #4a7a4a;
  border-radius: 10px; padding: 8px 12px; font-size: 12px; color: #7be58a;
  font-weight: 700; display: flex; align-items: center; gap: 6px;
}
#onlineTag .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71;
  box-shadow: 0 0 8px #2ecc71; animation: pulseDot 1.4s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.4} }

#connectingOverlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; background: rgba(0,0,0,.6); color: #fff;
  z-index: 10; pointer-events: none;
}
#connectingOverlay.hide { display: none; }
#connectingOverlay .spin {
  width: 36px; height: 36px; border: 4px solid #2a3a55; border-top-color: #ffd76b;
  border-radius: 50%; animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Левый стик движения */
#joyL {
  position: absolute; left: 24px; bottom: 24px;
  width: 130px; height: 130px; border-radius: 50%;
  background: radial-gradient(circle at center, rgba(120,120,140,.18), rgba(40,50,70,.12) 60%, rgba(20,30,50,.10));
  border: 2px solid rgba(120,140,180,.25); touch-action: none; z-index: 4;
}
#joyL .knob {
  position: absolute; width: 60px; height: 60px; left: 35px; top: 35px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #4a5a78, #2a3548);
  border: 2px solid rgba(180,200,230,.45); box-shadow: 0 4px 10px rgba(0,0,0,.5);
}

/* Чат-инпут */
#chatBar {
  position: absolute; right: 14px; bottom: 30px; display: flex; gap: 6px;
  align-items: center; z-index: 4;
}
#chatInput {
  width: 0; opacity: 0; transition: width .2s ease, opacity .2s ease;
  background: rgba(20,24,32,.92); border: 1px solid #3a4452; border-radius: 10px;
  padding: 10px 12px; font-size: 14px; color: #fff; outline: none;
  font-family: inherit;
}
#chatInput.open { width: min(220px, 50vw); opacity: 1; }
#btnChat {
  background: rgba(40,60,100,.92); border: 2px solid #5aa8ff; border-radius: 14px;
  color: #bcd9ff; font-size: 22px; cursor: pointer; width: 56px; height: 56px;
}

/* Floating «Зайти в район» — для перехода к боям */
#zoneBtn {
  position: absolute; left: 50%; transform: translateX(-50%); top: 64px;
  background: linear-gradient(135deg, #1f6a32, #2f9e4f); color: #fff;
  border: 1px solid #3aa055; border-radius: 12px; padding: 10px 18px;
  font-size: 13px; font-weight: 700; cursor: pointer; display: none; z-index: 7;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
  font-family: inherit;
}
/* Когда виден PVP-баннер — кнопка съезжает ниже него */
body.in-pvp #zoneBtn { top: 104px; }

#errorBanner {
  position: absolute; left: 14px; right: 14px; top: 60px;
  background: rgba(80,20,20,.92); border: 1px solid #c83030; border-radius: 10px;
  color: #ffb0b0; padding: 10px 14px; font-size: 12px; text-align: center; z-index: 8;
  display: none;
}

/* Баннер «вы в PVP-зоне» */
#pvpBanner {
  position: absolute; left: 50%; transform: translateX(-50%); top: 56px;
  background: linear-gradient(135deg, #5a1010, #a02020);
  border: 2px solid #ff3030; border-radius: 12px;
  padding: 8px 16px; font-size: 12px; font-weight: 800; color: #ffd0d0;
  letter-spacing: .5px; display: none; z-index: 6;
  box-shadow: 0 4px 16px rgba(255,40,40,.45);
  animation: pvpPulse 1.4s ease-in-out infinite;
  font-family: inherit;
}
@keyframes pvpPulse {
  0%,100% { box-shadow: 0 4px 16px rgba(255,40,40,.45); }
  50%     { box-shadow: 0 4px 28px rgba(255,80,80,.85); }
}

/* Быстрые смайлики над чат-инпутом */
#emojiBar {
  position: absolute; right: 14px; bottom: 92px; display: none;
  gap: 4px; align-items: center; z-index: 4;
  background: rgba(20,24,32,.92); border: 1px solid #3a4452;
  border-radius: 10px; padding: 4px 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
}
#emojiBar.open { display: flex; }
#emojiBar .em {
  background: transparent; border: none; cursor: pointer; padding: 4px 6px;
  font-size: 20px; line-height: 1; border-radius: 6px;
}
#emojiBar .em:active { background: rgba(255,215,107,.20); }

/* Мини-карта в правом верхнем углу */
#mapHud {
  position: absolute; right: 14px; top: 56px; z-index: 4;
  width: 132px; height: 132px;
  background: rgba(8,10,16,.85);
  border: 2px solid #4a5060; border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.6);
  pointer-events: none;
}
#mapHud canvas { display: block; width: 100%; height: 100%; border-radius: 8px; }

/* Чёрный рынок — модал */
#shopOverlay {
  position: absolute; inset: 0; z-index: 20;
  background: rgba(0,0,0,.75); display: none;
  align-items: center; justify-content: center;
  font-family: inherit;
}
#shopOverlay.open { display: flex; }
#shopModal {
  width: min(360px, 92vw); max-height: 86vh; overflow-y: auto;
  background: linear-gradient(160deg, #1a0f24, #150818);
  border: 2px solid #5a2058; border-radius: 16px; padding: 16px;
  color: #fff; box-shadow: 0 8px 32px rgba(80,20,80,.55);
}
#shopHeader {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
#shopHeader .icon { font-size: 28px; }
#shopHeader .title { font-size: 17px; font-weight: 800; color: #ffd76b; }
#shopHeader .sub   { font-size: 11px; color: #b8a070; margin-top: 1px; }
#shopHeader .close {
  margin-left: auto; background: rgba(0,0,0,.4); border: 1px solid #555;
  color: #fff; border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 13px;
}
.shop-item {
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,0,0,.35); border: 1px solid #3a2540;
  border-radius: 10px; padding: 10px; margin-bottom: 8px;
}
.shop-item .pic { font-size: 26px; flex-shrink: 0; width: 36px; text-align: center; }
.shop-item .info { flex: 1; min-width: 0; }
.shop-item .name { font-size: 14px; font-weight: 700; color: #fff; }
.shop-item .desc { font-size: 11px; color: #b89cc8; margin-top: 2px; }
.shop-item .buy {
  background: linear-gradient(135deg, #5a2058, #8a3088);
  border: 1px solid #aa50aa; border-radius: 8px;
  color: #fff; padding: 8px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  font-family: inherit;
}
.shop-item .buy:active { transform: scale(.96); }

/* Toast — короткое всплывающее уведомление */
#toast {
  position: absolute; left: 50%; transform: translateX(-50%);
  bottom: 110px; background: rgba(20,24,32,.95);
  border: 1px solid #5a2058; border-radius: 10px;
  color: #ffd76b; padding: 10px 16px; font-size: 13px;
  z-index: 30; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.6);
  font-family: inherit;
}
#toast.show { display: block; animation: toastIn .25s ease; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gc"></canvas>

  <div id="topBar">
    <button id="btnHome">← Меню</button>
    <div id="onlineTag"><span class="dot"></span><span id="onlineN">…</span> онлайн</div>
  </div>

  <button id="zoneBtn"></button>
  <div id="pvpBanner">⚠️ ВЫ В PVP-ЗОНЕ ⚠️</div>

  <div id="mapHud"><canvas id="mapCanvas" width="132" height="132"></canvas></div>

  <div id="joyL"><div class="knob"></div></div>

  <div id="emojiBar">
    <button class="em" data-e="😂">😂</button>
    <button class="em" data-e="🔥">🔥</button>
    <button class="em" data-e="💀">💀</button>
    <button class="em" data-e="👍">👍</button>
    <button class="em" data-e="❤️">❤️</button>
    <button class="em" data-e="🤝">🤝</button>
  </div>

  <div id="chatBar">
    <input id="chatInput" placeholder="Сообщение…" maxlength="80">
    <button id="btnChat">💬</button>
  </div>

  <div id="errorBanner"></div>
  <div id="toast"></div>

  <!-- Чёрный рынок (модал, скрыт по умолчанию) -->
  <div id="shopOverlay">
    <div id="shopModal">
      <div id="shopHeader">
        <div class="icon">🌌</div>
        <div>
          <div class="title">Чёрный рынок</div>
          <div class="sub">Тут продают без вопросов</div>
        </div>
        <button class="close" id="shopClose">✕</button>
      </div>
      <div id="shopItems"></div>
      <div style="font-size:11px;color:#7a6090;text-align:center;padding-top:6px">
        Покупка пока в разработке. Скоро будет синк с инвентарём.
      </div>
    </div>
  </div>

  <div id="connectingOverlay">
    <div class="spin"></div>
    <div id="connectingMsg">Подключаюсь к городу…</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ОБЩИЙ МИР — клиент. Подключается к /world/sim по WebSocket.
//  Архитектура такая же как в demo_isometric (изометрия), но без AI:
//  только игроки, их позиции, имена и чат-баббл над головой.
// ════════════════════════════════════════════════════════════════

const _UP = new URLSearchParams(location.search);
function _q(k, d) { return _UP.get(k) || d; }
function _qInt(k, d) { const v = parseInt(_UP.get(k)); return isFinite(v) ? v : d; }
function _qStr(k, d) { try { return decodeURIComponent(_UP.get(k) || '') || d; } catch(e){ return d; } }
const QP = {
  api:  _UP.get('api') || '',
  uid:  _UP.get('uid') || '',
  name: _qStr('name', 'Игрок'),
  hubUrl: _UP.get('hub') || '',
  look: {
    gender: _qInt('gender', 0),
    skin:   _qInt('skin', 0),
    body:   _qInt('body', 1),
    face:   _qInt('face', 0),
    hair:   _qInt('hair', 0),
    hat:    _qInt('hat', 0),
  },
  has_look: _qInt('has_look', 0),
};

// ── Telegram WebApp ─────────────────────────────────────────────
const tg = (typeof window.Telegram !== 'undefined') ? window.Telegram.WebApp : null;
try { if (tg) { tg.ready(); tg.expand(); } } catch(e) {}

// ── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width  = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Карта (статичная) ──────────────────────────────────────────
// Размер задаст сервер в hello-кадре, но дублируем дефолты на случай оффлайна.
let MAP_COLS = 60, MAP_ROWS = 60;
const TS     = 56;           // размер тайла на экране — крупнее, как в боях
const ISO_Y  = 0.55;         // ужатие по Y (тот же угол что в demo_isometric)
// Блок города: 8×8 тайлов. Дорога занимает 2 тайла шириной, тротуар
// ещё 1 тайл, внутри 4×4 — здание (или парк/арена).
// Типы тайлов:
//   0 = улица/тротуар (проходимая)
//   1 = здание (непроходимо)
//   2 = машина припаркована (блокирует)
//   3 = ящик
//   4 = бочка
//   5 = мусорка
//   6 = дерево (декор, блокирует)
//   7 = фонарь (декор, не блокирует — низкий столб)
//   8 = трава/газон (проходимо, зелёный пол)
//   9 = бордюр (декор, проходимо, чуть выше асфальта)
const BLOCK = 8;
let MAP = [];
// «Парк-блоки» — координаты центра блока (по сетке 8×8), которые НЕ застраиваем
// зданиями, а заливаем газоном с деревьями. Детерминированный набор:
// 1 парк на каждые ~6 блоков. Раскидаем по карте красиво.
const PARK_BLOCKS = new Set();
function isParkBlock(br, bc) { return PARK_BLOCKS.has(br + ',' + bc); }

function buildMap() {
  // Подбираем парк-блоки: каждый 3-й/5-й по диагонали (детерминистично)
  PARK_BLOCKS.clear();
  const blocksR = Math.floor(MAP_ROWS / BLOCK);
  const blocksC = Math.floor(MAP_COLS / BLOCK);
  for (let br = 0; br < blocksR; br++) {
    for (let bc = 0; bc < blocksC; bc++) {
      // Хеш для детерминированности
      const h = ((br * 17 + bc * 31) % 11);
      if (h === 0 || h === 7) PARK_BLOCKS.add(br + ',' + bc);
    }
  }

  MAP = [];
  for (let r = 0; r < MAP_ROWS; r++) {
    const row = [];
    for (let c = 0; c < MAP_COLS; c++) {
      // Граница карты — стена
      if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
        row.push(1); continue;
      }
      // Дорога — две клетки шириной (mod 8 = 0 или 1)
      const onRoadR = (r % BLOCK <= 1);
      const onRoadC = (c % BLOCK <= 1);
      if (onRoadR || onRoadC) { row.push(0); continue; }
      // Тротуар — третья клетка от границы блока (mod 8 = 2 или 7)
      const sideR = (r % BLOCK === 2) || (r % BLOCK === BLOCK - 1);
      const sideC = (c % BLOCK === 2) || (c % BLOCK === BLOCK - 1);
      if (sideR || sideC) { row.push(9); continue; }   // бордюр-плитка
      // Если это парк-блок — внутри 4×4 заливаем травой
      const br = Math.floor(r / BLOCK), bc = Math.floor(c / BLOCK);
      if (isParkBlock(br, bc)) { row.push(8); continue; }
      // Иначе — здание (4×4 в центре блока)
      row.push(1);
    }
    MAP.push(row);
  }

  function det(r, c, k) { return ((r * 73 + c * 131 + k * 17) % 1000) / 1000; }

  // Деревья — внутри парк-блоков (по нескольку в каждом)
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 8) continue;
      const x = det(r, c, 3);
      if (x < 0.30) MAP[r][c] = 6;          // дерево
    }
  }
  // Фонари — на бордюре через каждые 4 тайла (углы кварталов)
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 9) continue;
      const onCornerR = (r % BLOCK === 2) || (r % BLOCK === BLOCK - 1);
      const onCornerC = (c % BLOCK === 2) || (c % BLOCK === BLOCK - 1);
      if (!onCornerR && !onCornerC) continue;
      // Углы кварталов — точки где r%8 ∈ {2,7} И c%8 ∈ {2,7}
      if (onCornerR && onCornerC) MAP[r][c] = 7;
      // Доп. фонари по бордюру каждые 4 тайла
      else if ((r % 4 === 0) && onCornerC) MAP[r][c] = 7;
      else if ((c % 4 === 0) && onCornerR) MAP[r][c] = 7;
    }
  }
  // Декор на бордюре: ящики, бочки, мусорки
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 9) continue;
      const x = det(r, c, 1);
      if (x < 0.025)       MAP[r][c] = 3; // ящик
      else if (x < 0.040)  MAP[r][c] = 4; // бочка
      else if (x < 0.052)  MAP[r][c] = 5; // мусорка
    }
  }
  // Машины — припаркованные ВДОЛЬ дороги (на второй полосе)
  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      if (MAP[r][c] !== 0) continue;
      if ((r % BLOCK !== 1) && (c % BLOCK !== 1)) continue; // только дальняя полоса
      const x = det(r, c, 7);
      if (x < 0.06) MAP[r][c] = 2; // машина
    }
  }
  // Гарантируем — все POI-тайлы стоят на здании (тип 1), иначе вывеска
  // окажется в воздухе. Если PARK_BLOCKS «съел» POI-здание — заменяем
  // тайл на 1.
  for (const p of POI) {
    if (p.r > 0 && p.r < MAP_ROWS - 1 && p.c > 0 && p.c < MAP_COLS - 1) {
      MAP[p.r][p.c] = 1;
    }
  }
}

// ── POI районов ────────────────────────────────────────────────
// Расставлены по карте 60×60 на тайлах-зданиях (r%8 ∈ [3..6], c%8 ∈ [3..6]).
// При тайле кратном 8+4 — точно центр здания. Дополнительные POI:
// 🌌 Чёрный рынок (купить оружие), 🎯 PVP-арена (стрелять в др. игроков).
const POI = [
  { id: 'market',  r: 12, c: 12, icon: '🏪', name: 'Рынок',        minLvl: 1  },
  { id: 'port',    r: 12, c: 44, icon: '⚓', name: 'Порт',          minLvl: 5  },
  { id: 'casino',  r: 36, c: 12, icon: '🎰', name: 'Казино',        minLvl: 10 },
  { id: 'factory', r: 36, c: 44, icon: '🏭', name: 'Промзона',      minLvl: 15 },
  { id: 'mansion', r: 52, c: 28, icon: '🏛', name: 'Резиденция',    minLvl: 20 },
  // Особые POI
  { id: 'blackmarket', r:  4, c: 28, icon: '🌌', name: 'Чёрный рынок', minLvl: 1, special: 'shop'  },
  { id: 'arena',       r: 28, c: 52, icon: '🎯', name: 'PVP-арена',    minLvl: 1, special: 'arena' },
];
const POI_BY_RC = new Map();   // ключ "r,c" → POI
POI.forEach(p => POI_BY_RC.set(p.r + ',' + p.c, p));

// PVP-зона — квадрат 8×8 вокруг POI «арена»
const ARENA_POI = POI.find(p => p.id === 'arena');
const ARENA_R0 = ARENA_POI.r - 4, ARENA_R1 = ARENA_POI.r + 4;
const ARENA_C0 = ARENA_POI.c - 4, ARENA_C1 = ARENA_POI.c + 4;
function inArena(r, c) {
  return r >= ARENA_R0 && r <= ARENA_R1 && c >= ARENA_C0 && c <= ARENA_C1;
}

buildMap();

// Камера следит за игроком. Спавн — (24,24): перекрёсток в центре карты.
const SPAWN_R = 24, SPAWN_C = 24;
const cam = {
  x: (SPAWN_C - SPAWN_R) * TS * 0.5,
  y: (SPAWN_C + SPAWN_R) * TS * 0.5 * ISO_Y,
};

// Преобразование тайл→экран и обратно
function w2s(r, c) {
  const stage = document.getElementById('stage');
  const cx = stage.clientWidth / 2;
  const cy = stage.clientHeight / 2;
  return {
    x: cx + (c - r) * TS * 0.5 - cam.x,
    y: cy + (c + r) * TS * 0.5 * ISO_Y - cam.y,
  };
}
function isoH(h) { return h * TS * 0.55; }

// ── Локальный игрок (predict) ───────────────────────────────────
// Спавн на перекрёстке (24,24) — это дорога (24%8==0). Сервер всё
// равно перетрёт первым же снапшотом, но локально нам важно стартовать
// не в стене и не в нулевой точке.
const player = {
  r: SPAWN_R,
  c: SPAWN_C,
  ang: 0,
  walking: false,
  walkPhase: 0,
  hp: 100,
};

// Другие игроки (актуальные позиции + цель интерполяции)
const others = new Map();   // uid -> {x, y, ang, w, name, look, chat,
                            //         tx, ty, tAng, lastT}

// ── Joystick ────────────────────────────────────────────────────
// Pointer events работают и на touch, и на mouse, и не теряются когда
// палец уезжает со стика (move/up слушаем на window, а не на joyL).
const joyL = { active: false, dx: 0, dy: 0, id: -1, sx: 0, sy: 0 };
const joyLEl = document.getElementById('joyL');
const joyLKnob = joyLEl.querySelector('.knob');
function joyLMove(x, y) {
  const r = joyLEl.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const dx = x - cx, dy = y - cy;
  const max = r.width / 2 - 12;
  const d = Math.hypot(dx, dy);
  const k = d > max ? max / d : 1;
  joyL.dx = (dx * k) / max;
  joyL.dy = (dy * k) / max;
  joyLKnob.style.transform = `translate(${dx * k}px, ${dy * k}px)`;
}
function joyLEnd() {
  joyL.active = false; joyL.dx = 0; joyL.dy = 0; joyL.id = -1;
  joyLKnob.style.transform = '';
}
joyLEl.addEventListener('pointerdown', (e) => {
  joyL.active = true; joyL.id = e.pointerId;
  joyL.sx = e.clientX; joyL.sy = e.clientY;
  joyLMove(e.clientX, e.clientY);
  try { joyLEl.setPointerCapture(e.pointerId); } catch(_) {}
  e.preventDefault();
}, { passive: false });
window.addEventListener('pointermove', (e) => {
  if (joyL.active && (joyL.id === -1 || e.pointerId === joyL.id)) {
    joyLMove(e.clientX, e.clientY);
  }
});
window.addEventListener('pointerup',     () => { if (joyL.active) joyLEnd(); });
window.addEventListener('pointercancel', () => { if (joyL.active) joyLEnd(); });
// Fallback на старые touch-устройства где pointer events недоступны
joyLEl.addEventListener('touchstart', (e) => {
  if (joyL.active) return;
  const t = e.changedTouches[0]; if (!t) return;
  joyL.active = true; joyL.id = -1;
  joyLMove(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (!joyL.active) return;
  const t = e.changedTouches[0]; if (!t) return;
  joyLMove(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchend',    () => { if (joyL.active) joyLEnd(); });
window.addEventListener('touchcancel', () => { if (joyL.active) joyLEnd(); });
// Клавиатура (для теста с десктопа)
const _keyState = { up:false, down:false, left:false, right:false };
window.addEventListener('keydown', (e) => {
  if (e.key === 'w' || e.key === 'ArrowUp')    _keyState.up    = true;
  if (e.key === 's' || e.key === 'ArrowDown')  _keyState.down  = true;
  if (e.key === 'a' || e.key === 'ArrowLeft')  _keyState.left  = true;
  if (e.key === 'd' || e.key === 'ArrowRight') _keyState.right = true;
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'w' || e.key === 'ArrowUp')    _keyState.up    = false;
  if (e.key === 's' || e.key === 'ArrowDown')  _keyState.down  = false;
  if (e.key === 'a' || e.key === 'ArrowLeft')  _keyState.left  = false;
  if (e.key === 'd' || e.key === 'ArrowRight') _keyState.right = false;
});

// ── Коллизии ───────────────────────────────────────────────────
// Проходимые тайлы: 0 (дорога), 7 (фонарь — низкий столб, обходим),
// 8 (трава), 9 (бордюр/плитка). Всё остальное — блок.
const PASSABLE = new Set([0, 8, 9]);
function isBlocked(r, c) {
  const ri = Math.floor(r), ci = Math.floor(c);
  if (ri < 0 || ri >= MAP_ROWS || ci < 0 || ci >= MAP_COLS) return true;
  return !PASSABLE.has(MAP[ri][ci]);
}
function tryMove(obj, dr, dc) {
  const pad = 0.3;
  let nr = obj.r + dr;
  if (!isBlocked(nr - pad, obj.c) && !isBlocked(nr + pad, obj.c) &&
      !isBlocked(nr, obj.c - pad) && !isBlocked(nr, obj.c + pad)) {
    obj.r = nr;
  }
  let nc = obj.c + dc;
  if (!isBlocked(obj.r - pad, nc) && !isBlocked(obj.r + pad, nc) &&
      !isBlocked(obj.r, nc - pad) && !isBlocked(obj.r, nc + pad)) {
    obj.c = nc;
  }
}

// ── WebSocket ──────────────────────────────────────────────────
let ws = null;
let wsConnected = false;
let lastInputSent = 0;
let onlineCount = 1;

function wsUrl() {
  if (!QP.api) return '';
  // QP.api это https?://... → ws(s)://...
  const base = QP.api.replace(/^http/, 'ws').replace(/\/+$/, '');
  const params = new URLSearchParams({ uid: QP.uid });
  return `${base}/world/sim?${params.toString()}`;
}

function setError(msg) {
  const el = document.getElementById('errorBanner');
  if (!el) return;
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else el.style.display = 'none';
}
function setConnecting(msg) {
  const ov = document.getElementById('connectingOverlay');
  const mm = document.getElementById('connectingMsg');
  if (msg) { if (mm) mm.textContent = msg; ov.classList.remove('hide'); }
  else ov.classList.add('hide');
}

function wsConnect() {
  const url = wsUrl();
  if (!url) {
    setConnecting('Сервер недоступен. Запусти бота с туннелем.');
    return;
  }
  try { ws = new WebSocket(url); } catch(e) { setError('Не удалось подключиться'); return; }
  ws.onopen = () => {
    wsConnected = true;
    setConnecting(null);
    setError(null);
  };
  ws.onmessage = (ev) => {
    let pkt; try { pkt = JSON.parse(ev.data); } catch(e) { return; }
    if (pkt.t === 'hello') {
      const d = pkt.d || {};
      // Принимаем серверные размеры ТОЛЬКО если они НЕ меньше клиентских.
      // Иначе POI/спавн уедут за границы — а клиенту 60×60, сервер мог
      // быть не перезапущен (старая версия 40×40).
      const srvC = d.map_cols || MAP_COLS;
      const srvR = d.map_rows || MAP_ROWS;
      if (srvC < MAP_COLS || srvR < MAP_ROWS) {
        setError('⚠️ Сервер бота не обновлён до 60×60. Перезапусти ЗАПУСТИТЬ_БОТА.bat — иначе ты не сможешь дойти до новых районов.');
        setTimeout(() => setError(null), 8000);
        // Не уменьшаем клиентскую карту — рисуем 60×60, но игрок будет
        // ограничен серверным clamp'ом (~40 тайлов). Видно красивый
        // город, но физически дойти можно только до старых районов.
      } else {
        MAP_COLS = srvC; MAP_ROWS = srvR; buildMap();
      }
    } else if (pkt.t === 'snap') {
      const d = pkt.d || {};
      // Подтягиваем себя к серверной позиции (lightweight reconcile)
      if (d.me) {
        // Если разъехались сильно — телепортируем (rare)
        const dist = Math.hypot(player.r - d.me.y, player.c - d.me.x);
        if (dist > 3.0) { player.r = d.me.y; player.c = d.me.x; }
      }
      const seen = new Set();
      const list = d.others || [];
      for (const o of list) {
        seen.add(o.uid);
        let p = others.get(o.uid);
        if (!p) {
          p = { x: o.x, y: o.y, ang: o.ang || 0, w: !!o.w,
                tx: o.x, ty: o.y, tAng: o.ang || 0,
                name: o.name || '?', look: o.look || {}, chat: '',
                chatT: 0, lastT: performance.now() };
          others.set(o.uid, p);
        } else {
          p.tx = o.x; p.ty = o.y; p.tAng = o.ang || 0; p.w = !!o.w;
          p.name = o.name || p.name;
          if (o.look) p.look = o.look;
          if (o.chat && o.chat !== p.chat) { p.chat = o.chat; p.chatT = performance.now(); }
          p.lastT = performance.now();
        }
      }
      // Удаляем тех кого больше нет в радиусе
      for (const uid of Array.from(others.keys())) {
        if (!seen.has(uid)) others.delete(uid);
      }
      onlineCount = list.length + 1;
      const el = document.getElementById('onlineN');
      if (el) el.textContent = onlineCount;
    }
  };
  ws.onerror = () => { setError('Ошибка соединения'); };
  ws.onclose = () => {
    wsConnected = false;
    setConnecting('Связь потеряна. Переподключаюсь…');
    setTimeout(wsConnect, 2000);
  };
}

// ── Близость к POI / кнопка входа ──────────────────────────────
const ENTER_R = 3.2;   // тайлы — порог появления кнопки
let _zoneCur = null;   // текущий «активный» POI
const _zoneEl = document.getElementById('zoneBtn');
const _pvpBn  = document.getElementById('pvpBanner');
function updateZoneBtn() {
  let best = null, bestD2 = ENTER_R * ENTER_R;
  for (const poi of POI) {
    const dr = poi.r - player.r, dc = poi.c - player.c;
    const d2 = dr * dr + dc * dc;
    if (d2 < bestD2) { best = poi; bestD2 = d2; }
  }
  if (best !== _zoneCur) {
    _zoneCur = best;
    if (best) {
      let label;
      if (best.special === 'shop')        label = `${best.icon} Зайти на «${best.name}»`;
      else if (best.special === 'arena')  label = `${best.icon} Войти на «${best.name}»`;
      else                                label = `${best.icon} Зайти в район «${best.name}»`;
      _zoneEl.textContent = label;
      _zoneEl.style.display = 'block';
    } else {
      _zoneEl.style.display = 'none';
    }
  }
  // PVP-баннер — показывается всегда когда игрок физически в зоне арены
  const inPvp = inArena(player.r, player.c);
  if (inPvp && _pvpBn.style.display !== 'block') {
    _pvpBn.style.display = 'block';
    document.body.classList.add('in-pvp');
  } else if (!inPvp && _pvpBn.style.display === 'block') {
    _pvpBn.style.display = 'none';
    document.body.classList.remove('in-pvp');
  }
}
_zoneEl.addEventListener('click', () => {
  if (!_zoneCur) return;
  // Спец-POI: открываем модал/баннер прямо в мире, никуда не переходим.
  if (_zoneCur.special === 'shop')   { openShop();   return; }
  if (_zoneCur.special === 'arena')  { showToast('🎯 Вы внутри PVP-зоны. Огонь скоро добавим.'); return; }
  // Обычный район → возврат в hub с view=district&loc=<id>.
  const locId = _zoneCur.id;
  let target = '';
  try { target = decodeURIComponent(QP.hubUrl || ''); } catch(e) { target = QP.hubUrl || ''; }
  if (!target) target = 'hub.html';
  try {
    const u = new URL(target, location.href);
    u.searchParams.set('view', 'district');
    u.searchParams.set('loc',  locId);
    u.searchParams.set('v',    Date.now());
    window.location.href = u.toString();
  } catch(e) {
    const sep = target.includes('?') ? '&' : '?';
    window.location.href = `${target}${sep}view=district&loc=${locId}&v=${Date.now()}`;
  }
});

function sendInput() {
  if (!ws || ws.readyState !== 1) return;
  const now = performance.now();
  if (now - lastInputSent < 75) return;   // ~13 Гц
  lastInputSent = now;
  try {
    ws.send(JSON.stringify({
      t: 'input',
      d: { x: +player.c.toFixed(2), y: +player.r.toFixed(2),
           ang: +player.ang.toFixed(2), w: !!player.walking }
    }));
  } catch(e) {}
}
function sendChat(text) {
  if (!ws || ws.readyState !== 1) return;
  try { ws.send(JSON.stringify({ t: 'chat', d: { text: String(text || '').slice(0, 80) } })); } catch(e) {}
}

// ── Update / Render ────────────────────────────────────────────
let prevT = performance.now();
function update(dt) {
  // Сводный ввод: джойстик + клавиатура.
  // Клавиатура полезна для теста с PC; на мобильном — игнорируется.
  let inDx = joyL.dx, inDy = joyL.dy;
  if (_keyState.left)  inDx -= 1;
  if (_keyState.right) inDx += 1;
  if (_keyState.up)    inDy -= 1;
  if (_keyState.down)  inDy += 1;
  // Нормализация если выходит за круг
  const inMag = Math.hypot(inDx, inDy);
  if (inMag > 1) { inDx /= inMag; inDy /= inMag; }

  const speed = 5.0; // тайлов/сек
  player.walking = false;
  if (Math.abs(inDx) > 0.08 || Math.abs(inDy) > 0.08) {
    const d = inDx, s = inDy / ISO_Y;
    const dc = (s + d) * 0.5;
    const dr = (s - d) * 0.5;
    const mag = Math.hypot(dr, dc) || 1;
    const mv = Math.min(1, Math.hypot(inDx, inDy));
    tryMove(player, dr / mag * speed * dt * mv, dc / mag * speed * dt * mv);
    player.ang = Math.atan2(dr, dc);
    player.walking = mv > 0.15;
    player.walkPhase += dt * 10 * mv;
  }
  // Камера следит за игроком — держим его ровно по центру экрана.
  // Целевое смещение камеры = изометрические координаты игрока
  // (то самое что прибавляется в w2s до вычитания cam). Плавно.
  const targetCamX = (player.c - player.r) * TS * 0.5;
  const targetCamY = (player.c + player.r) * TS * 0.5 * ISO_Y;
  cam.x += (targetCamX - cam.x) * Math.min(1, dt * 8);
  cam.y += (targetCamY - cam.y) * Math.min(1, dt * 8);
  // Поиск ближайшего POI: если игрок в радиусе ENTER_R тайлов от вывески,
  // показываем кнопку входа. Возвращение скрывает её, не дёргая DOM зря.
  updateZoneBtn();
  // Интерполяция других игроков
  for (const [, o] of others) {
    o.x += (o.tx - o.x) * Math.min(1, dt * 8);
    o.y += (o.ty - o.y) * Math.min(1, dt * 8);
    let aDiff = o.tAng - o.ang;
    while (aDiff >  Math.PI) aDiff -= Math.PI * 2;
    while (aDiff < -Math.PI) aDiff += Math.PI * 2;
    o.ang += aDiff * Math.min(1, dt * 8);
    if (o.w) o._walkPhase = (o._walkPhase || 0) + dt * 10;
  }
  sendInput();
}

function drawTile(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const t = MAP[r][c];
  // Тип поверхности — дорога/тротуар/трава/арена-пол
  const onRoadR = (r % BLOCK <= 1);
  const onRoadC = (c % BLOCK <= 1);
  const isRoad  = (onRoadR || onRoadC);
  let color;
  if (t === 8 || t === 6) {
    // Трава (под деревом тоже трава видна)
    color = ((r + c) % 2 === 0) ? '#2a4a22' : '#234020';
  } else if (isRoad) {
    color = ((r + c) % 2 === 0) ? '#1c1c20' : '#181820'; // асфальт
  } else {
    color = ((r + c) % 2 === 0) ? '#2e2e28' : '#262620'; // тротуар (плитка)
  }
  // Если внутри PVP-арены — красноватый оттенок поверх
  if (inArena(r, c)) {
    // Чуть смешаем с темно-красным
    color = (t === 8 || t === 6) ? '#3a3a18' :
            isRoad                ? '#2a1818' : '#3a2020';
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y - wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x,      p.y + wy);
  ctx.lineTo(p.x - wx, p.y);
  ctx.closePath();
  ctx.fill();
  // Обводка плиток (тротуар)
  if (!isRoad && t !== 8 && t !== 6) {
    ctx.strokeStyle = 'rgba(0,0,0,.18)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Травинки на газоне (декоративные точки)
  if (t === 8) {
    const k = ((r * 53 + c * 89) % 7);
    if (k < 4) {
      ctx.fillStyle = '#3a6a30';
      ctx.fillRect(p.x - 3 + (k - 2), p.y - 2, 1, 2);
      ctx.fillRect(p.x + 2 - (k - 2), p.y + 1, 1, 2);
    }
  }
  // Жёлтая прерывистая разметка по центру дороги (только горизонтальные полосы)
  if (onRoadR && !onRoadC && (r % BLOCK === 0) && (c % 3 === 0)) {
    ctx.fillStyle = '#a68a18';
    ctx.fillRect(p.x - wx * 0.18, p.y - 1.5, wx * 0.36, 3);
  }
  // По центру вертикальных дорог — серые люки
  if (onRoadC && !onRoadR && (c % BLOCK === 0) && (r % 4 === 0)) {
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, wx * 0.10, wy * 0.10, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Бордюр — тонкая светлая полоска по краю плитки, прилегающему к дороге
  if (t === 9) {
    // Прилегаем к дороге если соседний тайл — road
    const nN = (r > 0 && MAP[r-1][c] === 0);
    const nS = (r < MAP_ROWS-1 && MAP[r+1][c] === 0);
    const nE = (c < MAP_COLS-1 && MAP[r][c+1] === 0);
    const nW = (c > 0 && MAP[r][c-1] === 0);
    ctx.fillStyle = '#cfc9b0';
    if (nN) { ctx.beginPath(); ctx.moveTo(p.x, p.y - wy); ctx.lineTo(p.x + wx, p.y); ctx.lineTo(p.x + wx*0.92, p.y + 1); ctx.lineTo(p.x, p.y - wy + 2); ctx.closePath(); ctx.fill(); }
    if (nS) { ctx.beginPath(); ctx.moveTo(p.x - wx, p.y); ctx.lineTo(p.x, p.y + wy); ctx.lineTo(p.x, p.y + wy - 2); ctx.lineTo(p.x - wx*0.92, p.y - 1); ctx.closePath(); ctx.fill(); }
    if (nE) { ctx.beginPath(); ctx.moveTo(p.x + wx, p.y); ctx.lineTo(p.x, p.y + wy); ctx.lineTo(p.x, p.y + wy - 2); ctx.lineTo(p.x + wx*0.92, p.y + 1); ctx.closePath(); ctx.fill(); }
    if (nW) { ctx.beginPath(); ctx.moveTo(p.x - wx, p.y); ctx.lineTo(p.x, p.y - wy); ctx.lineTo(p.x, p.y - wy + 2); ctx.lineTo(p.x - wx*0.92, p.y + 1); ctx.closePath(); ctx.fill(); }
  }
}

// Дерево — крона из 3 кругов на стволе. Лёгкое покачивание (sin от времени).
function drawTree(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.4);
  const sway = Math.sin(performance.now() / 800 + r * 0.5 + c * 0.7) * 1.5;
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.ellipse(p.x + 3, p.y + 4, wx * 0.32, wy * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // Ствол
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(p.x - 3, p.y - H, 6, H + 2);
  // Крона — 3 круга разного оттенка зелёного
  const greens = ['#3a6a2a', '#4a8a3a', '#5aa05a'];
  const baseY = p.y - H - 18;
  ctx.fillStyle = greens[0];
  ctx.beginPath();
  ctx.arc(p.x - 7 + sway * 0.4, baseY + 4, 11, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = greens[1];
  ctx.beginPath();
  ctx.arc(p.x + 7 - sway * 0.4, baseY + 6, 11, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = greens[2];
  ctx.beginPath();
  ctx.arc(p.x + sway, baseY - 4, 13, 0, Math.PI * 2); ctx.fill();
  // Блик
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.beginPath();
  ctx.arc(p.x + 3 + sway, baseY - 6, 4, 0, Math.PI * 2); ctx.fill();
}

// Уличный фонарь — высокий столб с лампой и пятном света на земле.
function drawLamp(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const H = isoH(1.4);
  // Пятно света на земле (большое и тёплое)
  const lightGrd = ctx.createRadialGradient(p.x, p.y, 4, p.x, p.y, 36);
  lightGrd.addColorStop(0, 'rgba(255,220,140,.40)');
  lightGrd.addColorStop(1, 'rgba(255,220,140,0)');
  ctx.fillStyle = lightGrd;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 36, 0, Math.PI * 2); ctx.fill();
  // Столб
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(p.x - 1.5, p.y - H, 3, H);
  // Кронштейн
  ctx.fillRect(p.x, p.y - H, 8, 2);
  // Лампа — жёлтый ромбик с гало
  const lampX = p.x + 9, lampY = p.y - H + 1;
  const halo = ctx.createRadialGradient(lampX, lampY, 1, lampX, lampY, 12);
  halo.addColorStop(0, 'rgba(255,235,160,.95)');
  halo.addColorStop(1, 'rgba(255,235,160,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(lampX, lampY, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffe48a';
  ctx.beginPath();
  ctx.arc(lampX, lampY, 3, 0, Math.PI * 2); ctx.fill();
}

// Чёрный рынок — тент палатки вместо здания. Тёмно-фиолетовый, со светящимися
// фонариками, чтобы выделяться. Рисуем поверх drawBuilding (если её НЕТ
// в коде вызывающего, то сами как-будто здание).
function drawBlackmarket(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(1.0);
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy); ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x, p.y + wy); ctx.lineTo(p.x - wx, p.y);
  ctx.closePath(); ctx.fill();
  // Стены тента — насыщенный пурпур
  ctx.fillStyle = '#3a1840';
  ctx.beginPath();
  ctx.moveTo(p.x - wx, p.y); ctx.lineTo(p.x, p.y + wy);
  ctx.lineTo(p.x, p.y + wy - H); ctx.lineTo(p.x - wx, p.y - H);
  ctx.closePath(); ctx.fill();
  const g = ctx.createLinearGradient(p.x, p.y - H, p.x + wx, p.y);
  g.addColorStop(0, '#5a2058'); g.addColorStop(1, '#3a1840');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y + wy); ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x + wx, p.y - H); ctx.lineTo(p.x, p.y + wy - H);
  ctx.closePath(); ctx.fill();
  // Полосатый тент-крыша (фиолетовый + чёрный)
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = (i % 2 === 0) ? '#5a2058' : '#1a0820';
    ctx.beginPath();
    ctx.moveTo(p.x - wx + i * wx/4,     p.y - H);
    ctx.lineTo(p.x - wx + (i+1) * wx/4, p.y - H);
    ctx.lineTo(p.x + (i+1) * wx/4 - wx, p.y - H - wy * (i+1)/8);
    ctx.lineTo(p.x + i * wx/4 - wx,     p.y - H - wy * i/8);
    ctx.closePath(); ctx.fill();
  }
  // Гирлянды-огоньки по краю крыши (4 цветных точки, пульсация)
  const t = performance.now() / 300;
  const colors = ['#ff5a5a', '#5affff', '#ffd76b', '#a5ff5a'];
  for (let i = 0; i < 4; i++) {
    const px = p.x - wx + (i + 0.5) * wx / 2;
    const py = p.y - H - wy * (i / 8) + 2;
    const k = 0.6 + 0.4 * Math.sin(t + i);
    ctx.fillStyle = colors[i];
    ctx.globalAlpha = k;
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Указатель «вы в PVP-зоне» — большая прозрачная плита поверх тайла,
// рисуется отдельным проходом ПОВЕРХ всего пола (через drawArenaOverlay).
function drawArenaPerimeter() {
  // Рисуем красную пунктирную линию по периметру арены, ровно по границе тайлов.
  const corners = [
    [ARENA_R0, ARENA_C0], [ARENA_R0, ARENA_C1 + 1],
    [ARENA_R1 + 1, ARENA_C1 + 1], [ARENA_R1 + 1, ARENA_C0],
  ];
  const scr = corners.map(([r, c]) => w2s(r, c));
  ctx.save();
  ctx.strokeStyle = '#ff4040';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([8, 6]);
  ctx.shadowColor = '#ff4040';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(scr[0].x, scr[0].y);
  for (let i = 1; i < scr.length; i++) ctx.lineTo(scr[i].x, scr[i].y);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// Машина — припаркована на тайле, занимает ~80% площади
function drawCar(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.55);
  // Палитра — рандомно по координатам
  const palettes = [
    ['#3a5a8a', '#22386a'], ['#8a3030', '#5a1818'],
    ['#3a3a3a', '#1f1f1f'], ['#5a5a3a', '#3a3a1a'],
    ['#2f6a3a', '#1a3a22'],
  ];
  const [top, side] = palettes[((r * 7 + c * 11) % palettes.length + palettes.length) % palettes.length];
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y - wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y);
  ctx.lineTo(p.x,      p.y + wy * 0.8);
  ctx.lineTo(p.x - wx * 0.8, p.y);
  ctx.closePath();
  ctx.fill();
  // Корпус
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.8, p.y);
  ctx.lineTo(p.x,            p.y + wy * 0.8);
  ctx.lineTo(p.x,            p.y + wy * 0.8 - H);
  ctx.lineTo(p.x - wx * 0.8, p.y - H);
  ctx.closePath();
  ctx.fill();
  const fGrad = ctx.createLinearGradient(p.x, p.y - H, p.x + wx, p.y);
  fGrad.addColorStop(0, top); fGrad.addColorStop(1, side);
  ctx.fillStyle = fGrad;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y);
  ctx.lineTo(p.x + wx * 0.8, p.y - H);
  ctx.lineTo(p.x,            p.y + wy * 0.8 - H);
  ctx.closePath();
  ctx.fill();
  // Крыша
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y - H + wy * 0.8);
  ctx.lineTo(p.x + wx * 0.8, p.y - H);
  ctx.lineTo(p.x,            p.y - H - wy * 0.8);
  ctx.lineTo(p.x - wx * 0.8, p.y - H);
  ctx.closePath();
  ctx.fill();
  // Окна — две тёмные полоски на правой грани
  ctx.fillStyle = 'rgba(150,200,240,.35)';
  ctx.fillRect(p.x + wx * 0.10, p.y - H + 4, wx * 0.20, H - 12);
  ctx.fillRect(p.x + wx * 0.45, p.y - H + 4, wx * 0.20, H - 12);
}

// Ящик — невысокий, ~70% ширины тайла
function drawCrate(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.6);
  const top = '#a87040', side = '#603820';
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x, p.y + wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.7, p.y); ctx.lineTo(p.x, p.y + wy * 0.7);
  ctx.lineTo(p.x, p.y + wy * 0.7 - H); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x + wx * 0.7, p.y - H); ctx.lineTo(p.x, p.y + wy * 0.7 - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c08858';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - H + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y - H);
  ctx.lineTo(p.x, p.y - H - wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
}

// Бочка — цилиндр
function drawBarrel(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.9);
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.ellipse(p.x + 2, p.y + 3, wx * 0.36, wy * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();
  const grd = ctx.createLinearGradient(p.x - wx * 0.32, p.y, p.x + wx * 0.32, p.y);
  grd.addColorStop(0, '#6a1a1a'); grd.addColorStop(0.5, '#a23030'); grd.addColorStop(1, '#6a1a1a');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, wx * 0.32, wy * 0.32, 0, 0, Math.PI, false);
  ctx.lineTo(p.x + wx * 0.32, p.y - H);
  ctx.ellipse(p.x, p.y - H, wx * 0.32, wy * 0.32, 0, 0, Math.PI, true);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a23030';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - H, wx * 0.32, wy * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // Обручи
  ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.lineWidth = 1;
  [0.3, 0.7].forEach(t => {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - H * (1 - t), wx * 0.32, wy * 0.32, 0, 0, Math.PI);
    ctx.stroke();
  });
}

// Мусорный бак
function drawDumpster(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  const H = isoH(0.75);
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x, p.y + wy * 0.7); ctx.lineTo(p.x - wx * 0.7, p.y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2a3a1a';
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.7, p.y); ctx.lineTo(p.x, p.y + wy * 0.7);
  ctx.lineTo(p.x, p.y + wy * 0.7 - H); ctx.lineTo(p.x - wx * 0.7, p.y - H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a5a28';
  ctx.beginPath();
  ctx.moveTo(p.x,            p.y + wy * 0.7); ctx.lineTo(p.x + wx * 0.7, p.y);
  ctx.lineTo(p.x + wx * 0.7, p.y - H); ctx.lineTo(p.x, p.y + wy * 0.7 - H);
  ctx.closePath(); ctx.fill();
  // Крышка приоткрыта
  ctx.fillStyle = '#5a8038';
  ctx.beginPath();
  ctx.moveTo(p.x - wx * 0.75, p.y - H - 2); ctx.lineTo(p.x, p.y - H + wy * 0.7);
  ctx.lineTo(p.x + wx * 0.75, p.y - H - 2); ctx.lineTo(p.x, p.y - H - wy * 0.7);
  ctx.closePath(); ctx.fill();
}

function drawBuilding(r, c) {
  const p = w2s(r + 0.5, c + 0.5);
  const wx = TS * 0.5, wy = TS * 0.5 * ISO_Y;
  // Высота здания — псевдослучайная по координатам (детерминированная)
  const seed = ((r * 73 + c * 131) % 7) / 7;
  const H = isoH(1.3 + seed * 1.4);
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x, p.y + wy);
  ctx.lineTo(p.x - wx, p.y);
  ctx.closePath();
  ctx.fill();
  // Палитра для каждого квартала разная
  const blockId = Math.floor(r / 6) * 7 + Math.floor(c / 6);
  const palettes = [
    ['#3a2a18', '#1f1810'], ['#1f2c3a', '#101820'],
    ['#3a1f2a', '#1f1018'], ['#2a3a1f', '#181f10'],
    ['#3a3a1f', '#1f1f10'], ['#2a1f3a', '#10101f'],
  ];
  const [top, side] = palettes[blockId % palettes.length];
  // Левая грань
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(p.x - wx, p.y);
  ctx.lineTo(p.x,      p.y + wy);
  ctx.lineTo(p.x,      p.y + wy - H);
  ctx.lineTo(p.x - wx, p.y - H);
  ctx.closePath();
  ctx.fill();
  // Правая грань
  const fGrad = ctx.createLinearGradient(p.x, p.y - H, p.x + wx, p.y);
  fGrad.addColorStop(0, top);
  fGrad.addColorStop(1, side);
  ctx.fillStyle = fGrad;
  ctx.beginPath();
  ctx.moveTo(p.x,      p.y + wy);
  ctx.lineTo(p.x + wx, p.y);
  ctx.lineTo(p.x + wx, p.y - H);
  ctx.lineTo(p.x,      p.y + wy - H);
  ctx.closePath();
  ctx.fill();
  // Крыша
  ctx.fillStyle = top;
  ctx.beginPath();
  ctx.moveTo(p.x,        p.y - H + wy);
  ctx.lineTo(p.x + wx,   p.y - H);
  ctx.lineTo(p.x,        p.y - H - wy);
  ctx.lineTo(p.x - wx,   p.y - H);
  ctx.closePath();
  ctx.fill();
  // Окошки на правой грани (несколько горизонтальных рядов)
  const winCols = 2, winRows = Math.max(2, Math.floor(H / 16));
  for (let wr = 0; wr < winRows; wr++) {
    for (let wc = 0; wc < winCols; wc++) {
      const wxp = p.x + wx * (0.18 + wc * 0.36);
      const wyp = p.y - H * (0.18 + wr * (0.7 / Math.max(1, winRows)));
      const lit = ((r * 17 + c * 31 + wr * 5 + wc) % 4 === 0);
      ctx.fillStyle = lit ? '#ffd76b' : '#1a1410';
      ctx.fillRect(wxp - 3, wyp - 4, 6, 6);
    }
  }
}

// POI — большая вывеска НАД крышей здания. Рисуется поверх drawBuilding(r,c)
// в том же тайле. Размер таблички адаптивен; для привлечения внимания
// добавлен пульсирующий «гало»-блик за иконкой.
function drawPOI(r, c, poi) {
  const p = w2s(r + 0.5, c + 0.5);
  // Та же формула высоты, что и в drawBuilding — чтобы знак сел ровно на крышу.
  const seed = ((r * 73 + c * 131) % 7) / 7;
  const H = isoH(1.3 + seed * 1.4);
  const topY = p.y - H - TS * 0.18;   // чуть выше крыши
  // Пульсирующее свечение (на фоне)
  const t = performance.now() / 600;
  const pulse = 0.6 + 0.4 * Math.sin(t + r * 0.3 + c * 0.5);
  const haloR = 24 + pulse * 8;
  const grd = ctx.createRadialGradient(p.x, topY - 6, 2, p.x, topY - 6, haloR);
  grd.addColorStop(0, `rgba(255,215,107,${0.55 * pulse})`);
  grd.addColorStop(1, 'rgba(255,215,107,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(p.x, topY - 6, haloR, 0, Math.PI * 2);
  ctx.fill();
  // Подложка-щит (тёмная с золотой обводкой)
  const labelW = 92, labelH = 38;
  const lx = p.x - labelW / 2, ly = topY - labelH;
  ctx.fillStyle = 'rgba(20,18,12,.92)';
  ctx.strokeStyle = '#ffd76b';
  ctx.lineWidth = 2;
  roundRect(lx, ly, labelW, labelH, 6);
  ctx.fill(); ctx.stroke();
  // Иконка-эмодзи слева, название справа
  ctx.font = '20px system-ui, "Segoe UI Emoji", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd76b';
  ctx.fillText(poi.icon, lx + 6, ly + labelH / 2);
  ctx.font = 'bold 11px system-ui, sans-serif';
  ctx.fillStyle = '#ffe9aa';
  ctx.fillText(poi.name, lx + 32, ly + labelH / 2 - 5);
  ctx.font = '9px system-ui, sans-serif';
  ctx.fillStyle = '#b8a070';
  ctx.fillText(`lvl ${poi.minLvl}+`, lx + 32, ly + labelH / 2 + 8);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  // Маркер на крыше (точка)
  ctx.fillStyle = '#ffd76b';
  ctx.beginPath();
  ctx.arc(p.x, ly + labelH + 4, 3, 0, Math.PI * 2);
  ctx.fill();
}

// Упрощённая отрисовка персонажа (в стиле demo_isometric, но компактнее).
// look: {gender, skin, body, face, hair, hat} → используем для цветов.
const SKIN_TONES = ['#f5cba7', '#d49b6a', '#a06a3f', '#6e4528', '#3f2918'];
const HAIR_TONES = ['#1a1a1a', '#6b4423', '#c8a050', '#9c4a4a', '#3a3a3a'];
function drawPerson(x, y, ang, look, walkPhase, name, chat, isSelf) {
  // x,y — экранные координаты (центр клетки). Рисуем фигурку «над» полом.
  const skin = SKIN_TONES[(look.skin | 0) % SKIN_TONES.length];
  const hair = HAIR_TONES[(look.hair | 0) % HAIR_TONES.length];
  const hatId = (look.hat | 0) % 4; // 0=без, 1=кепка, 2=шляпа, 3=шапка
  // Тень
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.ellipse(x, y + 4, 11, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Ноги (анимация шага)
  const swing = Math.sin(walkPhase || 0) * 3;
  ctx.fillStyle = '#1a1a25';
  ctx.fillRect(x - 5, y - 4, 4, 12 + swing);
  ctx.fillRect(x + 1, y - 4, 4, 12 - swing);
  // Туловище — цвет «пиджак» зависит от gender
  ctx.fillStyle = (look.gender ? '#7a3a5a' : '#2a3a5a');
  ctx.beginPath();
  ctx.ellipse(x, y - 12, 8, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  // Рубашка-пуговицы
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 1, y - 18, 2, 12);
  // Голова
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(x, y - 26, 7, 0, Math.PI * 2);
  ctx.fill();
  // Волосы / шляпа
  if (hatId === 0) {
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.arc(x, y - 28, 7, Math.PI, 0);
    ctx.fill();
  } else if (hatId === 1) {
    // Кепка
    ctx.fillStyle = '#1f1f25';
    ctx.fillRect(x - 7, y - 31, 14, 4);
    ctx.fillRect(x - 9, y - 28, 5, 2);
  } else if (hatId === 2) {
    // Федора
    ctx.fillStyle = '#181820';
    ctx.fillRect(x - 9, y - 28, 18, 2);
    ctx.fillRect(x - 6, y - 33, 12, 5);
    ctx.fillStyle = '#c83030';
    ctx.fillRect(x - 6, y - 30, 12, 1);
  } else {
    // Шапка
    ctx.fillStyle = '#3a3a4a';
    ctx.beginPath();
    ctx.ellipse(x, y - 31, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Глаза — точки. Направление по ang.
  ctx.fillStyle = '#101010';
  const eDx = Math.cos(ang) * 1.2;
  ctx.fillRect(x - 2.5 + eDx, y - 27, 1.5, 1.5);
  ctx.fillRect(x + 1 + eDx,   y - 27, 1.5, 1.5);

  // Имя над головой
  if (name) {
    ctx.font = 'bold 12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,.7)';
    ctx.fillText(name, x + 1, y - 42);
    ctx.fillStyle = isSelf ? '#ffd76b' : '#7be58a';
    ctx.fillText(name, x, y - 43);
    ctx.textAlign = 'left';
  }
  // Чат-баббл
  if (chat) {
    const W = Math.min(180, ctx.measureText(chat).width + 18);
    const H = 22;
    const bx = x - W / 2, by = y - 62;
    ctx.fillStyle = 'rgba(20,24,32,.92)';
    ctx.strokeStyle = '#4a5060';
    ctx.lineWidth = 1;
    roundRect(bx, by, W, H, 6);
    ctx.fill(); ctx.stroke();
    // хвостик
    ctx.beginPath();
    ctx.moveTo(x - 4, by + H);
    ctx.lineTo(x + 4, by + H);
    ctx.lineTo(x,     by + H + 5);
    ctx.closePath();
    ctx.fillStyle = 'rgba(20,24,32,.92)';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(chat, x, by + 15);
    ctx.textAlign = 'left';
  }
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

function render() {
  ctx.fillStyle = '#0a0a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Viewport culling (под более крупный TS уменьшаем радиус)
  const VIS_R = 12;
  const r0 = Math.max(0, Math.floor(player.r - VIS_R));
  const r1 = Math.min(MAP_ROWS, Math.ceil(player.r + VIS_R));
  const c0 = Math.max(0, Math.floor(player.c - VIS_R));
  const c1 = Math.min(MAP_COLS, Math.ceil(player.c + VIS_R));
  // 1) Пол — везде где НЕ здание (под машинами/ящиками тротуар виден)
  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      if (MAP[r][c] !== 1) drawTile(r, c);
  // 1.5) Граница PVP-арены — красный пунктир поверх пола
  drawArenaPerimeter();
  // 2) Объекты с depth-sort
  const items = [];
  for (let r = r0; r < r1; r++) {
    for (let c = c0; c < c1; c++) {
      const t = MAP[r][c];
      const poi = POI_BY_RC.get(r + ',' + c);
      if (t === 1) {
        items.push({ depth: r + c, draw: () => {
          if (poi && poi.special === 'shop')      drawBlackmarket(r, c);
          else                                    drawBuilding(r, c);
          if (poi) drawPOI(r, c, poi);
        }});
      }
      else if (t === 2) items.push({ depth: r + c, draw: () => drawCar(r, c) });
      else if (t === 3) items.push({ depth: r + c, draw: () => drawCrate(r, c) });
      else if (t === 4) items.push({ depth: r + c, draw: () => drawBarrel(r, c) });
      else if (t === 5) items.push({ depth: r + c, draw: () => drawDumpster(r, c) });
      else if (t === 6) items.push({ depth: r + c, draw: () => drawTree(r, c) });
      else if (t === 7) items.push({ depth: r + c, draw: () => drawLamp(r, c) });
    }
  }
  // Игрок (со своим чат-баблом из последнего смайлика, чтобы сразу видеть)
  items.push({ depth: player.r + player.c + 0.001, draw: () => {
    const p = w2s(player.r + 0.5, player.c + 0.5);
    const myChat = (_localChat && performance.now() - _localChatT < 3500) ? _localChat : null;
    drawPerson(p.x, p.y, player.ang, QP.has_look ? QP.look : {skin:1,body:1,face:0,hair:0,hat:0,gender:0},
               player.walking ? player.walkPhase : 0, QP.name, myChat, true);
  } });
  // Другие
  for (const [, o] of others) {
    items.push({ depth: o.y + o.x + 0.001, draw: () => {
      const p = w2s(o.y + 0.5, o.x + 0.5);
      const phase = (o.w ? (o._walkPhase || 0) : 0);
      const chat = (o.chat && performance.now() - o.chatT < 4000) ? o.chat : null;
      drawPerson(p.x, p.y, o.ang || 0, o.look || {}, phase, o.name, chat, false);
    } });
  }
  items.sort((a, b) => a.depth - b.depth);
  items.forEach(i => i.draw());
  // Стрелки-указатели на POI, которые сейчас за пределами видимости.
  drawPOIArrows(r0, r1, c0, c1);
  // Мини-карта
  drawMinimap();
}

// ── Стрелки на POI ──────────────────────────────────────────────
// Если POI вне видимости (не попал в r0..r1/c0..c1) — рисуем стрелку
// у края экрана в направлении этого POI с подписью района.
function drawPOIArrows(r0, r1, c0, c1) {
  const W = canvas.width / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  const cx = W / 2, cy = H / 2;
  const margin = 64;
  for (const poi of POI) {
    const visible = poi.r >= r0 && poi.r < r1 && poi.c >= c0 && poi.c < c1;
    if (visible) continue;
    // Координаты POI в экранной системе (без clamp)
    const sp = w2s(poi.r + 0.5, poi.c + 0.5);
    let dx = sp.x - cx, dy = sp.y - cy;
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    // Пересечение направления с прямоугольником-рамкой
    const maxX = (W / 2) - margin, maxY = (H / 2) - margin;
    const k = Math.min(maxX / Math.abs(dx || 1e-3), maxY / Math.abs(dy || 1e-3));
    const ax = cx + dx * k, ay = cy + dy * k;
    // Сама стрелка — треугольник в сторону POI + кружок-фон
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(Math.atan2(dy, dx));
    // Фон-круг
    ctx.fillStyle = 'rgba(20,24,32,.85)';
    ctx.strokeStyle = '#ffd76b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Треугольник «→»
    ctx.fillStyle = '#ffd76b';
    ctx.beginPath();
    ctx.moveTo(12, 0); ctx.lineTo(0, -7); ctx.lineTo(0, 7); ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Эмодзи в центре стрелки (без поворота)
    ctx.font = '14px system-ui, "Segoe UI Emoji", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(poi.icon, ax - dx * 4, ay - dy * 4);
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
}

// ── Мини-карта ──────────────────────────────────────────────────
const _miniCtx = document.getElementById('mapCanvas').getContext('2d');
const MINI_W = 132, MINI_H = 132;
function drawMinimap() {
  const ctx2 = _miniCtx;
  ctx2.clearRect(0, 0, MINI_W, MINI_H);
  // Фон
  ctx2.fillStyle = '#0a0d14';
  ctx2.fillRect(0, 0, MINI_W, MINI_H);
  const sx = MINI_W / MAP_COLS, sy = MINI_H / MAP_ROWS;
  // Тайлы: рисуем только дороги (светлее) + здания (темнее) — крупными
  // пикселями, без обводки. Для скорости — раз в 4 кадра.
  if ((_miniTick++ & 3) === 0) {
    _miniBakedDirty = true;
  }
  if (_miniBakedDirty) {
    bakeMini();
    _miniBakedDirty = false;
  }
  ctx2.drawImage(_miniBaked, 0, 0);
  // PVP-зона — красный прямоугольник
  ctx2.fillStyle = 'rgba(255,40,40,.30)';
  ctx2.fillRect(ARENA_C0 * sx, ARENA_R0 * sy, (ARENA_C1 - ARENA_C0 + 1) * sx, (ARENA_R1 - ARENA_R0 + 1) * sy);
  ctx2.strokeStyle = 'rgba(255,80,80,.85)';
  ctx2.lineWidth = 1;
  ctx2.strokeRect(ARENA_C0 * sx + 0.5, ARENA_R0 * sy + 0.5,
                  (ARENA_C1 - ARENA_C0 + 1) * sx, (ARENA_R1 - ARENA_R0 + 1) * sy);
  // POI — цветные точки
  for (const poi of POI) {
    ctx2.fillStyle = poi.special === 'shop' ? '#c870ff' :
                     poi.special === 'arena' ? '#ff5050' : '#ffd76b';
    ctx2.beginPath();
    ctx2.arc((poi.c + 0.5) * sx, (poi.r + 0.5) * sy, 3, 0, Math.PI * 2);
    ctx2.fill();
  }
  // Другие игроки — зелёные точки
  ctx2.fillStyle = '#5aff80';
  for (const [, o] of others) {
    ctx2.beginPath();
    ctx2.arc((o.x + 0.5) * sx, (o.y + 0.5) * sy, 2, 0, Math.PI * 2);
    ctx2.fill();
  }
  // Игрок — белая точка с обводкой
  ctx2.fillStyle = '#fff';
  ctx2.strokeStyle = '#000';
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  ctx2.arc((player.c + 0.5) * sx, (player.r + 0.5) * sy, 3.5, 0, Math.PI * 2);
  ctx2.fill(); ctx2.stroke();
}
let _miniTick = 0, _miniBakedDirty = true;
const _miniBaked = document.createElement('canvas');
_miniBaked.width = MINI_W; _miniBaked.height = MINI_H;
function bakeMini() {
  const b = _miniBaked.getContext('2d');
  b.clearRect(0, 0, MINI_W, MINI_H);
  const sx = MINI_W / MAP_COLS, sy = MINI_H / MAP_ROWS;
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const t = MAP[r][c];
      let col;
      if (t === 1)      col = '#3a3340';   // здание
      else if (t === 8 || t === 6) col = '#2a4a22'; // парк/дерево
      else if (t === 9) col = '#33343a';   // бордюр
      else if (t === 7) col = '#ffe48a';   // фонарь
      else              col = '#181820';   // дорога
      b.fillStyle = col;
      b.fillRect(c * sx, r * sy, Math.ceil(sx) + 0.5, Math.ceil(sy) + 0.5);
    }
  }
}

function frame() {
  const t = performance.now();
  let dt = (t - prevT) / 1000;
  prevT = t;
  if (dt > 0.1) dt = 0.1;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Кнопка возврата в хаб ──────────────────────────────────────
document.getElementById('btnHome').addEventListener('click', () => {
  if (QP.hubUrl) { window.location.href = decodeURIComponent(QP.hubUrl); return; }
  // Fallback: t.me/<bot>?startapp=hub
  try {
    if (tg) { tg.close(); return; }
  } catch(e) {}
  window.history.back();
});

// ── Чат + быстрые смайлики ─────────────────────────────────────
const chatInput = document.getElementById('chatInput');
const btnChat   = document.getElementById('btnChat');
const emojiBar  = document.getElementById('emojiBar');
let chatOpen = false;
function openChat() {
  chatOpen = true;
  chatInput.classList.add('open');
  emojiBar.classList.add('open');
  setTimeout(() => chatInput.focus(), 50);
}
function closeChat() {
  chatOpen = false;
  chatInput.classList.remove('open');
  emojiBar.classList.remove('open');
  chatInput.blur();
}
btnChat.addEventListener('click', () => {
  if (!chatOpen) openChat();
  else {
    const t = chatInput.value.trim();
    if (t) { sendChat(t); chatInput.value = ''; }
    closeChat();
  }
});
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const t = chatInput.value.trim();
    if (t) { sendChat(t); chatInput.value = ''; }
    closeChat();
  } else if (e.key === 'Escape') closeChat();
});
// Быстрые смайлики: тап → мгновенная отправка
emojiBar.querySelectorAll('.em').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const ch = btn.getAttribute('data-e');
    if (!ch) return;
    sendChat(ch);
    // Локальный «эхо»-баббл над собой, чтобы сразу видеть
    _localChat = ch;
    _localChatT = performance.now();
  });
});
let _localChat = '', _localChatT = 0;

// ── Старт ──────────────────────────────────────────────────────
if (!QP.api || !QP.uid) {
  setConnecting('Сервер недоступен. Запусти бота с туннелем и зайди заново.');
} else {
  wsConnect();
}
</script>
