    const w=WEP[PWEP]||pw;
    sh.disabled=(w.t==='melee')||(d>w.r);

  } else { sh.disabled=true; me.disabled=true; }
}

// ── HELPERS ───────────────────────────────────────────────────
function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2)}
function walkable(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS)return false;
  if(grid[r][c]===1)return false;
  if(enemies.some(e=>e.hp>0&&e.r===r&&e.c===c))return false;
  return true;
}
function blocking(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS)return true;
  return grid[r][c]>=1&&grid[r][c]!==0;
}
function bfs(sr,sc,range){
  const vis=new Set([sr+','+sc]),q=[{r:sr,c:sc,n:0}],res=[];
  while(q.length){
    const{r,c,n}=q.shift();
    if(n>0)res.push({r,c});
    if(n>=range)continue;
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc,k=nr+','+nc;
      if(!vis.has(k)&&walkable(nr,nc)){vis.add(k);q.push({r:nr,c:nc,n:n+1});}
    }
  }
  return res;
}
function hitChance(ar,ac,tr,tc,cov){
  const d=dist(ar,ac,tr,tc);
  let b=d<=1?.98:d<=2?.92:d<=3?.85:d<=4?.75:d<=5?.65:d<=7?.55:d<=9?.48:.40;
  if(cov===1)b*=.5; if(cov===2)b*=.2;
  return Math.max(.05,Math.min(.98,b));
}
function dmgCalc(atk,def,mult,d,melee){
  let b=Math.max(1,atk-def);
  if(!melee){b*=d<=2?1.3:d<=4?1.0:d<=7?.85:.70;}
  b*=mult; b*=.85+Math.random()*.3;
  return Math.max(1,Math.round(b));
}

// ── RENDER ────────────────────────────────────────────────────
const TC=['#2d201a','#18182e','#5c3d11','#1a3a1a','#4a3218'];
const TC2=['#3a2820','#22223a','#7a5218','#255225','#6a4828'];

function drawTile(r,c){
  const t=grid[r][c],x=c*TS,y=r*TS;
  ctx.fillStyle=TC[t]||TC[0];
  ctx.fillRect(x,y,TS,TS);
  if(t===0){
    ctx.fillStyle=TC2[0];ctx.fillRect(x+1,y+1,TS-2,TS-2);
    ctx.strokeStyle='#3a2820';ctx.lineWidth=.5;ctx.strokeRect(x+.5,y+.5,TS-1,TS-1);
  } else if(t===1){
    // Brick wall
    ctx.fillStyle='#1e1e30';ctx.fillRect(x+2,y+2,TS-4,TS-4);
    ctx.strokeStyle='#141428';ctx.lineWidth=1;
    const bw=Math.floor(TS/2),bh=Math.floor(TS/3);
    for(let by=0;by<3;by++)for(let bx=0;bx<2;bx++){
      const ox=(by%2)*Math.floor(bw/2);
      ctx.strokeRect(x+bx*bw+ox+2,y+by*bh+2,bw-2,bh-1);
    }
  } else if(t===2){
    // Stall / counter
    ctx.fillStyle='#7a5218';ctx.fillRect(x+2,y+2,TS-4,TS-4);
    ctx.fillStyle='#9a6828';ctx.fillRect(x+3,y+3,TS-6,Math.floor(TS*.35));
    ctx.fillStyle='#c8a84b';
    for(let i=0;i<3;i++)ctx.fillRect(x+5+i*Math.floor((TS-10)/3),y+5,4,4);
    ctx.strokeStyle='#5c3010';ctx.lineWidth=1.5;ctx.strokeRect(x+2,y+2,TS-4,TS-4);
  } else if(t===3){
    // Car (top-down)
    ctx.fillStyle='#1a3a1a';ctx.fillRect(x+1,y+1,TS-2,TS-2);
    ctx.fillStyle='#245a24';ctx.fillRect(x+4,y+3,TS-8,TS-6);
    ctx.fillStyle='#3a8f3a4a';ctx.fillRect(x+7,y+5,TS-14,Math.floor(TS*.4));
    ctx.strokeStyle='#0f2a0f';ctx.lineWidth=1.5;ctx.strokeRect(x+1,y+1,TS-2,TS-2);
  } else if(t===4){
    // Crate
    ctx.fillStyle='#6a4828';ctx.fillRect(x+3,y+3,TS-6,TS-6);
    ctx.strokeStyle='#4a3018';ctx.lineWidth=1.5;ctx.strokeRect(x+3,y+3,TS-6,TS-6);
    ctx.beginPath();ctx.moveTo(x+5,y+5);ctx.lineTo(x+TS-5,y+TS-5);
    ctx.moveTo(x+TS-5,y+5);ctx.lineTo(x+5,y+TS-5);
    ctx.strokeStyle='#4a3018';ctx.lineWidth=1;ctx.stroke();
  }
}

function drawGrid(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)drawTile(r,c);
}

function hl(r,c,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.fillRect(c*TS,r*TS,TS,TS);ctx.restore();
}

function drawUnit(r,c,color,emoji,sel,hasCover){
  const x=c*TS+TS/2,y=r*TS+TS/2,rad=TS*.36;
  if(sel){
    ctx.beginPath();ctx.arc(x,y,rad+4,0,Math.PI*2);
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
  }
  // Shadow
  ctx.beginPath();ctx.arc(x+1,y+2,rad,0,Math.PI*2);
  ctx.fillStyle='#0008';ctx.fill();
  // Body
  ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.stroke();
  // Emoji
  ctx.font=Math.floor(TS*.42)+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,x,y);
  // Cover badge
  if(hasCover){
    ctx.font=Math.floor(TS*.32)+'px serif';
    ctx.fillText('🛡',x+rad*.6,y-rad*.7);
  }
}

function drawHPbar(r,c,hp,maxhp,col){
  const x=c*TS+3,y=r*TS+TS-6,w=TS-6;
  ctx.fillStyle='#0009';ctx.fillRect(x,y,w,4);
  ctx.fillStyle=col;ctx.fillRect(x,y,Math.round(w*hp/maxhp),4);
}

function drawCoverHint(r,c){
  const cv=COV[grid[r][c]]||0; if(!cv)return;
  const x=c*TS,y=r*TS;
  // Pulsing shield overlay
  ctx.save();
  ctx.globalAlpha=.35+.15*Math.sin(coverPulse);
  ctx.fillStyle=cv===2?'#00aaff':'#00ff88';
  ctx.fillRect(x,y,TS,TS);
  ctx.restore();
  ctx.font=Math.floor(TS*.45)+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(cv===2?'🛡':'🪵',c*TS+TS/2,r*TS+TS/2);
}

function render(){
  if(!canvas.width)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  // Move tiles highlight
  if(gstate==='player'&&!player.moved)
    moveTiles.forEach(({r,c})=>hl(r,c,'#4af',.22));
  // Cover hints on move tiles
  if(gstate==='player'&&!player.moved)
    moveTiles.forEach(({r,c})=>drawCoverHint(r,c));
  // Selected tile outline
  if(selTile&&!player.moved){
    const{r,c}=selTile;
    ctx.strokeStyle='#4af';ctx.lineWidth=3;
    ctx.strokeRect(c*TS+2,r*TS+2,TS-4,TS-4);
    // Cover icon big
    const cv=COV[grid[r][c]]||0;
    if(cv>0){
      ctx.font=Math.floor(TS*.55)+'px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(cv===2?'🛡':'🪵',c*TS+TS/2,r*TS+TS/2);
    }
  }
  // Enemy highlight
  if(selEnemy)hl(selEnemy.r,selEnemy.c,'#f44',.35);
  // Units
  const pCov=COV[grid[player.r][player.c]]>0;
  drawUnit(player.r,player.c,'#1a3a6a','🤵',false,pCov);
  drawHPbar(player.r,player.c,player.hp,player.maxhp,'#2ecc71');
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const eCov=COV[grid[e.r][e.c]]>0;
    drawUnit(e.r,e.c,'#4a1515',e.e,selEnemy?.id===e.id,eCov);
    drawHPbar(e.r,e.c,e.hp,e.maxhp,'#e74c3c');
  });
  // Bullets
  bullets.forEach(b=>{
    ctx.save();
    const p=b.prog;
    for(let i=0;i<(b.shots||1);i++){
      const sp=(b.sp||0)*TS;
      const ox=(Math.random()-.5)*sp,oy=(Math.random()-.5)*sp;
      ctx.globalAlpha=1-p*.7;
      ctx.beginPath();
      ctx.moveTo(b.sx,b.sy);
      ctx.lineTo(b.sx+(b.ex-b.sx)*p+ox,b.sy+(b.ey-b.sy)*p+oy);
      ctx.strokeStyle=b.c||'#ff0';ctx.lineWidth=b.thick||2;ctx.stroke();
    }
    ctx.restore();
  });
  // Melee VFX
  meleeVfx.forEach(v=>{
    ctx.save();ctx.globalAlpha=v.a;
    ctx.font=Math.floor(TS*.8)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(v.e,v.c*TS+TS/2,v.r*TS+TS/2);
    ctx.restore();
  });
}

// ── ANIMATIONS ────────────────────────────────────────────────
function shootAnim(sx,sy,ex,ey,wData,cb){
  const dur=280,t0=performance.now();
  bullets=[{sx,sy,ex,ey,shots:wData.s||1,sp:wData.sp||0,c:wData.c,thick:wData.thick||2,prog:0}];
  function step(now){
    bullets[0].prog=Math.min(1,(now-t0)/dur);
    coverPulse+=.15;render();
    if(bullets[0].prog<1)requestAnimationFrame(step);
    else{bullets=[];cb();}
  }
  requestAnimationFrame(step);
}

function meleeAnim(r,c,cb){
  const EMOJIS=['💥','⚡','💫','✨'];
  meleeVfx=[{r,c,e:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],a:1}];
  let step=0;const iv=setInterval(()=>{
    meleeVfx[0].a=Math.max(0,1-step/8);render();
    if(++step>=8){clearInterval(iv);meleeVfx=[];cb();}
  },45);
}

function moveAnim(unit,tr,tc,cb){
  const t0=performance.now(),dur=180,or=unit.r,oc=unit.c;
  function step(now){
    const p=Math.min(1,(now-t0)/dur);
    if(p>=.5&&unit.r===or){unit.r=tr;unit.c=tc;}
    coverPulse+=.1;render();
    if(p<1)requestAnimationFrame(step);
    else{unit.r=tr;unit.c=tc;cb();}
  }
  requestAnimationFrame(step);
}

function floatDmg(r,c,dmg,color,miss){
  const layer=document.getElementById('dmg-layer');
  const el=document.createElement('div');
  el.className='dmg-pop';
  el.style.cssText=`color:${color};left:${c*TS+TS/2-18}px;top:${r*TS+2}px`;
  el.textContent=miss?'МИМО!':'-'+dmg;
  layer.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ── COMBAT ────────────────────────────────────────────────────
function doShoot(){
  if(!selEnemy||player.attacked||gstate!=='player')return;
  const e=selEnemy,w=WEP[PWEP]||pw;
  if(w.t==='melee'){doMelee();return;}
  const d=dist(player.r,player.c,e.r,e.c);
  if(d>w.r){log('Слишком далеко!');return;}
  gstate='anim';player.attacked=true;
  const cv=COV[grid[e.r][e.c]]||0;
  const hc=hitChance(player.r,player.c,e.r,e.c,cv);
  const hit=Math.random()<hc;
  const sx=player.c*TS+TS/2,sy=player.r*TS+TS/2;
  const ex=e.c*TS+TS/2,ey=e.r*TS+TS/2;
  shootAnim(sx,sy,ex,ey,w,()=>{
    if(hit){
      const dmg=dmgCalc(player.atk,e.def,w.m,d,false);
      e.hp=Math.max(0,e.hp-dmg);
      floatDmg(e.r,e.c,dmg,'#f88',false);
      log(w.lbl+' → попал! −'+dmg+' HP'+(cv>0?' (укрытие)':''));
    } else {
      floatDmg(e.r,e.c,0,'#aaa',true);
      log(w.lbl+' → мимо!'+(cv>0?' (укрытие помогло!)':''));
    }
    hud();checkDeath();gstate='player';selEnemy=null;calcMoveTiles();btns();render();
  });render();
}

function doMelee(){
  if(!selEnemy||player.attacked||gstate!=='player')return;
  const e=selEnemy,w=WEP[PWEP]||pw;
  const d=dist(player.r,player.c,e.r,e.c);
  const mr=w.t==='melee'?w.r:2;
  if(d>mr){log('Слишком далеко для удара!');return;}
  gstate='anim';player.attacked=true;
  meleeAnim(e.r,e.c,()=>{
    const dmg=dmgCalc(player.atk,e.def,w.m*(w.t==='melee'?1:1.2),d,true);
    e.hp=Math.max(0,e.hp-dmg);
    floatDmg(e.r,e.c,dmg,'#fc6',false);
    log((w.t==='melee'?w.lbl:'Ближний бой')+' → −'+dmg+' HP!');
    hud();checkDeath();gstate='player';selEnemy=null;calcMoveTiles();btns();render();
  });
}

function checkDeath(){
  if(enemies.every(e=>e.hp<=0)){setTimeout(()=>endBattle('won'),400);return;}
  if(player.hp<=0)setTimeout(()=>endBattle('lost'),400);
}

// ── ENEMY AI ─────────────────────────────────────────────────
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function enemyTurn(){
  gstate='enemy';
  document.getElementById('turn-badge').textContent='ХОД\nВРАГА';
  document.getElementById('turn-badge').className='et';
  log('Ход врага...');btns();
  for(const e of enemies){
    if(e.hp<=0)continue;
    await sleep(380);
    const ew=WEP[e.wep]||WEP.nagan;
    // Move toward player (prefer cover)
    if(!e.moved){
      const reach=bfs(e.r,e.c,e.moveRange);
      let best=null,bsc=Infinity;
      reach.forEach(({r,c})=>{
        const nd=dist(r,c,player.r,player.c);
        const cb=COV[grid[r][c]]>0?-1.5:0;
        const sc=nd+cb;
        if(sc<bsc){bsc=sc;best={r,c};}
      });
      if(best&&(best.r!==e.r||best.c!==e.c)){
        await new Promise(res=>moveAnim(e,best.r,best.c,res));
        e.moved=true;
      }
    }
    // Attack
    const d=dist(e.r,e.c,player.r,player.c);
    if(d<=ew.r&&!e.attacked){
      e.attacked=true;
      const cv=COV[grid[player.r][player.c]]||0;
      const hc=hitChance(e.r,e.c,player.r,player.c,cv);
      const hit=Math.random()<hc;
      const sx=e.c*TS+TS/2,sy=e.r*TS+TS/2;
      const ex=player.c*TS+TS/2,ey=player.r*TS+TS/2;
      await new Promise(res=>shootAnim(sx,sy,ex,ey,ew,res));
      if(hit){
        const dmg=dmgCalc(e.atk,player.def,1.0,d,false);
        player.hp=Math.max(0,player.hp-dmg);
        floatDmg(player.r,player.c,dmg,'#f44',false);
        log(e.name+' попал в тебя: −'+dmg+' HP'+(cv>0?' (укрытие помогло!)':''));
      } else {
        floatDmg(player.r,player.c,0,'#aaa',true);
        log(e.name+' промахнулся!'+(cv>0?' Укрытие спасло!':''));
      }
      hud();render();
      if(player.hp<=0){endBattle('lost');return;}
    }
  }
  await sleep(300);startPlayerTurn();
}

// ── TURNS ─────────────────────────────────────────────────────
function calcMoveTiles(){moveTiles=player.moved?[]:bfs(player.r,player.c,player.moveRange);}

function startPlayerTurn(){
  gstate='player';player.moved=false;player.attacked=false;
  enemies.forEach(e=>{e.moved=false;e.attacked=false;});
  selTile=null;selEnemy=null;calcMoveTiles();
  document.getElementById('turn-badge').textContent='ВАШ\nХОД';
  document.getElementById('turn-badge').className='pt';
  log('Выбери куда двигаться или кого атаковать');btns();render();
}

function resetSel(){selTile=null;selEnemy=null;calcMoveTiles();btns();render();}

function endPlayerTurn(){
  if(gstate!=='player')return;
  selTile=null;selEnemy=null;render();enemyTurn();
}

// ── BATTLE END ────────────────────────────────────────────────
function endBattle(res){
  gstate=res;
  ['bShoot','bMelee','bEnd','bMove'].forEach(id=>document.getElementById(id).disabled=true);
  if(res==='won'){
    log('🏆 ПОБЕДА! Отличная работа, дон!');
    document.getElementById('turn-badge').textContent='🏆 ПОБЕДА';
    document.getElementById('turn-badge').className='pt';
  } else {
    log('💀 Поражение... отходи!');
    document.getElementById('turn-badge').textContent='💀 КОНЕЦ';
    document.getElementById('turn-badge').className='et';
  }
  setTimeout(()=>{
    if(tg&&tg.sendData)tg.sendData(JSON.stringify({
      a:res==='won'?'battle_won':'battle_lost',
      php:player.hp,pmp:PMAXHP,gu:0,coop_id:COOP_ID,
    }));
  },2000);
}

// ── INPUT ─────────────────────────────────────────────────────
function onTap(evt){
  if(gstate!=='player')return;
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  const cx=(evt.clientX-rect.left)*sx,cy=(evt.clientY-rect.top)*sy;
  const c=Math.floor(cx/TS),r=Math.floor(cy/TS);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;

  // Clicked enemy?
  const ce=enemies.find(e=>e.hp>0&&e.r===r&&e.c===c);
  if(ce){
    selEnemy=ce;selTile=null;
    const d=dist(player.r,player.c,ce.r,ce.c);
    const cv=COV[grid[ce.r][ce.c]]||0;
    const hp=Math.round(hitChance(player.r,player.c,ce.r,ce.c,cv)*100);
    log(ce.name+' · дист.'+d+' · шанс попасть '+hp+'%'+(cv>0?' 🛡 укрытие':''));
    btns();render();return;
  }

  // Movement
  if(!player.moved){
    const inRange=moveTiles.some(t=>t.r===r&&t.c===c);
    if(!inRange){selTile=null;selEnemy=null;btns();render();return;}
    if(selTile&&selTile.r===r&&selTile.c===c){
      // Confirm move
      gstate='anim';
      moveAnim(player,r,c,()=>{
        player.moved=true;selTile=null;calcMoveTiles();gstate='player';
        const cv=COV[grid[player.r][player.c]]||0;
        if(cv>0)log('В укрытии! '+(cv===2?'Тяжёлое укрытие — 80% защита 🛡':'Лёгкое укрытие — 50% защита 🪵'));
        else log('Переместился. Атакуй или заверши ход.');
        btns();render();
      });
    } else {
      // Preview
      selTile={r,c};selEnemy=null;
      const cv=COV[grid[r][c]]||0;
      log((cv===2?'🛡 Тяжёлое укрытие!':(cv===1?'🪵 Лёгкое укрытие!':'Пусто'))+' — нажми ещё раз чтобы идти');
      btns();render();
    }
  }
}

canvas.addEventListener('click',onTap);
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  onTap({clientX:t.clientX,clientY:t.clientY});
},{passive:false});

// ── PULSE LOOP ────────────────────────────────────────────────
function pulseLoop(){coverPulse+=.08;render();requestAnimationFrame(pulseLoop);}

// ── INIT ─────────────────────────────────────────────────────
resize();hud();calcMoveTiles();startPlayerTurn();pulseLoop();
</script>
